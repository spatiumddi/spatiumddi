name: spatiumddi-agent-dhcp

# ── Standalone DHCP agent compose file ────────────────────────────────
#
# For running Kea DHCP agent(s) on a machine *without* the SpatiumDDI
# control plane — typical distributed deployment shape, and the right
# way to test "VM only runs DHCP":
#
#   * Control plane (api, db, redis, frontend, worker) runs on one VM
#     via ``docker-compose.yml`` (no dhcp/dns profiles needed).
#   * This compose file runs on each separate DHCP VM, pointing at the
#     control plane's API URL.
#
# Quickstart:
#
#   # Set the two required env vars (or put them in an .env next to
#   # this file — compose auto-loads .env).
#   export SPATIUM_API_URL=https://spatium.example.com
#   export SPATIUM_AGENT_KEY=$(openssl rand -hex 32)
#
#   # Register the key on the control plane first (Settings → Agent
#   # Keys) so the agent can bootstrap.
#
#   # Single Kea node:
#   docker compose -f docker-compose.agent-dhcp.yml up -d
#
#   # HA pair on the same host (rare for real prod, useful for lab):
#   docker compose -f docker-compose.agent-dhcp.yml --profile dhcp-ha up -d
#
# ──────────────────────────────────────────────────────────────────────

services:

  # ── DHCP agent (primary) ──────────────────────────────────────────
  dhcp-kea:
    image: ghcr.io/spatiumddi/dhcp-kea:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    hostname: ${DHCP_HOSTNAME:-dhcp-kea}
    networks:
      - spatiumddi-agent
    environment:
      # ── Required ──────────────────────────────────────────────────
      # URL of the SpatiumDDI control plane API (remote).
      SPATIUM_API_URL: ${SPATIUM_API_URL:?SPATIUM_API_URL required}
      # Pre-shared key registered on the control plane first.
      SPATIUM_AGENT_KEY: ${SPATIUM_AGENT_KEY:?SPATIUM_AGENT_KEY required}

      # ── Registration ──────────────────────────────────────────────
      # Server name used for auto-registration + Kea HA this-server-name.
      # MUST be unique across the deployment.
      SPATIUM_SERVER_NAME: ${DHCP_HOSTNAME:-dhcp-kea}
      # Server group the agent joins on first bootstrap. Create this
      # group on the control plane first (DHCP → Server Groups).
      AGENT_GROUP: ${DHCP_AGENT_GROUP:-default}
      AGENT_ROLES: primary

      # ── TLS ───────────────────────────────────────────────────────
      # Flip to 0 once your control plane has a trusted cert. Default
      # is 1 for lab / self-signed testing.
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "${SPATIUM_INSECURE_SKIP_TLS_VERIFY:-1}"
      # TLS_CA_PATH: /etc/ssl/spatium-ca.crt

      # ── Tuning (optional, defaults shown) ─────────────────────────
      # LOG_LEVEL: INFO
      # HEARTBEAT_INTERVAL: "30"
      # LONGPOLL_TIMEOUT: "30"
    volumes:
      - dhcp_kea_state:/var/lib/spatium-dhcp-agent
      - dhcp_kea_leases:/var/lib/kea
      # Optional: mount a CA bundle to verify the control plane.
      # - /etc/ssl/certs:/etc/ssl/certs:ro
    ports:
      # Real DHCPv4 needs UDP/67 reachable by clients. For production
      # deployments use host networking instead (``network_mode: host``)
      # so Kea can listen for L2 broadcasts directly. Host-port 6767
      # is lab-only.
      - "${DHCP_HOST_PORT:-6767}:67/udp"
      # HA hook peer-to-peer HTTP. The partner peer calls this port
      # for heartbeats + lease updates. Expose if the partner is on
      # a different host.
      - "${DHCP_HA_HOST_PORT:-8001}:8000/tcp"
      # Optional operator-facing kea-ctrl-agent REST.
      # - "8544:8544/tcp"
    cap_add:
      - NET_BIND_SERVICE

  # ── DHCP agent (secondary, HA peer) ───────────────────────────────
  # Enable with: ``--profile dhcp-ha``.
  # For real HA you'd typically run the second peer on a SECOND host —
  # use another copy of this compose file there with DHCP_HOSTNAME
  # set to the peer name, not this profile.
  dhcp-kea-2:
    profiles: ["dhcp-ha"]
    image: ghcr.io/spatiumddi/dhcp-kea:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    hostname: ${DHCP_HOSTNAME_2:-dhcp-kea-2}
    networks:
      - spatiumddi-agent
    environment:
      SPATIUM_API_URL: ${SPATIUM_API_URL:?SPATIUM_API_URL required}
      SPATIUM_AGENT_KEY: ${SPATIUM_AGENT_KEY:?SPATIUM_AGENT_KEY required}
      SPATIUM_SERVER_NAME: ${DHCP_HOSTNAME_2:-dhcp-kea-2}
      AGENT_GROUP: ${DHCP_AGENT_GROUP:-default}
      AGENT_ROLES: secondary
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "${SPATIUM_INSECURE_SKIP_TLS_VERIFY:-1}"
    volumes:
      - dhcp_kea_state_2:/var/lib/spatium-dhcp-agent
      - dhcp_kea_leases_2:/var/lib/kea
    ports:
      - "${DHCP_HOST_PORT_2:-6768}:67/udp"
      - "${DHCP_HA_HOST_PORT_2:-8002}:8000/tcp"
    cap_add:
      - NET_BIND_SERVICE

networks:
  spatiumddi-agent:
    driver: bridge

volumes:
  dhcp_kea_state:
  dhcp_kea_leases:
  dhcp_kea_state_2:
  dhcp_kea_leases_2:
