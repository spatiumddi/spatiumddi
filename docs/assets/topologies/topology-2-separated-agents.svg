<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540"
     preserveAspectRatio="xMidYMid meet"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="t2-host" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="t2-cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="t2-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="t2-lb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="t2-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Operators -->
  <g>
    <rect x="380" y="20" width="160" height="50" rx="25" fill="#1e293b"/>
    <text x="460" y="51" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">operators / API</text>
  </g>

  <!-- Load balancer -->
  <g>
    <rect x="390" y="100" width="140" height="46" rx="8" fill="url(#t2-lb)"/>
    <text x="460" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">nginx / LB</text>
  </g>
  <line x1="460" y1="70" x2="460" y2="100" stroke="#475569" stroke-width="2"
        marker-end="url(#t2-arrow)"/>

  <!-- Control plane VM -->
  <rect x="160" y="180" width="600" height="130" rx="12"
        fill="url(#t2-host)" stroke="#94a3b8" stroke-width="2"/>
  <text x="180" y="208" font-size="15" font-weight="600" fill="#0f172a">vm-spatium-cp.corp.local</text>
  <text x="180" y="226" font-size="11" fill="#475569">control plane — 4 vCPU · 8 GB · exposes :8000 / :80 (LB-terminated 443)</text>

  <g>
    <rect x="180" y="244" width="80" height="50" rx="6" fill="url(#t2-cp)"/>
    <text x="220" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">api</text>
  </g>
  <g>
    <rect x="270" y="244" width="80" height="50" rx="6" fill="url(#t2-cp)"/>
    <text x="310" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">worker</text>
  </g>
  <g>
    <rect x="360" y="244" width="80" height="50" rx="6" fill="url(#t2-cp)"/>
    <text x="400" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">beat</text>
  </g>
  <g>
    <rect x="450" y="244" width="80" height="50" rx="6" fill="url(#t2-cp)"/>
    <text x="490" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">frontend</text>
  </g>
  <g>
    <rect x="540" y="244" width="100" height="50" rx="6" fill="#34d399"/>
    <text x="590" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">postgres</text>
  </g>
  <g>
    <rect x="650" y="244" width="90" height="50" rx="6" fill="#34d399"/>
    <text x="695" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">redis</text>
  </g>
  <line x1="460" y1="146" x2="460" y2="180" stroke="#475569" stroke-width="2"
        marker-end="url(#t2-arrow)"/>

  <!-- DNS VM -->
  <g>
    <rect x="80" y="350" width="320" height="160" rx="12"
          fill="url(#t2-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="100" y="378" font-size="14" font-weight="600" fill="#0f172a">vm-dns.corp.local</text>
    <text x="100" y="394" font-size="11" fill="#475569">docker-compose.agent-dns-bind9.yml</text>

    <rect x="110" y="412" width="120" height="58" rx="8" fill="url(#t2-agent)"/>
    <text x="170" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">bind9</text>
    <text x="170" y="456" text-anchor="middle" font-size="10" fill="#fed7aa">:53 udp/tcp</text>

    <rect x="240" y="412" width="130" height="58" rx="8" fill="#475569"/>
    <text x="305" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">dns-agent</text>
    <text x="305" y="456" text-anchor="middle" font-size="10" fill="#cbd5e1">long-poll JWT</text>
  </g>

  <!-- DHCP VM -->
  <g>
    <rect x="520" y="350" width="320" height="160" rx="12"
          fill="url(#t2-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="540" y="378" font-size="14" font-weight="600" fill="#0f172a">vm-dhcp.corp.local</text>
    <text x="540" y="394" font-size="11" fill="#475569">docker-compose.agent-dhcp.yml</text>

    <rect x="550" y="412" width="120" height="58" rx="8" fill="url(#t2-agent)"/>
    <text x="610" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">kea</text>
    <text x="610" y="456" text-anchor="middle" font-size="10" fill="#fed7aa">:67 udp</text>

    <rect x="680" y="412" width="140" height="58" rx="8" fill="#475569"/>
    <text x="750" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">dhcp-agent</text>
    <text x="750" y="456" text-anchor="middle" font-size="10" fill="#cbd5e1">long-poll JWT</text>
  </g>

  <!-- Long-poll arrows -->
  <line x1="305" y1="412" x2="380" y2="310" stroke="#fb923c" stroke-width="2"
        stroke-dasharray="6 4" marker-end="url(#t2-arrow)"/>
  <line x1="750" y1="412" x2="540" y2="310" stroke="#fb923c" stroke-width="2"
        stroke-dasharray="6 4" marker-end="url(#t2-arrow)"/>
  <text x="248" y="340" font-size="10" fill="#ea580c" font-style="italic">long-poll /api/v1/dns/agents/config (ETag)</text>
  <text x="612" y="340" font-size="10" fill="#ea580c" font-style="italic">long-poll /api/v1/dhcp/agents/config (ETag)</text>
</svg>
