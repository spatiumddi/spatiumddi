<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600"
     preserveAspectRatio="xMidYMid meet"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="t3-host" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="t3-cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="t3-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="t3-lb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="t3-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Load balancer -->
  <rect x="390" y="20" width="140" height="42" rx="8" fill="url(#t3-lb)"/>
  <text x="460" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">nginx LB</text>

  <!-- Single-VM control plane (per Topology 2) -->
  <rect x="320" y="100" width="280" height="64" rx="10" fill="url(#t3-cp)"/>
  <text x="460" y="128" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">API + DB</text>
  <text x="460" y="148" text-anchor="middle" font-size="11" fill="#ddd6fe">single VM (Topology 2)</text>
  <line x1="460" y1="62" x2="460" y2="100" stroke="#475569" stroke-width="2"
        marker-end="url(#t3-arrow)"/>

  <!-- DNS server group (3 servers) -->
  <text x="200" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">DNS Server Group</text>
  <g>
    <rect x="60" y="220" width="160" height="92" rx="10"
          fill="url(#t3-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="140" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dns-01</text>
    <text x="140" y="262" text-anchor="middle" font-size="10" fill="#475569">zone master</text>
    <rect x="80" y="270" width="120" height="32" rx="6" fill="url(#t3-agent)"/>
    <text x="140" y="291" text-anchor="middle" font-size="11" fill="#ffffff">bind9 :53</text>
  </g>
  <g>
    <rect x="240" y="220" width="160" height="92" rx="10"
          fill="url(#t3-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="320" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dns-02</text>
    <text x="320" y="262" text-anchor="middle" font-size="10" fill="#475569">slave / xfer</text>
    <rect x="260" y="270" width="120" height="32" rx="6" fill="url(#t3-agent)"/>
    <text x="320" y="291" text-anchor="middle" font-size="11" fill="#ffffff">bind9 :53</text>
  </g>
  <g>
    <rect x="420" y="220" width="160" height="92" rx="10"
          fill="url(#t3-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="500" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dns-int</text>
    <text x="500" y="262" text-anchor="middle" font-size="10" fill="#475569">internal split-view</text>
    <rect x="440" y="270" width="120" height="32" rx="6" fill="url(#t3-agent)"/>
    <text x="500" y="291" text-anchor="middle" font-size="11" fill="#ffffff">bind9 :53</text>
  </g>

  <!-- DHCP HA pair -->
  <text x="765" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">DHCP HA pair (Kea)</text>
  <g>
    <rect x="610" y="220" width="140" height="92" rx="10"
          fill="url(#t3-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="680" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dhcp-east</text>
    <text x="680" y="262" text-anchor="middle" font-size="10" fill="#475569">primary</text>
    <rect x="630" y="270" width="100" height="32" rx="6" fill="url(#t3-agent)"/>
    <text x="680" y="291" text-anchor="middle" font-size="11" fill="#ffffff">kea :67</text>
  </g>
  <g>
    <rect x="770" y="220" width="140" height="92" rx="10"
          fill="url(#t3-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="840" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dhcp-west</text>
    <text x="840" y="262" text-anchor="middle" font-size="10" fill="#475569">standby</text>
    <rect x="790" y="270" width="100" height="32" rx="6" fill="url(#t3-agent)"/>
    <text x="840" y="291" text-anchor="middle" font-size="11" fill="#ffffff">kea :67</text>
  </g>
  <!-- HA peering arrow -->
  <path d="M 750 260 Q 760 280 770 260" stroke="#ea580c" stroke-width="2.5" fill="none"/>
  <path d="M 770 260 Q 760 240 750 260" stroke="#ea580c" stroke-width="2.5" fill="none"/>

  <!-- Long-poll arrows from agents back to CP -->
  <line x1="140" y1="220" x2="320" y2="164" stroke="#fb923c" stroke-width="1.5"
        stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="320" y1="220" x2="400" y2="164" stroke="#fb923c" stroke-width="1.5"
        stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="500" y1="220" x2="480" y2="164" stroke="#fb923c" stroke-width="1.5"
        stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="680" y1="220" x2="560" y2="164" stroke="#fb923c" stroke-width="1.5"
        stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="840" y1="220" x2="600" y2="164" stroke="#fb923c" stroke-width="1.5"
        stroke-dasharray="4 3" opacity="0.7"/>

  <!-- Notes -->
  <g>
    <rect x="60" y="380" width="800" height="200" rx="12"
          fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="80" y="410" font-size="13" font-weight="600" fill="#0f172a">Configured via the UI</text>
    <text x="80" y="436" font-size="12" fill="#334155">
      <tspan font-weight="600">DNS Server Group</tspan> — list every member; records render to all. Per-server zone-state pill</tspan>
    </text>
    <text x="80" y="454" font-size="12" fill="#334155">on the zone page exposes any slave that hasn't transferred.</text>

    <text x="80" y="488" font-size="12" fill="#334155">
      <tspan font-weight="600">DHCP Server Group</tspan> with <tspan font-style="italic">ha_mode = hot-standby</tspan> (or <tspan font-style="italic">load-balancing</tspan> for higher
    </text>
    <text x="80" y="506" font-size="12" fill="#334155">throughput). Set ha_peer_url on each Kea server. PeerResolveWatcher self-heals when peer IPs drift.</text>

    <text x="80" y="540" font-size="11" fill="#64748b" font-style="italic">
      Agents long-poll the control plane; if API is unreachable, both sides serve from cache and Kea HA
    </text>
    <text x="80" y="556" font-size="11" fill="#64748b" font-style="italic">
      continues operating against its peer regardless of control-plane state.
    </text>
  </g>
</svg>
