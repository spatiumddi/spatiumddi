<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600"
     preserveAspectRatio="xMidYMid meet"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="t6-k8s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="t6-pod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="t6-store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="t6-cache" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="t6-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="t6-ingress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="t6-pvc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>

  <!-- K8s cluster outline -->
  <rect x="20" y="20" width="880" height="560" rx="14"
        fill="url(#t6-k8s)" stroke="#3b82f6" stroke-width="2"/>
  <text x="40" y="50" font-size="15" font-weight="600" fill="#1e3a8a">⎈  Kubernetes cluster — 3+ nodes (separate node pools optional)</text>

  <!-- Web tier -->
  <g>
    <rect x="60" y="80" width="220" height="100" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="170" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">api Pod ×3</text>
    <rect x="80" y="118" width="180" height="36" rx="6" fill="url(#t6-pod)"/>
    <text x="170" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Service (cluster-internal)</text>
    <text x="170" y="170" text-anchor="middle" font-size="10" fill="#64748b">Stateless · ready for HPA</text>
  </g>

  <g>
    <rect x="300" y="80" width="220" height="100" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="410" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">worker ×N (HPA-scaled)</text>
    <rect x="320" y="118" width="180" height="36" rx="6" fill="url(#t6-pod)"/>
    <text x="410" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Celery</text>
    <text x="410" y="170" text-anchor="middle" font-size="10" fill="#64748b">NET_RAW for passive DHCP fingerprint</text>
  </g>

  <g>
    <rect x="540" y="80" width="160" height="100" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="620" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">beat Pod ×1</text>
    <rect x="560" y="118" width="120" height="36" rx="6" fill="url(#t6-pod)"/>
    <text x="620" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Singleton</text>
    <text x="620" y="170" text-anchor="middle" font-size="10" fill="#64748b">not horizontally scalable</text>
  </g>

  <g>
    <rect x="720" y="80" width="160" height="100" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="800" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">migrate Job</text>
    <rect x="740" y="118" width="120" height="36" rx="6" fill="#64748b"/>
    <text x="800" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">pre-upgrade hook</text>
    <text x="800" y="170" text-anchor="middle" font-size="10" fill="#64748b">alembic upgrade head</text>
  </g>

  <!-- Stateful tier -->
  <g>
    <rect x="60" y="220" width="380" height="120" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="250" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">CloudNativePG cluster — 3 nodes</text>
    <rect x="80" y="260" width="100" height="58" rx="6" fill="url(#t6-store)"/>
    <text x="130" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">primary</text>
    <text x="130" y="300" text-anchor="middle" font-size="10" fill="#bbf7d0">RW :5432</text>
    <rect x="190" y="260" width="100" height="58" rx="6" fill="url(#t6-store)"/>
    <text x="240" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">replica</text>
    <rect x="300" y="260" width="100" height="58" rx="6" fill="url(#t6-store)"/>
    <text x="350" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">replica</text>
  </g>

  <g>
    <rect x="460" y="220" width="380" height="120" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="650" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Bitnami Redis HA — sentinel</text>
    <rect x="480" y="260" width="100" height="58" rx="6" fill="url(#t6-cache)"/>
    <text x="530" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">master</text>
    <rect x="590" y="260" width="100" height="58" rx="6" fill="url(#t6-cache)"/>
    <text x="640" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">replica</text>
    <rect x="700" y="260" width="100" height="58" rx="6" fill="url(#t6-cache)"/>
    <text x="750" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">replica</text>
  </g>

  <!-- Agents (StatefulSets) -->
  <g>
    <rect x="60" y="380" width="380" height="100" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="250" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">dns-bind9 StatefulSet</text>
    <rect x="80" y="420" width="160" height="44" rx="6" fill="url(#t6-agent)"/>
    <text x="160" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">bind9 + agent sidecar</text>
    <rect x="250" y="420" width="170" height="44" rx="6" fill="#475569"/>
    <text x="335" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Service UDP/TCP :53</text>
  </g>

  <g>
    <rect x="460" y="380" width="380" height="100" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="650" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">dhcp-kea StatefulSet (group-centric HA)</text>
    <rect x="480" y="420" width="160" height="44" rx="6" fill="url(#t6-agent)"/>
    <text x="560" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">kea + agent sidecar</text>
    <rect x="650" y="420" width="170" height="44" rx="6" fill="#475569"/>
    <text x="735" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Service UDP :67</text>
  </g>

  <!-- Ingress + PVC -->
  <g>
    <rect x="60" y="510" width="380" height="56" rx="8" fill="url(#t6-ingress)"/>
    <text x="250" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Ingress + cert-manager</text>
    <text x="250" y="552" text-anchor="middle" font-size="10" fill="#dbeafe">spatium.example.com</text>
  </g>
  <g>
    <rect x="460" y="510" width="380" height="56" rx="8" fill="url(#t6-pvc)" stroke="#d97706" stroke-width="1.5"/>
    <text x="650" y="535" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">PVC: spatium_backups (RWX)</text>
    <text x="650" y="552" text-anchor="middle" font-size="10" fill="#92400e">required for local_volume backup target — see k8s/README</text>
  </g>
</svg>
