<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600"
     preserveAspectRatio="xMidYMid meet"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="t5-cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="t5-corp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="t5-host" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="t5-cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="t5-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="t5-lb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="t5-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Cloud region -->
  <g>
    <rect x="180" y="20" width="560" height="220" rx="14"
          fill="url(#t5-cloud)" stroke="#3b82f6" stroke-width="2"/>
    <text x="200" y="48" font-size="14" font-weight="600" fill="#1e3a8a">☁  Cloud region (eu-west-1 / east-us / etc.)</text>

    <rect x="220" y="68" width="480" height="80" rx="10"
          fill="url(#t5-host)" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="240" y="92" font-size="12" font-weight="600" fill="#0f172a">Spatium control plane</text>
    <text x="240" y="108" font-size="10" fill="#475569">HA api + Patroni + Redis Sentinel (Topology 4 stack)</text>
    <rect x="240" y="115" width="80" height="22" rx="4" fill="url(#t5-cp)"/>
    <text x="280" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">api ×N</text>
    <rect x="328" y="115" width="80" height="22" rx="4" fill="url(#t5-cp)"/>
    <text x="368" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">worker</text>
    <rect x="416" y="115" width="80" height="22" rx="4" fill="#34d399"/>
    <text x="456" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">postgres HA</text>
    <rect x="504" y="115" width="76" height="22" rx="4" fill="#22d3ee"/>
    <text x="542" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">redis HA</text>
    <rect x="588" y="115" width="86" height="22" rx="4" fill="#94a3b8"/>
    <text x="631" y="131" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">backup S3</text>

    <rect x="280" y="172" width="360" height="44" rx="8" fill="url(#t5-lb)"/>
    <text x="460" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Cloud LB — TLS</text>
    <text x="460" y="211" text-anchor="middle" font-size="10" fill="#dbeafe">spatium.example.com</text>
  </g>

  <!-- Tunnel -->
  <text x="460" y="270" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">
    long-poll over HTTPS via VPN / WireGuard / Tailscale
  </text>
  <line x1="460" y1="216" x2="460" y2="298" stroke="#fb923c" stroke-width="2.5"
        stroke-dasharray="6 4" marker-end="url(#t5-arrow)"/>
  <line x1="460" y1="298" x2="460" y2="216" stroke="#fb923c" stroke-width="2.5"
        stroke-dasharray="6 4" marker-end="url(#t5-arrow)"/>

  <!-- On-prem corp network -->
  <g>
    <rect x="60" y="298" width="800" height="280" rx="14"
          fill="url(#t5-corp)" stroke="#d97706" stroke-width="2"/>
    <text x="80" y="328" font-size="14" font-weight="600" fill="#92400e">🏢  Branch / on-prem corp network</text>

    <g>
      <rect x="100" y="354" width="200" height="120" rx="10"
            fill="url(#t5-host)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="200" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dns-east</text>
      <rect x="120" y="394" width="160" height="36" rx="6" fill="url(#t5-agent)"/>
      <text x="200" y="416" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">bind9 + dns-agent</text>
      <text x="200" y="450" text-anchor="middle" font-size="10" fill="#475569">serves LAN clients :53</text>
    </g>
    <g>
      <rect x="335" y="354" width="240" height="120" rx="10"
            fill="url(#t5-host)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="455" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dhcp-east (Kea HA)</text>
      <rect x="355" y="394" width="200" height="36" rx="6" fill="url(#t5-agent)"/>
      <text x="455" y="416" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">kea + dhcp-agent</text>
      <text x="455" y="450" text-anchor="middle" font-size="10" fill="#475569">serves LAN clients :67</text>
    </g>
    <g>
      <rect x="610" y="354" width="200" height="120" rx="10"
            fill="url(#t5-host)" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="710" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">vm-dns-west</text>
      <rect x="630" y="394" width="160" height="36" rx="6" fill="url(#t5-agent)"/>
      <text x="710" y="416" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">bind9 + dns-agent</text>
      <text x="710" y="450" text-anchor="middle" font-size="10" fill="#475569">serves LAN clients :53</text>
    </g>

    <text x="460" y="510" text-anchor="middle" font-size="11" fill="#92400e" font-style="italic">
      LAN clients query the on-prem agents directly — cloud control plane is for management only.
    </text>
    <text x="460" y="528" text-anchor="middle" font-size="11" fill="#92400e" font-style="italic">
      If the tunnel drops, agents keep serving from their last-known-good config cache (non-negotiable #5).
    </text>
  </g>
</svg>
