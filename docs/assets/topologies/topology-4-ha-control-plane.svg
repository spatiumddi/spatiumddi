<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="660" viewBox="0 0 920 660"
     preserveAspectRatio="xMidYMid meet"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="t4-host" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="t4-cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="t4-store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="t4-cache" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="t4-lb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="t4-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Operators -->
  <rect x="370" y="20" width="180" height="42" rx="21" fill="#1e293b"/>
  <text x="460" y="46" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">operators / API consumers</text>

  <!-- LB -->
  <rect x="320" y="92" width="280" height="50" rx="8" fill="url(#t4-lb)"/>
  <text x="460" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">nginx / haproxy</text>
  <text x="460" y="132" text-anchor="middle" font-size="10" fill="#dbeafe">TLS termination · sticky LB for SSE</text>
  <line x1="460" y1="62" x2="460" y2="92" stroke="#475569" stroke-width="2"
        marker-end="url(#t4-arrow)"/>

  <!-- API hosts -->
  <g>
    <rect x="100" y="180" width="240" height="100" rx="10"
          fill="url(#t4-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="220" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">vm-api-01</text>
    <rect x="120" y="218" width="90" height="48" rx="6" fill="url(#t4-cp)"/>
    <text x="165" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">api · frontend</text>
    <rect x="220" y="218" width="100" height="48" rx="6" fill="url(#t4-cp)"/>
    <text x="270" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">worker</text>
  </g>
  <g>
    <rect x="580" y="180" width="240" height="100" rx="10"
          fill="url(#t4-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="700" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">vm-api-02</text>
    <rect x="600" y="218" width="90" height="48" rx="6" fill="url(#t4-cp)"/>
    <text x="645" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">api · frontend</text>
    <rect x="700" y="218" width="100" height="48" rx="6" fill="url(#t4-cp)"/>
    <text x="750" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">worker</text>
  </g>

  <!-- Beat singleton -->
  <rect x="365" y="200" width="190" height="60" rx="8" fill="url(#t4-cp)"/>
  <text x="460" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">vm-beat (single)</text>
  <text x="460" y="246" text-anchor="middle" font-size="10" fill="#ddd6fe">celery beat — not horizontally scalable</text>

  <line x1="340" y1="142" x2="220" y2="180" stroke="#475569" stroke-width="2"
        marker-end="url(#t4-arrow)"/>
  <line x1="580" y1="142" x2="700" y2="180" stroke="#475569" stroke-width="2"
        marker-end="url(#t4-arrow)"/>

  <!-- Redis Sentinel cluster -->
  <g>
    <rect x="60" y="320" width="800" height="100" rx="12"
          fill="url(#t4-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="80" y="346" font-size="13" font-weight="600" fill="#0f172a">Redis Sentinel — 3 nodes</text>
    <rect x="180" y="358" width="180" height="48" rx="6" fill="url(#t4-cache)"/>
    <text x="270" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">vm-redis-01</text>
    <text x="270" y="396" text-anchor="middle" font-size="10" fill="#cffafe">master</text>
    <rect x="370" y="358" width="180" height="48" rx="6" fill="url(#t4-cache)"/>
    <text x="460" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">vm-redis-02</text>
    <text x="460" y="396" text-anchor="middle" font-size="10" fill="#cffafe">replica + sentinel</text>
    <rect x="560" y="358" width="180" height="48" rx="6" fill="url(#t4-cache)"/>
    <text x="650" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">vm-redis-03</text>
    <text x="650" y="396" text-anchor="middle" font-size="10" fill="#cffafe">replica + sentinel</text>
  </g>

  <!-- Patroni cluster -->
  <g>
    <rect x="60" y="450" width="800" height="160" rx="12"
          fill="url(#t4-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="80" y="476" font-size="13" font-weight="600" fill="#0f172a">Patroni cluster — 3 nodes (CloudNativePG on K8s)</text>

    <rect x="180" y="488" width="180" height="56" rx="6" fill="url(#t4-store)"/>
    <text x="270" y="510" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">vm-pg-01</text>
    <text x="270" y="528" text-anchor="middle" font-size="10" fill="#bbf7d0">primary</text>

    <rect x="370" y="488" width="180" height="56" rx="6" fill="url(#t4-store)"/>
    <text x="460" y="510" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">vm-pg-02</text>
    <text x="460" y="528" text-anchor="middle" font-size="10" fill="#bbf7d0">replica + etcd</text>

    <rect x="560" y="488" width="180" height="56" rx="6" fill="url(#t4-store)"/>
    <text x="650" y="510" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">vm-pg-03</text>
    <text x="650" y="528" text-anchor="middle" font-size="10" fill="#bbf7d0">replica + etcd</text>

    <text x="460" y="568" text-anchor="middle" font-size="11" fill="#475569">
      HAProxy in front: primary on :5432  ·  replica on :5433
    </text>
    <text x="460" y="586" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">
      restore lands on :5432 (the primary)
    </text>
  </g>
</svg>
