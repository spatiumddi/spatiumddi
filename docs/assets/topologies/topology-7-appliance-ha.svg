<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470"
     preserveAspectRatio="xMidYMid meet"
     font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="t7-host" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="t7-cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="t7-store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="t7-cache" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="t7-vip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <marker id="t7-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Operators / agents -->
  <rect x="360" y="16" width="200" height="42" rx="21" fill="#1e293b"/>
  <text x="460" y="42" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">operators / DNS · DHCP agents</text>

  <!-- MetalLB control-plane VIP -->
  <rect x="300" y="86" width="320" height="54" rx="8" fill="url(#t7-vip)"/>
  <text x="460" y="110" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">MetalLB control-plane VIP</text>
  <text x="460" y="128" text-anchor="middle" font-size="10" fill="#dbeafe">one floating IP · L2 · re-homes on node loss</text>
  <line x1="460" y1="58" x2="460" y2="86" stroke="#475569" stroke-width="2" marker-end="url(#t7-arrow)"/>

  <!-- Arrows VIP -> each node -->
  <line x1="430" y1="140" x2="170" y2="184" stroke="#475569" stroke-width="2" marker-end="url(#t7-arrow)"/>
  <line x1="460" y1="140" x2="460" y2="184" stroke="#475569" stroke-width="2" marker-end="url(#t7-arrow)"/>
  <line x1="490" y1="140" x2="750" y2="184" stroke="#475569" stroke-width="2" marker-end="url(#t7-arrow)"/>

  <!-- Node 1 — etcd seed -->
  <g>
    <rect x="30" y="184" width="260" height="214" rx="10" fill="url(#t7-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="160" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">appliance-1 · etcd seed</text>
    <rect x="45" y="222" width="230" height="34" rx="6" fill="url(#t7-cp)"/>
    <text x="160" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">k3s server + etcd</text>
    <rect x="45" y="262" width="230" height="34" rx="6" fill="url(#t7-cp)"/>
    <text x="160" y="284" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">api · frontend · worker</text>
    <rect x="45" y="302" width="230" height="34" rx="6" fill="url(#t7-store)"/>
    <text x="160" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">CNPG primary</text>
    <rect x="45" y="342" width="230" height="34" rx="6" fill="url(#t7-cache)"/>
    <text x="160" y="364" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">redis · sentinel (master)</text>
  </g>

  <!-- Node 2 -->
  <g>
    <rect x="330" y="184" width="260" height="214" rx="10" fill="url(#t7-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="460" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">appliance-2 · member</text>
    <rect x="345" y="222" width="230" height="34" rx="6" fill="url(#t7-cp)"/>
    <text x="460" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">k3s server + etcd</text>
    <rect x="345" y="262" width="230" height="34" rx="6" fill="url(#t7-cp)"/>
    <text x="460" y="284" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">api · frontend · worker</text>
    <rect x="345" y="302" width="230" height="34" rx="6" fill="url(#t7-store)"/>
    <text x="460" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">CNPG replica</text>
    <rect x="345" y="342" width="230" height="34" rx="6" fill="url(#t7-cache)"/>
    <text x="460" y="364" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">redis · sentinel (replica)</text>
  </g>

  <!-- Node 3 -->
  <g>
    <rect x="630" y="184" width="260" height="214" rx="10" fill="url(#t7-host)" stroke="#94a3b8" stroke-width="2"/>
    <text x="760" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">appliance-3 · member</text>
    <rect x="645" y="222" width="230" height="34" rx="6" fill="url(#t7-cp)"/>
    <text x="760" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">k3s server + etcd</text>
    <rect x="645" y="262" width="230" height="34" rx="6" fill="url(#t7-cp)"/>
    <text x="760" y="284" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">api · frontend · worker</text>
    <rect x="645" y="302" width="230" height="34" rx="6" fill="url(#t7-store)"/>
    <text x="760" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">CNPG replica</text>
    <rect x="645" y="342" width="230" height="34" rx="6" fill="url(#t7-cache)"/>
    <text x="760" y="364" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">redis · sentinel (replica)</text>
  </g>

  <!-- etcd quorum link between nodes -->
  <line x1="290" y1="215" x2="330" y2="215" stroke="#6d28d9" stroke-width="2" stroke-dasharray="4 3"/>
  <line x1="590" y1="215" x2="630" y2="215" stroke="#6d28d9" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Caption -->
  <text x="460" y="428" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">
    embedded-etcd quorum (3 / 5 / 7) · CNPG primary + streaming replicas · Redis Sentinel
  </text>
  <text x="460" y="448" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">
    scaled by promoting appliances in /appliance → Fleet — no Patroni / load balancer / kubectl
  </text>
</svg>
