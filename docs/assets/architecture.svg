<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="g-frontend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g-api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g-worker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g-store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="g-svc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <style>
      .box { rx: 10; ry: 10; stroke: rgba(15,23,42,0.15); stroke-width: 1; filter: drop-shadow(0 1px 2px rgba(15,23,42,0.12)); }
      .title { font-size: 18px; font-weight: 700; fill: #ffffff; }
      .sub { font-size: 12px; fill: rgba(255,255,255,0.85); }
      .layer-label { font-size: 12px; font-weight: 600; fill: #475569; letter-spacing: 0.08em; text-transform: uppercase; }
      .edge { stroke: #64748b; stroke-width: 1.5; fill: none; }
      .edge-dashed { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 5,4; fill: none; }
      .edge-label { font-size: 11px; fill: #475569; font-weight: 500; }
      .note { font-size: 11px; fill: #64748b; }
      .legend-box { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; rx: 6; ry: 6; }
    </style>
  </defs>

  <!-- Title -->
  <text x="540" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">SpatiumDDI — Architecture</text>
  <text x="540" y="52" text-anchor="middle" font-size="13" fill="#64748b">Control plane is source of truth · managed data-plane containers auto-register and sync</text>

  <!-- Layer 1: Browser / clients -->
  <text x="40" y="92" class="layer-label">Clients</text>
  <g>
    <rect x="40" y="100" width="200" height="80" class="box" fill="url(#g-frontend)"/>
    <text x="140" y="128" text-anchor="middle" class="title">Browser</text>
    <text x="140" y="148" text-anchor="middle" class="sub">React 18 + Vite SPA</text>
    <text x="140" y="164" text-anchor="middle" class="sub">served by nginx</text>
  </g>
  <g>
    <rect x="260" y="100" width="200" height="80" class="box" fill="url(#g-frontend)" fill-opacity="0.6"/>
    <text x="360" y="128" text-anchor="middle" class="title">CLI / API clients</text>
    <text x="360" y="148" text-anchor="middle" class="sub">REST + OpenAPI</text>
    <text x="360" y="164" text-anchor="middle" class="sub">Terraform / Ansible</text>
  </g>

  <!-- Layer 2: Control plane -->
  <text x="40" y="228" class="layer-label">Control plane</text>
  <g>
    <rect x="40" y="240" width="260" height="120" class="box" fill="url(#g-api)"/>
    <text x="170" y="270" text-anchor="middle" class="title">API</text>
    <text x="170" y="290" text-anchor="middle" class="sub">FastAPI · Python 3.12 · async</text>
    <text x="170" y="308" text-anchor="middle" class="sub">JWT auth · audit log · RBAC</text>
    <text x="170" y="326" text-anchor="middle" class="sub">/docs (Swagger) · /redoc</text>
    <text x="170" y="344" text-anchor="middle" class="sub">DNS agent endpoints (long-poll)</text>
  </g>
  <g>
    <rect x="320" y="240" width="180" height="58" class="box" fill="url(#g-worker)"/>
    <text x="410" y="268" text-anchor="middle" class="title">Worker</text>
    <text x="410" y="286" text-anchor="middle" class="sub">Celery · ipam / dns queues</text>
  </g>
  <g>
    <rect x="320" y="302" width="180" height="58" class="box" fill="url(#g-worker)" fill-opacity="0.85"/>
    <text x="410" y="330" text-anchor="middle" class="title">Beat</text>
    <text x="410" y="348" text-anchor="middle" class="sub">health sweep · stale agents</text>
  </g>
  <g>
    <rect x="520" y="240" width="180" height="58" class="box" fill="url(#g-store)"/>
    <text x="610" y="268" text-anchor="middle" class="title">PostgreSQL 16</text>
    <text x="610" y="286" text-anchor="middle" class="sub">IPAM · DNS · Audit</text>
  </g>
  <g>
    <rect x="520" y="302" width="180" height="58" class="box" fill="url(#g-store)" fill-opacity="0.85"/>
    <text x="610" y="330" text-anchor="middle" class="title">Redis 7</text>
    <text x="610" y="348" text-anchor="middle" class="sub">cache · celery broker</text>
  </g>

  <!-- Layer 3: Managed containers -->
  <text x="40" y="420" class="layer-label">Data plane — managed containers (auto-register)</text>
  <g>
    <rect x="40" y="432" width="300" height="240" class="box" fill="url(#g-agent)"/>
    <text x="190" y="460" text-anchor="middle" class="title">dns-bind9</text>
    <text x="190" y="478" text-anchor="middle" class="sub">ghcr.io/spatiumddi/dns-bind9</text>
    <line x1="70" y1="494" x2="310" y2="494" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
    <text x="190" y="514" text-anchor="middle" class="sub">┌─ spatium-dns-agent ─┐</text>
    <text x="190" y="534" text-anchor="middle" class="sub">bootstrap (PSK → JWT)</text>
    <text x="190" y="552" text-anchor="middle" class="sub">long-poll /config · ETag</text>
    <text x="190" y="570" text-anchor="middle" class="sub">on-disk cache · last-known-good</text>
    <text x="190" y="588" text-anchor="middle" class="sub">└──────────────────────┘</text>
    <text x="190" y="610" text-anchor="middle" class="sub">named (BIND9 9.18)</text>
    <text x="190" y="628" text-anchor="middle" class="sub">loopback nsupdate + TSIG</text>
    <text x="190" y="650" text-anchor="middle" class="sub">53/udp · 53/tcp</text>
  </g>
  <g>
    <rect x="360" y="432" width="220" height="100" class="box" fill="url(#g-svc)"/>
    <text x="470" y="460" text-anchor="middle" class="title">dhcp (Kea + ISC)</text>
    <text x="470" y="482" text-anchor="middle" class="sub">Phase 2 — planned</text>
    <text x="470" y="500" text-anchor="middle" class="sub">same agent pattern</text>
    <text x="470" y="518" text-anchor="middle" class="sub">HA failover</text>
  </g>
<g>
    <rect x="600" y="432" width="220" height="210" class="box" fill="#e2e8f0" fill-opacity="0.6" stroke="#94a3b8" stroke-dasharray="4,4"/>
    <text x="710" y="462" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Deployment shapes</text>
    <text x="710" y="488" text-anchor="middle" font-size="12" fill="#475569">• docker compose (dev)</text>
    <text x="710" y="508" text-anchor="middle" font-size="12" fill="#475569">• kubernetes + helm</text>
    <text x="710" y="528" text-anchor="middle" font-size="12" fill="#475569">  (1 StatefulSet per server)</text>
    <text x="710" y="548" text-anchor="middle" font-size="12" fill="#475569">• bare-metal systemd</text>
    <text x="710" y="568" text-anchor="middle" font-size="12" fill="#475569">• OS appliance image</text>
    <text x="710" y="600" text-anchor="middle" font-size="12" fill="#475569">multi-arch: amd64 · arm64</text>
  </g>

  <!-- Edges: browser → api -->
  <path d="M 140 180 L 140 240" class="edge" marker-end="url(#arrow)"/>
  <text x="152" y="212" class="edge-label">HTTPS</text>
  <path d="M 360 180 L 200 240" class="edge" marker-end="url(#arrow)"/>

  <!-- api ↔ redis/pg -->
  <path d="M 300 290 L 320 290" class="edge" marker-end="url(#arrow)"/>
  <path d="M 300 330 L 320 330" class="edge" marker-end="url(#arrow)"/>
  <path d="M 500 274 L 520 274" class="edge" marker-end="url(#arrow)"/>
  <text x="507" y="265" class="edge-label">async SQL</text>
  <path d="M 500 330 L 520 330" class="edge" marker-end="url(#arrow)"/>
  <text x="507" y="320" class="edge-label">pub/sub</text>

  <!-- api ↔ dns agent (long-poll + heartbeat) -->
  <path d="M 170 360 L 190 432" class="edge" marker-end="url(#arrow)"/>
  <text x="100" y="398" class="edge-label">long-poll /config · heartbeat</text>
  <path d="M 190 432 L 190 360" class="edge-dashed" marker-end="url(#arrow)"/>

  <!-- Notes / legend -->
  <rect x="860" y="92" width="200" height="88" class="legend-box"/>
  <text x="872" y="112" font-size="13" font-weight="700" fill="#334155">Non-negotiables</text>
  <text x="872" y="132" class="note">• API-first (UI wraps REST)</text>
  <text x="872" y="150" class="note">• Agent cache = source of truth</text>
  <text x="872" y="168" class="note">  during control-plane outage</text>

  <rect x="860" y="240" width="200" height="120" class="legend-box"/>
  <text x="872" y="260" font-size="13" font-weight="700" fill="#334155">DNS flow (RFC 2136)</text>
  <text x="872" y="280" class="note">1. User edits record in UI</text>
  <text x="872" y="298" class="note">2. API queues RecordOp</text>
  <text x="872" y="316" class="note">3. Agent drains via /config</text>
  <text x="872" y="334" class="note">4. Loopback nsupdate + TSIG</text>
  <text x="872" y="352" class="note">5. Named serves new record</text>
</svg>
