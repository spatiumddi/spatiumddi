name: spatiumddi

# ─────────────────────────────────────────────────────────────────────────────
# Development override — re-introduces `build:` for services that are
# normally pulled from ghcr.io, so you can rebuild from the local tree.
#
# Enable it by layering this file on top of the base compose:
#
#   # one-off:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml <cmd>
#
#   # or pin it for the whole shell:
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml
#
#   # then:
#   docker compose build api migrate frontend dns-bind9
#   docker compose run --rm migrate
#   docker compose up -d --force-recreate
#
# `make dev` already wires both files automatically.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      POSTGRES_USER: spatiumddi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: spatiumddi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatiumddi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - spatiumddi
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API Backend ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    # Docker integration — uncomment both entries to poll the host
    # daemon over Unix socket. ``DOCKER_GID`` must match the gid of
    # ``/var/run/docker.sock`` on the host:
    #   stat -c '%g' /var/run/docker.sock
    # then set ``DOCKER_GID=<that number>`` in .env. Without the
    # group_add the api user gets EACCES on the socket.
    volumes:
      # Backup target storage (issue #117 Phase 1b). Named volume
      # so archives survive container recycle. Mount path matches
      # the default ``LocalVolumeDestination`` config.
      - spatium_backups:/var/lib/spatiumddi/backups
    # Docker integration — uncomment alongside the matching
    # group_add. ``DOCKER_GID`` must match the gid of
    # ``/var/run/docker.sock`` on the host.
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    # group_add:
    #   - "${DOCKER_GID:-999}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q ipam,dns,dhcp,default
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      # Backup target storage (issue #117 Phase 1b). Same named
      # volume the api mounts — the worker runs the scheduled
      # sweep so it has to write the same files the api reads
      # back from the "list archives" endpoint.
      - spatium_backups:/var/lib/spatiumddi/backups
    # Docker integration — the worker runs the reconcile tasks, so it
    # needs the host socket too. Uncomment alongside the matching
    # entries on the api service above.
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    # group_add:
    #   - "${DOCKER_GID:-999}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # The backend Dockerfile's HEALTHCHECK probes /health/live — correct
    # for the api service but wrong for the worker (no HTTP listener).
    # Override with a Celery-native ping over the broker.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    # Beat has no HTTP listener and no broker-reachable identity, so the
    # cheapest liveness signal is "the beat process is still pid 1".
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'celery' /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend (nginx + Vite build) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api

  # ── Migrations (runs once at startup) ──────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - spatiumddi
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── DNS agent (BIND9) ────────────────────────────────────────────────
  # Enable with: docker compose --profile dns-bind9 up -d
  # ``dns`` profile remains as a back-compat alias for the bind9 dev
  # build. ``dns-powerdns`` opts into the second authoritative driver.
  dns-bind9:
    profiles: ["dns", "dns-bind9"]
    build:
      context: .
      dockerfile: agent/dns/images/bind9/Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      CONTROL_PLANE_URL: http://api:8000
      DNS_AGENT_KEY: ${DNS_AGENT_KEY:-changeme-dns-agent-key}
      SERVER_NAME: dns-bind9
      AGENT_GROUP: default
      AGENT_ROLES: authoritative
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
    volumes:
      - dns_bind9_state:/var/lib/spatium-dns-agent
      - dns_bind9_cache:/var/cache/bind
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
    depends_on:
      api:
        condition: service_started

  # ── DNS agent (PowerDNS) ─────────────────────────────────────────────
  # Enable with: docker compose --profile dns-powerdns up -d
  # Distinct host port (5453, not 5353) so a side-by-side BIND9 +
  # PowerDNS dev setup doesn't collide. AGENT_GROUP defaults to
  # ``default-powerdns`` so both groups exist in parallel; mixing
  # drivers inside one group is rejected by the control plane (every
  # PowerDNS-only feature gates on it).
  dns-powerdns:
    profiles: ["dns-powerdns"]
    build:
      context: .
      dockerfile: agent/dns/images/powerdns/Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      CONTROL_PLANE_URL: http://api:8000
      DNS_AGENT_KEY: ${DNS_AGENT_KEY:-changeme-dns-agent-key}
      SERVER_NAME: dns-powerdns
      AGENT_GROUP: default-powerdns
      AGENT_ROLES: authoritative
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
    volumes:
      - dns_powerdns_state:/var/lib/spatium-dns-agent
      - dns_powerdns_lmdb:/var/lib/powerdns
    ports:
      - "5453:53/udp"
      - "5453:53/tcp"
    depends_on:
      api:
        condition: service_started

  # ── DHCP agent (primary) ──────────────────────────────────────────────
  # Enable with:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml \
  #     --profile dhcp up -d                                  # single node
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml \
  #     --profile dhcp --profile dhcp-ha up -d                # HA pair
  #
  # Service names, volumes, and profiles match docker-compose.yml so the
  # dev overlay is a clean build-from-source override of the published
  # images.
  dhcp-kea:
    profiles: ["dhcp"]
    build:
      context: .
      dockerfile: agent/dhcp/images/kea/Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      # ── Required ──────────────────────────────────────────────────
      # Control-plane URL the agent bootstraps + long-polls against.
      SPATIUM_API_URL: http://api:8000
      # Pre-shared key exchanged for a rotating JWT on first join.
      SPATIUM_AGENT_KEY: ${DHCP_AGENT_KEY:-changeme-dhcp-agent-key}

      # ── Registration ──────────────────────────────────────────────
      # Unique server name — becomes Kea's `this-server-name` under HA.
      SPATIUM_SERVER_NAME: dhcp-kea
      AGENT_GROUP: default
      # Informational only — actual HA role is driven by channel membership.
      AGENT_ROLES: primary

      # ── TLS ───────────────────────────────────────────────────────
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
      # TLS_CA_PATH: /etc/ssl/spatium-ca.crt

      # ── Tuning (optional, defaults shown) ─────────────────────────
      # LOG_LEVEL: INFO             # DEBUG | INFO | WARNING | ERROR
      # HEARTBEAT_INTERVAL: "30"    # seconds between agent heartbeats
      # LONGPOLL_TIMEOUT: "30"      # seconds the /config long-poll blocks
      # CACHE_DIR: /var/lib/spatium-dhcp-agent   # bundle + JWT cache
      # KEA_CONFIG_PATH: /etc/kea/kea-dhcp4.conf
      # KEA_CONTROL_SOCKET: /run/kea/kea4-ctrl-socket
      # KEA_LEASE_FILE: /var/lib/kea/kea-leases4.csv
    volumes:
      - dhcp_kea_state:/var/lib/spatium-dhcp-agent
      - dhcp_kea_leases:/var/lib/kea
    # ports:
    #   # Host 6767/udp → container 67/udp. DHCPv4 is awkward to expose
    #   # without host networking — use `network_mode: host` for real lab use.
    #   - "6767:67/udp"
    #   # HA hook peer-to-peer HTTP listener. Must stay on container :8000
    #   # (that's the peer URL advertised to the partner). Host-side mapped
    #   # off 8000 so the control plane API keeps :8000.
    #   - "8001:8000/tcp"
    #   # Optional kea-ctrl-agent REST (operator-facing). Lives on :8544
    #   # inside the container — see agent/dhcp/images/kea/kea-ctrl-agent.conf
    #   # for why it's deliberately not on :8000.
    #   - "8544:8544/tcp"
    depends_on:
      api:
        condition: service_started
    # Kea runs as non-root and needs to bind UDP/67. No NET_RAW/NET_ADMIN —
    # this server accepts relayed DHCP (unicast from relay agents), it does
    # NOT need to listen for L2 broadcasts on the host LAN.
    cap_add:
      - NET_BIND_SERVICE

  # ── DHCP agent (secondary, HA peer) ───────────────────────────────────
  # Only starts with `--profile dhcp-ha`. Pair dhcp-kea + dhcp-kea-2 in
  # a DHCPFailoverChannel (Admin → Failover Channels) with per-peer URLs
  # reachable on the spatiumddi bridge:
  #   primary_peer_url:   http://dhcp-kea:8000/
  #   secondary_peer_url: http://dhcp-kea-2:8000/
  dhcp-kea-2:
    profiles: ["dhcp-ha"]
    build:
      context: .
      dockerfile: agent/dhcp/images/kea/Dockerfile
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      SPATIUM_API_URL: http://api:8000
      SPATIUM_AGENT_KEY: ${DHCP_AGENT_KEY:-changeme-dhcp-agent-key}

      # Unique — drives a distinct DHCPServer row + Kea HA this-server-name.
      SPATIUM_SERVER_NAME: dhcp-kea-2
      AGENT_GROUP: default
      AGENT_ROLES: secondary

      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
      # TLS_CA_PATH: /etc/ssl/spatium-ca.crt

      # Tuning (see dhcp-kea above for the full list).
      # LOG_LEVEL: INFO
      # HEARTBEAT_INTERVAL: "30"
      # LONGPOLL_TIMEOUT: "30"
    volumes:
      - dhcp_kea_state_2:/var/lib/spatium-dhcp-agent
      - dhcp_kea_leases_2:/var/lib/kea
    # ports:
    #   # Distinct host ports so both peers can listen without colliding.
    #   - "6768:67/udp"
    #   - "8002:8000/tcp"   # HA hook peer-to-peer HTTP
    #   - "8545:8544/tcp"   # optional kea-ctrl-agent REST
    depends_on:
      api:
        condition: service_started
    cap_add:
      - NET_BIND_SERVICE


networks:
  spatiumddi:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  dns_bind9_state:
  dns_bind9_cache:
  dns_powerdns_state:
  dns_powerdns_lmdb:
  dhcp_kea_state:
  dhcp_kea_leases:
  dhcp_kea_state_2:
  dhcp_kea_leases_2:
  spatium_backups: