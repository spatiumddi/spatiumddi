# ─────────────────────────────────────────────────────────────────────────────
# SpatiumDDI perf — HEADLINE 24h university-scale load + soak run.
# 250k devices, diurnal curve, DDNS on, query-log OFF, operator stream on.
# Regenerated from docs/PERFORMANCE_TESTING.md §0.A canonical numbers + §7.3.
#
# Topology = relay (campus realism, multi-subnet). This is a Phase-0 decision:
# if relay proves fiddly for v1, copy this to a broadcast variant (single subnet,
# dhcp.topology=broadcast, one giaddr-less scope) — see smoke.yaml for that shape.
# Secrets are NEVER here — token + psql DSN are referenced by env-var name only.
# ─────────────────────────────────────────────────────────────────────────────
schema_version: 1
run:
  name: university-24h
  profile: full
  notes: "250k-device diurnal soak, relay topology, DDNS on, qlog off, operator stream on"

target:
  node_ip: 10.20.0.10                 # EDIT: the clean appliance node IP
  api_base: https://10.20.0.10/api
  dhcp:
    port: 67
    topology: relay                   # relay | broadcast (Phase-0 decision, §3.1.2)
    giaddr:                           # one per subnet (8); each matches a scope's relay.ip-addresses
      - 10.0.0.1
      - 10.1.0.1
      - 10.2.0.1
      - 10.3.0.1
      - 10.4.0.1
      - 10.5.0.1
      - 10.6.0.1
      - 10.7.0.1
  dns:
    port: 53
    driver: bind9
    recursion: false                  # MUST be false (§4.9 DNS safety)
  appliance:
    expected_version: ">=2026.06.19-1"   # loose pin — record, don't ==-gate (§8.1.1)
    cnpg_instances: 1
    redis_kind: sentinel-single

scale:
  unique_devices: 250000
  peak_active_devices: 150000
  students: 50000
  lease_time_s: 7200                   # 2h headline; T1=900s HARDCODED (confirm Phase 0)
  ddns_enabled: true
  query_log_enabled: false            # OFF in the headline (firehose-soak variant tests it on)
  hostname_fraction: 0.7              # DDNS-publishing fraction (§3.2 write-pressure lever)
  operator_mutation_stream:
    enabled: true
    sustained_per_s: 3
    burst_per_s: 50

seed:
  ip_block: 10.0.0.0/8
  subnets:
    count: 8
    prefix: 16
    pool_fraction: 0.90
  dns:
    forward_zones: ["campus.example.edu"]
    reverse_zone_shape: per-octet     # per-octet | single (§0.A; per-octet headline)
    reverse_zones:                    # 8 — one /16 reverse zone per subnet (2nd octet)
      - 0.10.in-addr.arpa
      - 1.10.in-addr.arpa
      - 2.10.in-addr.arpa
      - 3.10.in-addr.arpa
      - 4.10.in-addr.arpa
      - 5.10.in-addr.arpa
      - 6.10.in-addr.arpa
      - 7.10.in-addr.arpa
    authoritative_records: 250000     # §4.9 Layer 1 — bulk-load the large auth dataset
  statics: 0                          # leases auto-mirror; do NOT pre-seed addresses
  relay_addresses_per_scope: true     # seeder sets relay.ip-addresses=[giaddr_i] per subnet

diurnal:                              # §1.3 hourly weights (0..1 of peak arrivals)
  arrival_weights: [0.05, 0.03, 0.02, 0.02, 0.03, 0.10, 0.45, 0.95, 1.00, 0.85, 0.80, 0.82,
                    0.85, 0.80, 0.78, 0.75, 0.70, 0.65, 0.55, 0.45, 0.35, 0.25, 0.15, 0.08]
  dns_qps_sustained_peak: 18000       # the curve value (NOT the burst ceiling)
  dns_qps_burst_ceiling: 120000       # raw-protocol resperf/dnsperf target only
  dora_per_s_peak: 12.5

phases:
  - {name: baseline_t0, minutes: 10,  load: idle}
  - {name: ramp,        minutes: 75,  load: ramp,  from: idle,   to: steady}
  - {name: steady,      minutes: 210, load: steady}
  - {name: surge_ramp,  minutes: 30,  load: ramp,  from: steady, to: peak}
  - {name: peak,        minutes: 75,  load: peak,  probe_ceiling: true}
  - {name: soak,        minutes: 900, load: diurnal, fault_injection: true}
  - {name: drain,       minutes: 15,  load: ramp,  from: steady, to: idle, wait_convergence: true}

slo:                                  # [tune-after-baseline] — see §8.3
  slo_thresholds_version: v1-proposed
  dhcp_ack_p99_ms: 50
  dns_resolve_p99_ms: 20
  lease_to_ipam_to_dns_p95_s: 10
  api_5xx_rate_max: 0.005

guardrails:
  kill_switch_file: run/STOP
  max_dora_per_s: 400
  max_dns_qps: 150000
  max_lease_events_per_s: 400
  watchdog:
    poll_interval_s: 5
    throttle_before_abort: true
    abort_on:
      health_platform_component_down: true
      pg_connections_pct_of_max: 0.95
      pg_longest_txn_s: 120
      redis_used_memory_pct: 0.90
      celery_queue_depth: 50000

observability:
  superadmin_token_env: SPDDI_PERF_ADMIN_TOKEN   # token lifetime >= run length (§7.6.6)
  psql_dsn_env: SPDDI_PERF_PSQL_DSN              # direct psql for pg_locks/deadlocks
  enable_pg_stat_statements: true
  poll:
    health_platform_s: 5
    postgres_overview_s: 15
    postgres_tables_s: 30
    redis_overview_s: 15
    metrics_timeseries_s: 60
    psql_locks_s: 30

disk_budget:                          # §7.6.3 — pre-computed, sizes the test VM disk
  est_24h_gb: 28
  required_pv_gb: 64
