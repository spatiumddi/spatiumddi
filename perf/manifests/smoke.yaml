# ─────────────────────────────────────────────────────────────────────────────
# SpatiumDDI perf — SMOKE run (~40 min). The GATED predecessor to the 24h run (§1.9).
# Validates the whole harness end-to-end (generators reach the box, agents ingest,
# war-room populates, SLO math computes), calibrates generator capacity, and
# baseline-tunes thresholds — BEFORE committing 24h.
#
# Topology = broadcast (single subnet, no relay/giaddr setup) so the smoke runs on a
# load-gen box on the same L2 broadcast domain with zero relay plumbing. Small scale.
# ─────────────────────────────────────────────────────────────────────────────
schema_version: 1
run:
  name: smoke
  profile: smoke
  notes: "compressed end-to-end harness validation + capacity calibration + baseline tuning"

target:
  node_ip: 10.20.0.10                 # EDIT: the clean appliance node IP
  api_base: https://10.20.0.10/api
  dhcp:
    port: 67
    topology: broadcast               # single VLAN/scope, no giaddr
    giaddr: []
  dns:
    port: 53
    driver: bind9
    recursion: false
  appliance:
    expected_version: ">=2026.06.19-1"
    cnpg_instances: 1
    redis_kind: sentinel-single

scale:
  unique_devices: 10000
  peak_active_devices: 10000
  students: 10000
  lease_time_s: 1800                  # 30 min — forces renews inside the smoke window
  ddns_enabled: true
  query_log_enabled: false
  hostname_fraction: 0.7
  operator_mutation_stream:
    enabled: true
    sustained_per_s: 3
    burst_per_s: 30

seed:
  ip_block: 10.0.0.0/8
  subnets:
    count: 1
    prefix: 16
    pool_fraction: 0.90
  dns:
    forward_zones: ["campus.example.edu"]
    reverse_zone_shape: single
    reverse_zones: ["0.10.in-addr.arpa"]
    authoritative_records: 10000
  statics: 0
  relay_addresses_per_scope: false

diurnal:
  arrival_weights: [0.05, 0.03, 0.02, 0.02, 0.03, 0.10, 0.45, 0.95, 1.00, 0.85, 0.80, 0.82,
                    0.85, 0.80, 0.78, 0.75, 0.70, 0.65, 0.55, 0.45, 0.35, 0.25, 0.15, 0.08]
  dns_qps_sustained_peak: 3000
  dns_qps_burst_ceiling: 20000
  dora_per_s_peak: 8

phases:                               # ~40 min, hits every phase transition (§1.9)
  - {name: baseline_t0, minutes: 5,  load: idle}
  - {name: ramp,        minutes: 10, load: ramp,  from: idle,   to: steady}
  - {name: surge_ramp,  minutes: 5,  load: ramp,  from: steady, to: peak}
  - {name: peak,        minutes: 10, load: peak,  probe_ceiling: true}
  - {name: soak,        minutes: 8,  load: diurnal, fault_injection: false}
  - {name: drain,       minutes: 2,  load: ramp,  from: steady, to: idle, wait_convergence: true}

slo:
  slo_thresholds_version: v1-proposed
  dhcp_ack_p99_ms: 50
  dns_resolve_p99_ms: 20
  lease_to_ipam_to_dns_p95_s: 10
  api_5xx_rate_max: 0.005

guardrails:
  kill_switch_file: run/STOP
  max_dora_per_s: 200
  max_dns_qps: 30000
  max_lease_events_per_s: 200
  watchdog:
    poll_interval_s: 5
    throttle_before_abort: true
    abort_on:
      health_platform_component_down: true
      pg_connections_pct_of_max: 0.95
      pg_longest_txn_s: 120
      redis_used_memory_pct: 0.90
      celery_queue_depth: 50000

observability:
  superadmin_token_env: SPDDI_PERF_ADMIN_TOKEN
  psql_dsn_env: SPDDI_PERF_PSQL_DSN
  enable_pg_stat_statements: true
  poll:
    health_platform_s: 5
    postgres_overview_s: 15
    postgres_tables_s: 30
    redis_overview_s: 15
    metrics_timeseries_s: 60
    psql_locks_s: 30

disk_budget:
  est_24h_gb: 2
  required_pv_gb: 16
