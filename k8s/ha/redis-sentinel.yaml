# Redis HA via Sentinel (3 replicas + 3 sentinel processes)
# Uses the Bitnami Redis Helm chart pattern without Helm, for plain manifests.
# For production, strongly prefer the Bitnami Helm chart or Redis Operator:
#   helm repo add bitnami https://charts.bitnami.com/bitnami
#   helm install redis bitnami/redis -n spatiumddi \
#     --set auth.password=CHANGEME \
#     --set sentinel.enabled=true \
#     --set replica.replicaCount=2
#
# The manifests below provide a minimal working sentinel setup.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: spatiumddi
data:
  redis.conf: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    appendonly yes
    # #590 — a hard power loss tears the AOF mid-write, and redis defaults
    # ``aof-load-corrupt-tail-max-size`` to 0: ANY corruption is fatal, so a
    # replica killed mid-write crashloops forever on "Bad file format
    # reading the append only file" (observed bricking a 3-node cluster over
    # 158 bytes of torn cache). Redis here is the cache + Celery broker and
    # Postgres is the store of record, so discarding a torn tail always
    # beats never booting again. Plain byte count (16 MiB) — redis rejects a
    # "16mb"-style suffix on this directive.
    #
    # Distinct from ``aof-load-truncated`` (default yes), which only covers a
    # tail that ENDS mid-record. A power cut typically leaves a tail that is
    # present but zero-filled (ext4 records the new size before the data
    # lands) — that reads as corrupt, not short, and needs this.
    aof-load-corrupt-tail-max-size 16777216
    requirepass CHANGEME
    masterauth CHANGEME

  sentinel.conf: |
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor mymaster redis-0.redis-headless.spatiumddi.svc.cluster.local 6379 2
    sentinel auth-pass mymaster CHANGEME
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 60000
    sentinel parallel-syncs mymaster 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: spatiumddi
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      # #590 — spread the replicas one per node. Required (not preferred):
      # a single node hosting two of three replicas takes both the data
      # majority AND the sentinel quorum with it when it dies, and with
      # per-replica ReadWriteOnce PVCs a mis-placed replica is pinned to
      # that node forever. A replica with nowhere to land stays Pending,
      # which is loud — the alternative is a cluster that silently isn't HA.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: redis
              topologyKey: kubernetes.io/hostname
      # A dead node must release its replica in seconds, not the k8s
      # default 300 s, or sentinel failover races the pod eviction.
      tolerations:
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 20
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 20
      initContainers:
        # Set replica-of on non-primary pods
        - name: init-redis
          image: redis:8.6-alpine
          command:
            - sh
            - -c
            - |
              if [ "${HOSTNAME}" = "redis-0" ]; then
                cp /config/redis.conf /data/redis.conf
              else
                cp /config/redis.conf /data/redis.conf
                echo "replicaof redis-0.redis-headless.spatiumddi.svc.cluster.local 6379" >> /data/redis.conf
              fi
              cp /config/sentinel.conf /data/sentinel.conf
              # #590 — announce this pod by its STABLE StatefulSet FQDN rather
              # than its ephemeral pod IP. A rescheduled pod otherwise returns
              # with a new IP + a new runid, so peers add a SECOND entry while
              # the old one lingers as s_down forever (Sentinel never forgets a
              # Sentinel it has seen; only SENTINEL RESET clears one).
              #
              # Failover needs a majority of ALL KNOWN sentinels — ghosts sit in
              # the denominator and never vote. With 3 live pods the third ghost
              # makes failover mathematically impossible (known 6, need 4, usable
              # 3): the master is stranded and the sentinel:// clients never
              # resolve one again.
              POD_FQDN="${HOSTNAME}.redis-headless.spatiumddi.svc.cluster.local"
              printf 'replica-announce-ip %s\nreplica-announce-port 6379\n' \
                "$POD_FQDN" >> /data/redis.conf
              printf 'sentinel announce-ip %s\nsentinel announce-port 26379\n' \
                "$POD_FQDN" >> /data/sentinel.conf
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      containers:
        - name: redis
          image: redis:8.6-alpine
          command: ["redis-server", "/data/redis.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "CHANGEME", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        - name: sentinel
          image: redis:8.6-alpine
          command: ["redis-sentinel", "/data/sentinel.conf"]
          ports:
            - containerPort: 26379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: spatiumddi
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
    - name: sentinel
      port: 26379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: spatiumddi
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
