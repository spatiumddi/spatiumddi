apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dns-powerdns-ns1
  namespace: spatiumddi
  labels:
    app.kubernetes.io/name: spatium-dns
    app.kubernetes.io/instance: pdns1
    spatiumddi.org/dns-flavor: powerdns
spec:
  serviceName: dns-powerdns-ns1-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spatium-dns
      app.kubernetes.io/instance: pdns1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spatium-dns
        app.kubernetes.io/instance: pdns1
        spatiumddi.org/dns-flavor: powerdns
    spec:
      containers:
        - name: dns
          image: ghcr.io/spatiumddi/dns-powerdns:latest
          env:
            - name: CONTROL_PLANE_URL
              value: http://spatiumddi-api.spatiumddi.svc.cluster.local:8000
            - name: SERVER_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: AGENT_GROUP
              value: internal-resolvers
            - name: AGENT_DRIVER
              value: powerdns
            - name: PDNS_FLAVOR
              value: auth
            - name: DNS_AGENT_KEY
              valueFrom:
                secretKeyRef:
                  name: spatium-dns-agent-key
                  key: DNS_AGENT_KEY
          ports:
            - { name: dns-udp, containerPort: 53, protocol: UDP }
            - { name: dns-tcp, containerPort: 53, protocol: TCP }
          volumeMounts:
            - { name: agent-state, mountPath: /var/lib/spatium-dns-agent }
            - { name: pdns-state,  mountPath: /var/lib/powerdns }
  volumeClaimTemplates:
    - metadata: { name: agent-state }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 1Gi } }
    - metadata: { name: pdns-state }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 2Gi } }
