# Per-server external Service (LoadBalancer) exposing UDP+TCP 53.
# Duplicate per StatefulSet so each ns1/ns2/... gets its own VIP.
apiVersion: v1
kind: Service
metadata:
  name: dns-bind9-ns1
  namespace: spatiumddi
  labels:
    app.kubernetes.io/name: spatium-dns
    app.kubernetes.io/instance: ns1
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: spatium-dns
    app.kubernetes.io/instance: ns1
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    # Encrypted transports — DoT / DoH (issue #50). Off by default; the
    # ports live in the database, not here. Uncomment to match the ports
    # configured under DNS → Server Groups → Options, and add the matching
    # containerPorts in bind9-statefulset.yaml.
    # - name: dns-dot
    #   port: 853
    #   targetPort: 853
    #   protocol: TCP
    # - name: dns-doh
    #   port: 8443
    #   targetPort: 8443
    #   protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: dns-bind9-ns1-headless
  namespace: spatiumddi
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: spatium-dns
    app.kubernetes.io/instance: ns1
  ports:
    - { name: dns-udp, port: 53, protocol: UDP }
    - { name: dns-tcp, port: 53, protocol: TCP }
