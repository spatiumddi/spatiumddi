apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: spatiumddi
  labels:
    app.kubernetes.io/name: spatiumddi
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spatiumddi-worker
  template:
    metadata:
      labels:
        app: spatiumddi-worker
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/spatiumddi/spatiumddi-api:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - ipam,default
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spatiumddi-secrets
                  key: postgres-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: spatiumddi-secrets
                  key: secret-key
            - name: DATABASE_URL
              value: "postgresql+asyncpg://spatiumddi:$(POSTGRES_PASSWORD)@postgres-primary:5432/spatiumddi"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: spatiumddi-config
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: spatiumddi-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: spatiumddi-config
                  key: CELERY_RESULT_BACKEND
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 1Gi
---
# Beat runs as a singleton — only 1 replica allowed
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: spatiumddi
  labels:
    app.kubernetes.io/name: spatiumddi
    app.kubernetes.io/component: beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spatiumddi-beat
  strategy:
    # Recreate prevents two beat schedulers running simultaneously
    type: Recreate
  template:
    metadata:
      labels:
        app: spatiumddi-beat
        app.kubernetes.io/component: beat
    spec:
      containers:
        - name: beat
          image: ghcr.io/spatiumddi/spatiumddi-api:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.celery_app
            - beat
            - --loglevel=info
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spatiumddi-secrets
                  key: postgres-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: spatiumddi-secrets
                  key: secret-key
            - name: DATABASE_URL
              value: "postgresql+asyncpg://spatiumddi:$(POSTGRES_PASSWORD)@postgres-primary:5432/spatiumddi"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: spatiumddi-config
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: spatiumddi-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: spatiumddi-config
                  key: CELERY_RESULT_BACKEND
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
