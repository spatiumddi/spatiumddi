apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: spatiumddi
  labels:
    app.kubernetes.io/name: spatiumddi
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spatiumddi-frontend
  template:
    metadata:
      labels:
        app: spatiumddi-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/spatiumddi/spatiumddi-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: spatiumddi
spec:
  selector:
    app: spatiumddi-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# Ingress — adjust host and TLS secret for your environment
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spatiumddi
  namespace: spatiumddi
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Uncomment to enable cert-manager / Let's Encrypt:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - spatiumddi.example.com
  #     secretName: spatiumddi-tls
  rules:
    - host: spatiumddi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
