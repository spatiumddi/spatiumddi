name: Bug report
description: Something is broken or behaves incorrectly
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much as you can — it saves a round trip.

  - type: input
    id: version
    attributes:
      label: SpatiumDDI version
      description: "Git tag, image tag, or short commit SHA"
      placeholder: "e.g. 2026.04.16-1 or ghcr.io/spatiumddi/api:2026.04.16-2"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Kubernetes (Helm)
        - Kubernetes (manifests)
        - Bare metal / systemd
        - OS appliance
        - Local dev (make dev)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - IPAM
        - DNS
        - DHCP
        - Auth (local / LDAP / OIDC / SAML / RADIUS / TACACS+)
        - Permissions / RBAC
        - Audit / Observability
        - Frontend / UI
        - API
        - Migrations / DB
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / tracebacks
      description: API, worker, or browser console logs. Please redact secrets.
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment details
      description: PostgreSQL version, Redis version, reverse proxy, auth provider type, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am running a recent SpatiumDDI release (within the last ~2 releases)
          required: false
