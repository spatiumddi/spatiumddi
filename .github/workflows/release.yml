name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*"  # e.g. 2026.04.13-1

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

# Default to read-only; individual jobs widen with packages:write / contents:write.
permissions:
  contents: read

jobs:
  # ── Extract version metadata ───────────────────────────────────────────────
  meta:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha_short: ${{ steps.ver.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker images ─────────────────────────────────────────────
  # NOTE: All build jobs use a single step with platforms: linux/amd64,linux/arm64
  # (via QEMU) rather than a matrix. The matrix pattern pushes each platform to
  # the same tag separately, causing the second push to overwrite the first and
  # producing a single-platform image instead of a proper multi-arch manifest.

  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/spatiumddi-api:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/spatiumddi-api:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_APP_VERSION=${{ needs.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/spatiumddi-frontend:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/spatiumddi-frontend:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-dns:
    name: Build DNS agent image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent/dns/images/bind9/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dns-bind9:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/dns-bind9:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-dns-powerdns:
    name: Build DNS PowerDNS agent image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent/dns/images/powerdns/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dns-powerdns:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/dns-powerdns:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-dhcp:
    name: Build DHCP agent image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent/dhcp/images/kea/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dhcp-kea:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/dhcp-kea:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Build supervisor image (issue #170 Wave A1) ────────────────────────────
  # Host-side controller for the upcoming Application install role.
  # Phase A1 ships a scaffolding-only supervisor — the image builds +
  # boots + idles. Real work (identity / register / cert / role-driven
  # docker compose + nftables) lands in Waves A2 → D.
  build-supervisor:
    name: Build Supervisor image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent/supervisor/images/supervisor/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/spatium-supervisor:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/spatium-supervisor:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Publish Helm chart (OCI) ───────────────────────────────────────────────
  # Packages `charts/spatiumddi` (umbrella: api + frontend + worker + beat
  # + migrate + Postgres/Redis subcharts + optional DNS/DHCP agents) and
  # pushes it as an OCI artifact to ghcr.io/<owner>/charts/spatiumddi:
  # <chart_version>. Consumers then:
  #
  #   helm install ddi oci://ghcr.io/spatiumddi/charts/spatiumddi \
  #     --version <chart_version>
  #
  # The in-repo Chart.yaml version is a placeholder; the release tag
  # (with leading zeroes stripped for SemVer-2 compliance) is the
  # authoritative published version.
  publish-chart:
    name: Publish Helm chart (OCI)
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    outputs:
      chart_version: ${{ steps.pkg.outputs.chart_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                -u "${{ github.actor }}" \
                --password-stdin
      - name: Pull chart dependencies
        # Bitnami subcharts (postgresql, redis) are referenced by OCI
        # URL in Chart.yaml — resolve them before packaging.
        run: helm dependency update charts/spatiumddi
      - id: pkg
        name: Package + push chart
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          # Helm enforces strict SemVer 2, which forbids leading zeroes
          # in MAJOR.MINOR.PATCH. Our CalVer tag (2026.04.20-1) carries
          # `04` and sometimes `-01`, so strip them: 2026.04.20-1 ->
          # 2026.4.20-1. The original tag is kept as appVersion so the
          # human-readable release identity survives on the artifact.
          CHART_VERSION=$(echo "$VERSION" | sed -E 's/\.0([0-9])/.\1/g; s/-0([0-9]+)$/-\1/')
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "→ packaging spatiumddi version=${CHART_VERSION} appVersion=${VERSION}"
          mkdir -p dist
          helm package charts/spatiumddi \
            --version "$CHART_VERSION" \
            --app-version "$VERSION" \
            --destination ./dist
          helm push \
            "./dist/spatiumddi-${CHART_VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

  # ── Build appliance ISO ─────────────────────────────────────────────────────
  # Drives mkosi inside the published appliance-builder container the
  # same way ``make appliance && make appliance-iso`` does on a laptop,
  # then publishes the resulting hybrid USB/CD ISO as a release asset.
  #
  # The ISO is the "slim" variant — no images baked into mkosi.extra/.
  # spatiumddi-firstboot does ``docker compose pull`` from ghcr.io on
  # first boot, which is why this job hangs off the image-build jobs
  # in ``needs`` even though it doesn't actually consume their outputs:
  # if any image build fails, the ISO would land on an appliance that
  # then can't pull its services, so we'd rather not publish it.
  build-appliance-iso:
    name: Build appliance ISO
    runs-on: ubuntu-latest
    # Only needs `meta` (for the version stamp). The container images
    # are NOT baked into the ISO — firstboot pulls them from ghcr.io
    # at first boot via the compose's ``image: ghcr.io/spatiumddi/…``
    # references. So the ISO build can run in parallel with the five
    # image builds; the only true cross-job dependency is the final
    # ``release`` job that fans in on everyone to attach artefacts.
    needs: meta
    permissions:
      contents: read
      packages: read
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Stamp /etc/spatiumddi/appliance-release with CalVer
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          # Drop the build-time version stamp into mkosi.extra so it
          # gets baked into the rootfs at build. ``spatiumddi-firstboot``
          # + ``spatium-upgrade-slot`` + ``spatium-console`` all read
          # this file to surface APPLIANCE_VERSION. Without this stamp
          # every released appliance reports the placeholder "0.1.0"
          # regardless of which release ISO they came from.
          mkdir -p appliance/mkosi.extra/etc/spatiumddi
          {
              echo "APPLIANCE_VERSION=\"${VERSION}\""
              echo "BUILD_TIME=\"$(date -u -Iseconds)\""
              echo "GIT_SHA=\"${GITHUB_SHA}\""
          } > appliance/mkosi.extra/etc/spatiumddi/appliance-release
          echo "→ Stamped appliance-release:"
          cat appliance/mkosi.extra/etc/spatiumddi/appliance-release
      - name: Build raw image (mkosi)
        run: |
          set -euo pipefail
          BUILDER=${{ env.IMAGE_PREFIX }}/appliance-builder:latest
          echo "→ Pulling $BUILDER"
          docker pull "$BUILDER"
          mkdir -p appliance/build
          echo "→ Running mkosi build (this takes 5–10 min)"
          docker run --rm --privileged \
            -v "$PWD/appliance:/work" \
            "$BUILDER" \
            --output-directory=build --force build
          ls -lh appliance/build/
      - name: Wrap as hybrid USB/CD ISO
        id: wrap
        run: |
          set -euo pipefail
          BUILDER=${{ env.IMAGE_PREFIX }}/appliance-builder:latest
          VERSION="${{ needs.meta.outputs.version }}"
          RAW=$(ls appliance/build/spatiumddi-appliance*.raw | head -1)
          [ -f "$RAW" ] || { echo "✗ no raw image found"; exit 1; }
          ISO_INTERIM="${RAW%.raw}.iso"
          docker run --rm --privileged \
            --entrypoint /work/scripts/wrap-iso.sh \
            -v "$PWD/appliance:/work" \
            "$BUILDER" \
            "/work/build/$(basename "$RAW")" \
            "/work/build/$(basename "$ISO_INTERIM")"
          # Two copies attached per release:
          #   - Versioned (archive trail of every release ever cut)
          #   - Stable filename (un-versioned, so the README can link to
          #     https://.../releases/latest/download/spatiumddi-appliance-amd64.iso
          #     and that URL always 302s to the current release's ISO)
          # mkosi's own ImageVersion in mkosi.conf is ``0.1.0`` (internal
          # scheme); we rename to operator-visible CalVer here.
          VERSIONED="appliance/build/spatiumddi-appliance-${VERSION}.iso"
          STABLE="appliance/build/spatiumddi-appliance-amd64.iso"
          mv "$ISO_INTERIM" "$VERSIONED"
          cp "$VERSIONED" "$STABLE"
          ls -lh "$VERSIONED" "$STABLE"
          echo "iso_path=$VERSIONED" >> "$GITHUB_OUTPUT"
          echo "iso_name=spatiumddi-appliance-${VERSION}.iso" >> "$GITHUB_OUTPUT"
      # Phase 8b-4 — build the slot upgrade image alongside the ISO so
      # operators can apply atomic OS upgrades from the /appliance UI
      # without manually building images locally. Same docker invocation
      # the local Makefile uses, just inlined for CI.
      - name: Build slot-upgrade image (.raw.xz + sha256)
        id: slot
        run: |
          set -euo pipefail
          BUILDER=${{ env.IMAGE_PREFIX }}/appliance-builder:latest
          VERSION="${{ needs.meta.outputs.version }}"
          RAW=$(ls appliance/build/spatiumddi-appliance*.raw | head -1)
          [ -f "$RAW" ] || { echo "✗ no raw image found"; exit 1; }
          chmod +x appliance/scripts/build-slot-image.sh
          docker run --rm --privileged \
            --entrypoint /work/scripts/build-slot-image.sh \
            -v "$PWD/appliance:/work" \
            "$BUILDER" \
            "/work/build/$(basename "$RAW")" \
            "/work/build"
          # build-slot-image.sh writes spatiumddi-appliance-slot-<mkosi-
          # ImageVersion>.{raw.xz,sha256}. Rename to operator-visible
          # names: versioned (archive) + stable (latest-link target).
          SRC_XZ=$(ls appliance/build/spatiumddi-appliance-slot-*.raw.xz | head -1)
          [ -f "$SRC_XZ" ] || { echo "✗ no slot .raw.xz built"; exit 1; }
          VERSIONED_XZ="appliance/build/spatiumddi-appliance-slot-${VERSION}-amd64.raw.xz"
          STABLE_XZ="appliance/build/spatiumddi-appliance-slot-amd64.raw.xz"
          VERSIONED_SHA="appliance/build/spatiumddi-appliance-slot-${VERSION}-amd64.sha256"
          STABLE_SHA="appliance/build/spatiumddi-appliance-slot-amd64.sha256"
          mv "$SRC_XZ" "$VERSIONED_XZ"
          cp "$VERSIONED_XZ" "$STABLE_XZ"
          # Regenerate sha files so the hash inside them references the
          # correct (renamed) filename — important for `sha256sum -c`.
          ( cd appliance/build && sha256sum "$(basename "$VERSIONED_XZ")" > "$(basename "$VERSIONED_SHA")" )
          ( cd appliance/build && sha256sum "$(basename "$STABLE_XZ")" > "$(basename "$STABLE_SHA")" )
          ls -lh "$VERSIONED_XZ" "$STABLE_XZ" "$VERSIONED_SHA" "$STABLE_SHA"
          echo "slot_name=spatiumddi-appliance-slot-${VERSION}-amd64.raw.xz" >> "$GITHUB_OUTPUT"
      - name: Upload appliance artifacts (ISO + slot image)
        uses: actions/upload-artifact@v4
        with:
          name: appliance-artifacts
          path: |
            appliance/build/spatiumddi-appliance-*.iso
            appliance/build/spatiumddi-appliance-slot-*.raw.xz
            appliance/build/spatiumddi-appliance-slot-*.sha256
          retention-days: 7
          if-no-files-found: error
    outputs:
      iso_name: ${{ steps.wrap.outputs.iso_name }}
      slot_name: ${{ steps.slot.outputs.slot_name }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      [
        meta,
        build-api,
        build-frontend,
        build-dns,
        build-dns-powerdns,
        build-dhcp,
        build-supervisor,
        build-appliance-iso,
        publish-chart,
      ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract bundled component versions
        id: bundled
        # Pulls the just-published DNS + DHCP agent images and reads the
        # ``/etc/spatiumddi-versions`` file each Dockerfile writes at build
        # time (post ``apk add bind`` / ``apk add kea …``). Surfaces the
        # exact BIND9 + Kea + Alpine package versions in the release notes
        # so operators can map a release tag to the bytes inside.
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          DNS_IMG="${{ env.IMAGE_PREFIX }}/dns-bind9:${VERSION}"
          DHCP_IMG="${{ env.IMAGE_PREFIX }}/dhcp-kea:${VERSION}"

          docker pull --platform linux/amd64 "$DNS_IMG"
          docker pull --platform linux/amd64 "$DHCP_IMG"

          BIND_VERSIONS=$(docker run --rm --platform linux/amd64 --entrypoint cat \
            "$DNS_IMG" /etc/spatiumddi-versions)
          KEA_VERSIONS=$(docker run --rm --platform linux/amd64 --entrypoint cat \
            "$DHCP_IMG" /etc/spatiumddi-versions)

          {
            echo "BIND_VERSIONS<<BV_EOF"
            printf '%s\n' "$BIND_VERSIONS"
            echo "BV_EOF"
            echo "KEA_VERSIONS<<KV_EOF"
            printf '%s\n' "$KEA_VERSIONS"
            echo "KV_EOF"
          } >> "$GITHUB_ENV"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.meta.outputs.version }}"

          # Extract the "## <VERSION>" section from CHANGELOG.md (up to the
          # next "## " heading). Use awk index() so dots in the version are
          # treated literally, not as regex wildcards.
          NOTES=$(awk -v v="$VERSION" '
            index($0, "## " v) == 1 { found = 1; next }
            found && index($0, "## ") == 1 { exit }
            found { print }
          ' CHANGELOG.md)

          # Fall back to a commit shortlog if the CHANGELOG section is empty
          # or missing (e.g. forgot to update it before tagging).
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::notice::No CHANGELOG section for $VERSION — using commit shortlog"
            PREV_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]{4}\.' | sed -n '2p')
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
            else
              NOTES=$(git log HEAD --oneline --no-merges | head -30)
            fi
          else
            # Run through the changelog transformer so the GitHub release
            # body reads as flowing prose instead of a wall of forced
            # `<br>`s. The release renderer applies GFM with breaks=true,
            # so every `\n` in the source becomes a literal break — but
            # CHANGELOG.md is hard-wrapped at ~70 chars for terminal
            # reading. The transformer joins consecutive prose lines into
            # one (preserving blank-line paragraph breaks, code fences,
            # bullet lists, and headings), wraps the top summary in
            # `### 🚀 Highlights`, and emoji-prefixes the standard
            # Keep-a-Changelog section headers (`✨ Added`, `🔧 Changed`,
            # `🐛 Fixed`, `🔒 Security`, `🗃️ Migrations`, …). Idempotent
            # — re-running on already-transformed text is a no-op.
            NOTES=$(printf '%s\n' "$NOTES" | python3 scripts/format_release_notes.py)
          fi

          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            printf '%s\n' "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_ENV"

          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]{4}\.' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
          fi

      - name: Download appliance artifacts (ISO + slot image)
        uses: actions/download-artifact@v4
        with:
          name: appliance-artifacts
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: "SpatiumDDI ${{ needs.meta.outputs.version }}"
          files: |
            dist/spatiumddi-appliance-*.iso
            dist/spatiumddi-appliance-slot-*.raw.xz
            dist/spatiumddi-appliance-slot-*.sha256
          body: |
            ## What's Changed

            ${{ env.CHANGELOG }}

            ## OS Appliance ISO

            Hybrid USB/CD installer image attached as a release asset
            (``${{ needs.build-appliance-iso.outputs.iso_name }}``). Burn
            to USB with ``sudo dd if=… of=/dev/sdX bs=4M conv=fsync`` or
            attach as a CD-ROM in your hypervisor. See
            [docs/deployment/APPLIANCE.md](https://github.com/${{ github.repository }}/blob/${{ needs.meta.outputs.version }}/docs/deployment/APPLIANCE.md)
            for the install walkthrough. The ISO is the **slim** variant —
            no images baked in; first boot pulls every service from ghcr.io.

            **Stable URL** (always points at the latest release):

            ```
            https://github.com/${{ github.repository }}/releases/latest/download/spatiumddi-appliance-amd64.iso
            ```

            ## OS Appliance Slot Upgrade Image

            For Phase 8 atomic A/B upgrades on the installed appliance.
            Paste this URL into the OS Image card on ``/appliance``'s
            Releases tab, or run on the appliance:

            ```
            spatium-upgrade-slot apply \
              https://github.com/${{ github.repository }}/releases/latest/download/spatiumddi-appliance-slot-amd64.raw.xz \
              --checksum https://github.com/${{ github.repository }}/releases/latest/download/spatiumddi-appliance-slot-amd64.sha256
            ```

            Writes the image into the inactive A/B slot, arms grub to
            try it on next boot, auto-rolls back if `/health/live`
            doesn't come up healthy. Active slot is never touched
            during apply. Versioned filename
            (``${{ needs.build-appliance-iso.outputs.slot_name }}``)
            attached too for archival.

            ## Docker Images

            ```
            docker pull ghcr.io/${{ github.repository_owner }}/spatiumddi-api:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/spatiumddi-frontend:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/dns-bind9:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/dns-powerdns:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/dhcp-kea:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/spatium-supervisor:${{ needs.meta.outputs.version }}
            ```

            ## Bundled Component Versions

            Resolved at build time by `apk info` inside the agent images and
            also written to `/etc/spatiumddi-versions` inside each container
            for runtime inspection.

