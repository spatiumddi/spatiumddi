name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*"  # e.g. 2026.04.13-1

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

# Default to read-only; individual jobs widen with packages:write / contents:write.
permissions:
  contents: read

jobs:
  # ── Extract version metadata ───────────────────────────────────────────────
  meta:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha_short: ${{ steps.ver.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker images ─────────────────────────────────────────────
  # NOTE: All build jobs use a single step with platforms: linux/amd64,linux/arm64
  # (via QEMU) rather than a matrix. The matrix pattern pushes each platform to
  # the same tag separately, causing the second push to overwrite the first and
  # producing a single-platform image instead of a proper multi-arch manifest.

  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/spatiumddi-api:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/spatiumddi-api:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_APP_VERSION=${{ needs.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/spatiumddi-frontend:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/spatiumddi-frontend:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-dns:
    name: Build DNS agent image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent/dns/images/bind9/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dns-bind9:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/dns-bind9:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-dhcp:
    name: Build DHCP agent image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent/dhcp/images/kea/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/dhcp-kea:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/dhcp-kea:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Publish Helm chart (OCI) ───────────────────────────────────────────────
  # Packages `charts/spatiumddi` (umbrella: api + frontend + worker + beat
  # + migrate + Postgres/Redis subcharts + optional DNS/DHCP agents) and
  # pushes it as an OCI artifact to ghcr.io/<owner>/charts/spatiumddi:
  # <chart_version>. Consumers then:
  #
  #   helm install ddi oci://ghcr.io/spatiumddi/charts/spatiumddi \
  #     --version <chart_version>
  #
  # The in-repo Chart.yaml version is a placeholder; the release tag
  # (with leading zeroes stripped for SemVer-2 compliance) is the
  # authoritative published version.
  publish-chart:
    name: Publish Helm chart (OCI)
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    outputs:
      chart_version: ${{ steps.pkg.outputs.chart_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                -u "${{ github.actor }}" \
                --password-stdin
      - name: Pull chart dependencies
        # Bitnami subcharts (postgresql, redis) are referenced by OCI
        # URL in Chart.yaml — resolve them before packaging.
        run: helm dependency update charts/spatiumddi
      - id: pkg
        name: Package + push chart
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          # Helm enforces strict SemVer 2, which forbids leading zeroes
          # in MAJOR.MINOR.PATCH. Our CalVer tag (2026.04.20-1) carries
          # `04` and sometimes `-01`, so strip them: 2026.04.20-1 ->
          # 2026.4.20-1. The original tag is kept as appVersion so the
          # human-readable release identity survives on the artifact.
          CHART_VERSION=$(echo "$VERSION" | sed -E 's/\.0([0-9])/.\1/g; s/-0([0-9]+)$/-\1/')
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "→ packaging spatiumddi version=${CHART_VERSION} appVersion=${VERSION}"
          mkdir -p dist
          helm package charts/spatiumddi \
            --version "$CHART_VERSION" \
            --app-version "$VERSION" \
            --destination ./dist
          helm push \
            "./dist/spatiumddi-${CHART_VERSION}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, build-api, build-frontend, build-dns, build-dhcp, publish-chart]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract bundled component versions
        id: bundled
        # Pulls the just-published DNS + DHCP agent images and reads the
        # ``/etc/spatiumddi-versions`` file each Dockerfile writes at build
        # time (post ``apk add bind`` / ``apk add kea …``). Surfaces the
        # exact BIND9 + Kea + Alpine package versions in the release notes
        # so operators can map a release tag to the bytes inside.
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          DNS_IMG="${{ env.IMAGE_PREFIX }}/dns-bind9:${VERSION}"
          DHCP_IMG="${{ env.IMAGE_PREFIX }}/dhcp-kea:${VERSION}"

          docker pull --platform linux/amd64 "$DNS_IMG"
          docker pull --platform linux/amd64 "$DHCP_IMG"

          BIND_VERSIONS=$(docker run --rm --platform linux/amd64 --entrypoint cat \
            "$DNS_IMG" /etc/spatiumddi-versions)
          KEA_VERSIONS=$(docker run --rm --platform linux/amd64 --entrypoint cat \
            "$DHCP_IMG" /etc/spatiumddi-versions)

          {
            echo "BIND_VERSIONS<<BV_EOF"
            printf '%s\n' "$BIND_VERSIONS"
            echo "BV_EOF"
            echo "KEA_VERSIONS<<KV_EOF"
            printf '%s\n' "$KEA_VERSIONS"
            echo "KV_EOF"
          } >> "$GITHUB_ENV"

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.meta.outputs.version }}"

          # Extract the "## <VERSION>" section from CHANGELOG.md (up to the
          # next "## " heading). Use awk index() so dots in the version are
          # treated literally, not as regex wildcards.
          NOTES=$(awk -v v="$VERSION" '
            index($0, "## " v) == 1 { found = 1; next }
            found && index($0, "## ") == 1 { exit }
            found { print }
          ' CHANGELOG.md)

          # Fall back to a commit shortlog if the CHANGELOG section is empty
          # or missing (e.g. forgot to update it before tagging).
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::notice::No CHANGELOG section for $VERSION — using commit shortlog"
            PREV_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]{4}\.' | sed -n '2p')
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
            else
              NOTES=$(git log HEAD --oneline --no-merges | head -30)
            fi
          else
            # Run through the changelog transformer so the GitHub release
            # body reads as flowing prose instead of a wall of forced
            # `<br>`s. The release renderer applies GFM with breaks=true,
            # so every `\n` in the source becomes a literal break — but
            # CHANGELOG.md is hard-wrapped at ~70 chars for terminal
            # reading. The transformer joins consecutive prose lines into
            # one (preserving blank-line paragraph breaks, code fences,
            # bullet lists, and headings), wraps the top summary in
            # `### 🚀 Highlights`, and emoji-prefixes the standard
            # Keep-a-Changelog section headers (`✨ Added`, `🔧 Changed`,
            # `🐛 Fixed`, `🔒 Security`, `🗃️ Migrations`, …). Idempotent
            # — re-running on already-transformed text is a no-op.
            NOTES=$(printf '%s\n' "$NOTES" | python3 scripts/format_release_notes.py)
          fi

          {
            echo "CHANGELOG<<CHANGELOG_EOF"
            printf '%s\n' "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_ENV"

          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]{4}\.' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          name: "SpatiumDDI ${{ needs.meta.outputs.version }}"
          body: |
            ## What's Changed

            ${{ env.CHANGELOG }}

            ## Docker Images

            ```
            docker pull ghcr.io/${{ github.repository_owner }}/spatiumddi-api:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/spatiumddi-frontend:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/dns-bind9:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/dhcp-kea:${{ needs.meta.outputs.version }}
            ```

            ## Bundled Component Versions

            Resolved at build time by `apk info` inside the agent images and
            also written to `/etc/spatiumddi-versions` inside each container
            for runtime inspection.

            **DNS agent image** (`dns-bind9:${{ needs.meta.outputs.version }}`)
            ```
            ${{ env.BIND_VERSIONS }}
            ```

            **DHCP agent image** (`dhcp-kea:${{ needs.meta.outputs.version }}`)
            ```
            ${{ env.KEA_VERSIONS }}
            ```

            ## Helm Chart

            ```
            helm install ddi oci://ghcr.io/${{ github.repository_owner }}/charts/spatiumddi \
              --version ${{ needs.publish-chart.outputs.chart_version }} \
              --namespace spatiumddi --create-namespace
            ```

            ## Full Changelog
            ${{ env.PREV_TAG && format('https://github.com/{0}/compare/{1}...{2}', github.repository, env.PREV_TAG, needs.meta.outputs.version) || format('https://github.com/{0}/commits/{1}', github.repository, needs.meta.outputs.version) }}
          generate_release_notes: false
