name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*"  # e.g. 2026.04.13-1

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Extract version metadata ───────────────────────────────────────────────
  meta:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      sha_short: ${{ steps.ver.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  # ── Build & push Docker images ─────────────────────────────────────────────
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/spatiumddi-api:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/spatiumddi-api:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            VITE_APP_VERSION=${{ needs.meta.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/spatiumddi-frontend:${{ needs.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/spatiumddi-frontend:latest
          labels: |
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
            org.opencontainers.image.revision=${{ needs.meta.outputs.sha_short }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, build-api, build-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^[0-9]{4}\.' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          else
            LOG=$(git log HEAD --oneline --no-merges | head -30)
          fi
          echo "CHANGELOG<<EOF" >> "$GITHUB_ENV"
          echo "$LOG" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          name: "SpatiumDDI ${{ needs.meta.outputs.version }}"
          body: |
            ## What's Changed

            ${{ env.CHANGELOG }}

            ## Docker Images

            ```
            docker pull ghcr.io/${{ github.repository_owner }}/spatiumddi-api:${{ needs.meta.outputs.version }}
            docker pull ghcr.io/${{ github.repository_owner }}/spatiumddi-frontend:${{ needs.meta.outputs.version }}
            ```

            ## Full Changelog
            https://github.com/${{ github.repository }}/compare/${{ needs.meta.outputs.version }}...HEAD
          generate_release_notes: false
