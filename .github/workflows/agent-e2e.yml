name: Agent E2E (kind)

# Spins up a kind cluster, installs the umbrella Helm chart with both
# DNS-agent flavors (BIND9 + PowerDNS) enabled side by side, and
# verifies:
#   1. Every deployment + statefulset reaches Ready.
#   2. The API's /health/live returns 200 via a port-forward.
#   3. The BIND9 agent answers ``dig version.bind CH TXT`` — cheap
#      "daemon is alive" probe that doesn't need pre-seeded zone data.
#   4. The PowerDNS agent answers ``dig id.server CH TXT`` — pdns's
#      CHAOS-class equivalent.
#   5. Both pods register and stay stable (low restart count).
#
# Tag selection — control-plane vs agent images publish on different
# cadences, so they need different tags:
#
# * ``ghcr.io/spatiumddi/spatiumddi-{api,frontend}`` — built only by
#   ``release.yml`` on CalVer tag push. ``:latest`` exists; ``:main``
#   does not. So control-plane workloads pin ``:latest``.
# * ``ghcr.io/spatiumddi/{dns-bind9,dns-powerdns,dhcp-kea}`` — built
#   by ``build-dns-images.yml`` / ``build-dhcp-images.yml`` on every
#   push to main, so ``:main`` is fresh. We use ``:main`` here so PR
#   smokes exercise the actually-current agent image, and to dodge
#   the ``dns-powerdns:latest`` gap (Phase 4b landed after the most
#   recent CalVer release, so the latest tag isn't stamped yet).

on:
  pull_request:
    # Frontend-only PRs are deliberately *not* listed: this workflow
    # smokes the umbrella chart against pre-built ``:latest`` images
    # from the registry, so a frontend source change can't affect
    # the install path until the frontend image rebuild + retag
    # happens on a separate workflow on merge. Listing ``frontend/**``
    # here would just attach a 10-minute helm install to dependabot
    # JS-package bumps for no signal — see the chart pre-install hook
    # bug tracked as a follow-up.
    paths:
      - "agent/**"
      - "charts/spatiumddi/**"
      - "backend/**"
      - ".github/workflows/agent-e2e.yml"
  workflow_dispatch:
    inputs:
      control_tag:
        description: "Control-plane image tag (api / frontend / worker / beat)"
        required: false
        default: "latest"
      agent_tag:
        description: "Agent image tag (dns-bind9 / dns-powerdns / dhcp-kea)"
        required: false
        default: "main"

# Least-privilege default — this workflow only needs to read the repo
# to pull the chart + manifests. No contents/packages/issues/PR
# writes. Keeps CodeQL's actions/missing-workflow-permissions rule
# happy and survives a repo default that's stricter than read-all.
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.22.0
          cluster_name: spatium-e2e
          wait: 120s

      - name: Pull chart subcharts
        # No-op today (the chart has no subchart deps after the
        # Bitnami → in-chart Postgres + Redis migration), kept around
        # so adding a future dep doesn't need a workflow edit.
        run: helm dependency update charts/spatiumddi

      - name: Preload official postgres + redis images into kind
        # Sidesteps Docker Hub anonymous-pull rate limits (100/6h/IP)
        # on shared GH runners. ``library/postgres`` and
        # ``library/redis`` (the official images) aren't subject to
        # the namespace pruning that hit ``bitnami/*`` in late 2025,
        # but the rate limit still applies. Pulling once on the host
        # and side-loading into kind means the cluster never talks
        # to docker.io. Tags come from ``helm template`` so they stay
        # in lockstep with the chart's image pins in values.yaml
        # automatically.
        run: |
          PG_IMAGE=$(helm template ddi charts/spatiumddi 2>/dev/null \
            | grep -E "image: \"?postgres:" -m1 \
            | sed -E 's/.*image: "?([^" ]+)"?.*/\1/')
          RD_IMAGE=$(helm template ddi charts/spatiumddi 2>/dev/null \
            | grep -E "image: \"?redis:" -m1 \
            | sed -E 's/.*image: "?([^" ]+)"?.*/\1/')
          echo "preloading $PG_IMAGE + $RD_IMAGE into kind"
          for img in "$PG_IMAGE" "$RD_IMAGE"; do
            for attempt in 1 2 3; do
              if docker pull "$img"; then break; fi
              echo "pull attempt $attempt failed; retrying after 10s..."
              sleep 10
            done
            kind load docker-image "$img" --name spatium-e2e
          done

      - name: Install chart
        id: install
        run: |
          CONTROL_TAG="${{ github.event.inputs.control_tag || 'latest' }}"
          AGENT_TAG="${{ github.event.inputs.agent_tag || 'main' }}"
          echo "Installing chart with control-plane tag=${CONTROL_TAG}, agent tag=${AGENT_TAG}"
          # The agent PSK has to be pre-shared with the control plane
          # before the agent first connects — we set it explicitly so
          # the auto-registration path can authenticate. For a real
          # deployment operators pre-create an external secret; the
          # inline value here is only safe because the cluster dies
          # with the workflow run.
          # Both flavors get pinned to the same TAG so the test
          # exercises a coherent build cohort. Mixed flavor list
          # makes the chart render two StatefulSets that live in
          # different DNSServerGroups (e2e-bind9 + e2e-powerdns) —
          # mirrors the production "split groups by driver" model
          # the control plane gates rely on.
          helm install ddi charts/spatiumddi \
            --namespace spatiumddi --create-namespace \
            --wait --timeout 10m \
            --set image.tag="${CONTROL_TAG}" \
            --set postgresql.persistence.size=1Gi \
            --set postgresql.resources.requests.cpu=100m \
            --set postgresql.resources.requests.memory=128Mi \
            --set redis.persistence.size=512Mi \
            --set redis.resources.requests.cpu=50m \
            --set redis.resources.requests.memory=64Mi \
            --set dnsAgents.enabled=true \
            --set dnsAgents.agentKey.value=e2e-dns-key \
            --set dnsAgents.image.tag="${AGENT_TAG}" \
            --set dnsAgents.flavors.powerdns.tag="${AGENT_TAG}" \
            --set-json 'dnsAgents.servers=[{"name":"ns1","flavor":"bind9","role":"primary","group":"e2e-bind9","service":{"type":"ClusterIP"}},{"name":"pdns1","flavor":"powerdns","role":"primary","group":"e2e-powerdns","service":{"type":"ClusterIP"}}]'

      - name: Dump pod state
        if: always()
        run: |
          kubectl -n spatiumddi get pods -o wide
          kubectl -n spatiumddi get svc
          kubectl -n spatiumddi get pvc

      - name: API health check
        run: |
          # Port-forward the API in the background; the subshell dies
          # when the step ends. Give it 3s to establish.
          kubectl -n spatiumddi port-forward svc/ddi-spatiumddi-api 18000:8000 &
          PF_PID=$!
          trap "kill $PF_PID || true" EXIT
          sleep 3
          for i in 1 2 3 4 5; do
            if curl -fsS "http://127.0.0.1:18000/health/live"; then
              echo
              echo "API /health/live OK on attempt $i"
              exit 0
            fi
            echo "attempt $i: API not ready yet; sleeping…"
            sleep 5
          done
          echo "API never became healthy"
          kubectl -n spatiumddi logs deploy/ddi-spatiumddi-api --tail=100 || true
          exit 1

      - name: BIND9 daemon smoke (dig version.bind CH TXT)
        run: |
          POD=$(kubectl -n spatiumddi get pod \
            -l app.kubernetes.io/component=dns-agent,spatiumddi.org/dns-flavor=bind9 \
            -o jsonpath='{.items[0].metadata.name}')
          if [ -z "$POD" ]; then
            echo "no BIND9 agent pod found"
            kubectl -n spatiumddi get pods --show-labels
            exit 1
          fi
          echo "→ probing named in pod $POD"
          # version.bind CH TXT is answered by BIND regardless of zone
          # configuration — smoke-tests that the daemon loaded and is
          # listening on :53. The agent image ships dig in its debug
          # toolbox (confirm in agent/dns/images/bind9/Dockerfile).
          kubectl -n spatiumddi exec "$POD" -- dig +time=5 +tries=1 +short version.bind CH TXT @127.0.0.1 || {
            echo "dig failed — dumping logs:"
            kubectl -n spatiumddi logs "$POD" --tail=80
            exit 1
          }

      - name: PowerDNS daemon smoke (dig id.server CH TXT)
        run: |
          POD=$(kubectl -n spatiumddi get pod \
            -l app.kubernetes.io/component=dns-agent,spatiumddi.org/dns-flavor=powerdns \
            -o jsonpath='{.items[0].metadata.name}')
          if [ -z "$POD" ]; then
            echo "no PowerDNS agent pod found"
            kubectl -n spatiumddi get pods --show-labels
            exit 1
          fi
          echo "→ probing pdns_server in pod $POD"
          # id.server CH TXT is the PowerDNS analogue of BIND's
          # version.bind — answered by pdns regardless of zone state,
          # so this smoke-tests that pdns_server loaded and is
          # listening on :53. The dns-powerdns image ships dig in its
          # debug toolbox (confirm in agent/dns/images/powerdns/
          # Dockerfile). Allow up to ~30s for first-boot LMDB seed
          # before the answer lands — kind kicks pods harder than a
          # warm prod cluster, and the entrypoint's lmdb create-bind-db
          # is one-shot but slow on initial cold start.
          for i in 1 2 3 4 5 6; do
            if kubectl -n spatiumddi exec "$POD" -- dig +time=5 +tries=1 +short id.server CH TXT @127.0.0.1; then
              echo "pdns answered on attempt $i"
              exit 0
            fi
            echo "attempt $i: pdns not ready yet; sleeping…"
            sleep 5
          done
          echo "pdns dig never succeeded — dumping logs:"
          kubectl -n spatiumddi logs "$POD" --tail=120
          exit 1

      - name: PowerDNS DNSSEC online signing smoke (Phase 5 / #127)
        run: |
          # Phase 5 extension of the Phase 4c smoke test: prove that
          # the daemon can actually sign a zone end-to-end and that
          # ``dig +dnssec`` returns AD-flagged answers from the local
          # resolver-that-isn't, just to confirm the signing pipeline
          # is wired. Uses ``pdnsutil`` inside the pod so we don't
          # have to wrangle the agent-generated REST API key — direct
          # LMDB writes via the same binary the agent shells out to
          # for cryptokey ops are a faithful equivalent.
          POD=$(kubectl -n spatiumddi get pod \
            -l app.kubernetes.io/component=dns-agent,spatiumddi.org/dns-flavor=powerdns \
            -o jsonpath='{.items[0].metadata.name}')
          if [ -z "$POD" ]; then
            echo "no PowerDNS agent pod found"
            exit 1
          fi
          ZONE="dnssec-smoke.test."
          echo "→ creating zone $ZONE inside $POD"
          kubectl -n spatiumddi exec "$POD" -- pdnsutil create-zone "$ZONE" || {
            echo "pdnsutil create-zone failed; dumping logs:"
            kubectl -n spatiumddi logs "$POD" --tail=120
            exit 1
          }
          kubectl -n spatiumddi exec "$POD" -- pdnsutil add-record "$ZONE" www A 192.0.2.42
          echo "→ signing $ZONE"
          kubectl -n spatiumddi exec "$POD" -- pdnsutil secure-zone "$ZONE"
          kubectl -n spatiumddi exec "$POD" -- pdnsutil rectify-zone "$ZONE"
          # Verify the signed answer comes back with RRSIG records.
          # We don't expect AD here — pdns_server is authoritative,
          # not a validating resolver — but RRSIG presence proves the
          # zone is signed and the rrsets carry signatures. AD-flag
          # validation belongs in a downstream resolver test.
          OUT=$(kubectl -n spatiumddi exec "$POD" -- dig +dnssec +short www.${ZONE} @127.0.0.1)
          echo "$OUT"
          if echo "$OUT" | grep -q "192.0.2.42"; then
            echo "DNSSEC signing smoke OK — A answer present"
          else
            echo "expected A answer for www.${ZONE} not found; dumping logs:"
            kubectl -n spatiumddi logs "$POD" --tail=120
            exit 1
          fi
          # Inspect the rrset directly for RRSIG presence — +short
          # strips RRSIG by design, so re-issue without it.
          if kubectl -n spatiumddi exec "$POD" -- dig +dnssec www.${ZONE} @127.0.0.1 | grep -q "RRSIG"; then
            echo "RRSIG present in answer — signing pipeline confirmed"
          else
            echo "no RRSIG in dig output — signing didn't take effect"
            kubectl -n spatiumddi exec "$POD" -- pdnsutil show-zone "$ZONE" || true
            kubectl -n spatiumddi logs "$POD" --tail=120
            exit 1
          fi
          # Cleanup so a re-run on the same pod doesn't trip on a
          # pre-existing zone (kind clusters are ephemeral but be
          # explicit anyway).
          kubectl -n spatiumddi exec "$POD" -- pdnsutil delete-zone "$ZONE" || true

      - name: DNS agents registered with control plane
        run: |
          kubectl -n spatiumddi port-forward svc/ddi-spatiumddi-api 18001:8000 &
          PF_PID=$!
          trap "kill $PF_PID || true" EXIT
          sleep 3
          # Without an admin token we can only hit unauthenticated
          # endpoints; the agent register endpoint is open (trusts the
          # PSK). A "server registered" signal is that each agent pod
          # isn't restarting — crude but useful, and we now check both
          # flavors so a powerdns-side regression doesn't slip past
          # because the bind9 pod looks fine.
          set -u
          fail=0
          for flavor in bind9 powerdns; do
            RESTARTS=$(kubectl -n spatiumddi get pod \
              -l app.kubernetes.io/component=dns-agent,spatiumddi.org/dns-flavor=${flavor} \
              -o jsonpath='{.items[0].status.containerStatuses[0].restartCount}')
            if [ "${RESTARTS:-0}" -gt "2" ]; then
              echo "${flavor} agent pod restarted ${RESTARTS} times — registration likely failing"
              kubectl -n spatiumddi logs \
                -l app.kubernetes.io/component=dns-agent,spatiumddi.org/dns-flavor=${flavor} --tail=200
              fail=1
            else
              echo "${flavor} agent pod stable (restarts=${RESTARTS:-0})"
            fi
          done
          exit $fail

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "─── API logs ───"
          kubectl -n spatiumddi logs deploy/ddi-spatiumddi-api --tail=200 || true
          echo "─── Worker logs ───"
          kubectl -n spatiumddi logs deploy/ddi-spatiumddi-worker --tail=100 || true
          echo "─── Beat logs ───"
          kubectl -n spatiumddi logs deploy/ddi-spatiumddi-beat --tail=100 || true
          echo "─── DNS agent logs ───"
          kubectl -n spatiumddi logs -l app.kubernetes.io/component=dns-agent --tail=200 || true
          echo "─── Postgres logs ───"
          kubectl -n spatiumddi logs statefulset/ddi-spatiumddi-postgresql --tail=80 || true
