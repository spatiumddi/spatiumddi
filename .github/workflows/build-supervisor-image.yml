name: Build Supervisor Image

on:
  push:
    branches: [main]
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*"
    paths:
      - "agent/supervisor/**"
      - ".github/workflows/build-supervisor-image.yml"
  pull_request:
    paths:
      - "agent/supervisor/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/spatiumddi/spatium-supervisor
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build (PR — single-arch, load locally for Trivy)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent/supervisor/images/supervisor/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ghcr.io/spatiumddi/spatium-supervisor:pr-scan
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=spatium-supervisor
          cache-to: type=gha,mode=max,scope=spatium-supervisor

      - name: Build and push (main / tag — multi-arch, push to ghcr)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent/supervisor/images/supervisor/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=spatium-supervisor
          cache-to: type=gha,mode=max,scope=spatium-supervisor

      - name: Trivy scan
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/spatiumddi/spatium-supervisor:pr-scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
