name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # ``paths-ignore`` is deliberately absent. Skipped workflow runs
  # don't post the required check-runs the ``protect-main`` ruleset
  # waits for, so docs-only PRs (CHANGELOG bumps, README polish,
  # release-prep PRs) sit BLOCKED forever even though every code
  # check would be a no-op. Cheaper to spend ~7 min of free runner
  # time on a docs PR than to maintain the bypass-actor dance on
  # every release.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: python -m ruff check app tests

      - name: black check
        run: python -m black --check app tests

      - name: mypy
        run: python -m mypy app

      # Enforces the expand/contract migration contract (issue #296).
      # Every Alembic migration must be safe against BOTH N-1 and N
      # application code during the rolling-upgrade mixed-version
      # window. The linter is stdlib-only and runs from repo root, so
      # the ``working-directory: backend`` default is overridden here.
      - name: Migration-shape linter
        working-directory: ${{ github.workspace }}
        run: python3 scripts/lint_migrations.py

      # Guards the appliance host-side runner scripts (issues #550/#553):
      # every systemd ExecStart runner must be executable in the built
      # image (git +x OR chmod'd in mkosi.postinst) and bash -n clean.
      # Catches the class of bug where a shipped feature is dead because
      # its runner hit 203/EXEC. stdlib-only; runs from repo root.
      - name: Appliance runner linter
        working-directory: ${{ github.workspace }}
        run: python3 scripts/lint_appliance_runners.py

  # The ~1900-test suite is DB-bound, so we fan it out across 8 parallel
  # jobs (free concurrent runners) via pytest-split; each job still runs
  # ``-n auto`` (4 xdist workers on a 4-vCPU runner) → ~32-way parallelism
  # total, taking the wall-clock from ~18 min to ~3 min. Coverage is no
  # longer collected on the PR gate (it was a non-gating ``continue-on-error``
  # upload anyway and added ~15-30% tracing overhead on every run).
  backend-test-shard:
    name: Backend — Tests (shard ${{ matrix.shard }}/8)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spatiumddi
          POSTGRES_PASSWORD: test
          POSTGRES_DB: spatiumddi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://spatiumddi:test@localhost:5432/spatiumddi_test
        run: alembic upgrade head

      - name: Run tests (shard ${{ matrix.shard }} of 8)
        env:
          DATABASE_URL: postgresql+asyncpg://spatiumddi:test@localhost:5432/spatiumddi_test
          # conftest reads its own TEST_DATABASE_URL (defaults to "changeme")
          TEST_DATABASE_URL: postgresql+asyncpg://spatiumddi:test@localhost:5432/spatiumddi_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          SECRET_KEY: ci-test-secret-key-not-for-production
        # ``--splits 8 --group N`` (pytest-split) selects this shard's slice
        # of the suite (even split by test count when no .test_durations file
        # is present); ``-n auto`` then runs that slice across the runner's
        # 4 vCPUs, each xdist worker on its own ``spatiumddi_test_gw<N>`` DB.
        run: python -m pytest -n auto --splits 8 --group ${{ matrix.shard }}

  # Required-status-check aggregator: branch protection gates on the stable
  # name "Backend — Tests"; this job passes only if every shard did. Keep
  # this name (and the shard count above) in sync with the required check.
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: [backend-test-shard]
    if: always()
    steps:
      - name: All shards passed
        run: |
          result="${{ needs.backend-test-shard.result }}"
          if [ "$result" != "success" ]; then
            echo "::error::backend test shards did not all pass (result=$result)"
            exit 1
          fi
          echo "all 8 backend test shards passed"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  # ── Agents ───────────────────────────────────────────────────────────────────
  # The standalone agents (DNS / DHCP / supervisor) each ship their own test
  # suite under ``agent/<name>/tests`` but were never run in CI — ``ci.yml``
  # only ever touched ``backend`` + ``frontend`` (issue #640). That let
  # ``agent/supervisor`` sit RED on main undetected, which in turn hid a real
  # production bug (the ``PeerResolveWatcher`` ``AttributeError`` on the
  # bootstrap-from-cache path — see #640). These suites are DB-less and fast
  # (~1-2 s each), so running them on every PR is nearly free.
  #
  # NOTE: agent code is NOT yet lint-checked (Backend Lint scopes to
  # ``backend/app`` + ``backend/tests``) and carries pre-existing ruff/black
  # drift, so this job runs *tests only*. Bringing agent code under lint is a
  # separate, larger cleanup (~30 files of black reformatting) deliberately
  # left out of #640 to keep this change focused.
  agent-test-shard:
    name: Agent — Tests (${{ matrix.agent }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [dhcp, dns, supervisor]
    defaults:
      run:
        working-directory: agent/${{ matrix.agent }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/${{ matrix.agent }}/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        # The ``@pytest.mark.e2e`` acceptance tests self-``skip()`` when their
        # docker/live-daemon prerequisites are absent, so a plain ``pytest``
        # run stays hermetic (no database, no network) — see each agent's
        # ``tests/test_acceptance.py``.
        run: python -m pytest tests -q

  # Required-status-check aggregator: branch protection can gate on the stable
  # name "Agent — Tests"; this job passes only if all three agent suites did.
  # Keep this name (and the matrix above) in sync with the required check.
  agent-test:
    name: Agent — Tests
    runs-on: ubuntu-latest
    needs: [agent-test-shard]
    if: always()
    steps:
      - name: All agent suites passed
        run: |
          result="${{ needs.agent-test-shard.result }}"
          if [ "$result" != "success" ]; then
            echo "::error::one or more agent test suites failed (result=$result)"
            exit 1
          fi
          echo "all agent test suites passed"
