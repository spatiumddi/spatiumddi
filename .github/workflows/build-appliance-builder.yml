name: Build appliance builder image

# The OS-appliance build container. Bumping mkosi or any of the tools
# under `appliance/builder/Dockerfile` republishes the image at
# ghcr.io/spatiumddi/appliance-builder:latest, which is what
# `make appliance` (laptop) and the release pipeline (CI) both pull.

on:
  push:
    branches: [main]
    paths:
      - 'appliance/builder/**'
      - '.github/workflows/build-appliance-builder.yml'
  pull_request:
    paths:
      - 'appliance/builder/**'
      - '.github/workflows/build-appliance-builder.yml'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) / Build + push (main)
        uses: docker/build-push-action@v6
        with:
          context: appliance/builder
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ghcr.io/spatiumddi/appliance-builder:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
