name: Build DNS Agent Images

on:
  push:
    branches: [main]
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9][0-9].[0-9][0-9]-*"
    paths:
      - "agent/dns/**"
      - ".github/workflows/build-dns-images.yml"
  pull_request:
    paths:
      - "agent/dns/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [bind9]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/spatiumddi/dns-${{ matrix.flavor }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent/dns/images/${{ matrix.flavor }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=dns-${{ matrix.flavor }}
          cache-to: type=gha,mode=max,scope=dns-${{ matrix.flavor }}

      - name: Trivy scan
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/spatiumddi/dns-${{ matrix.flavor }}:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
