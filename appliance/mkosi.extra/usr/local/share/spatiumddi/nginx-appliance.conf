# SpatiumDDI OS appliance frontend nginx config (Phase 4b.2).
#
# Replaces the default nginx config baked into the spatiumddi-frontend
# image (frontend/nginx.conf) via a bind-mount in the appliance
# docker-compose. Adds:
#
#   - HTTPS on :443 with the TLS cert the api container writes into
#     /etc/nginx/certs/active.{pem,key}
#   - HTTP on :80 → 301 redirect to HTTPS, EXCEPT /.well-known/acme-challenge/*
#     which stays on HTTP so Phase 4b.4's Let's Encrypt HTTP-01
#     validation has a place to land
#   - On cert activation, the api container `docker kill --signal=HUP
#     spatiumddi-frontend` so nginx reloads the new cert without
#     dropping in-flight connections
#
# Everything else (API proxy locations, SSE tuning, backup upload
# tuning, SPA fallback) is identical to the dev frontend/nginx.conf
# — we want the appliance and the dev stack to behave the same on
# everything except the TLS termination.

# ── Plain HTTP listener — 301 redirect everything to HTTPS, with a
#    carve-out for ACME HTTP-01 challenges so Phase 4b.4 works. The
#    challenge path is served as static files out of the shared
#    /var/www/acme-challenge directory the api container writes into.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS listener — serves the full SpatiumDDI surface.
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/active.pem;
    ssl_certificate_key /etc/nginx/certs/active.key;

    # Modern TLS only — TLS 1.2 + 1.3. No SSLv3 / TLS 1.0 / 1.1.
    # Ciphers picked from Mozilla "intermediate" (the default
    # compatibility/security balance — works with all browsers from
    # the last decade, no weak DH / RC4 / 3DES).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — once a browser sees the appliance over HTTPS, refuse
    # downgrade for 1 year. Apply only after we've shipped a real
    # cert workflow (4b.4 / operator upload) so self-signed boots
    # don't pin themselves into permanent "site insecure" prompts.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream re-resolves when the api
    # container is recreated (same rationale as frontend/nginx.conf).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Operator Copilot streaming endpoint — SSE tuning (same as dev)
    location /api/v1/ai/chat {
        set $api_upstream http://api:8000;
        proxy_pass            $api_upstream;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_set_header      X-Accel-Buffering no;
    }

    # ── Backup endpoints — large body tuning (same as dev)
    location /api/v1/backup/ {
        set $api_upstream http://api:8000;
        proxy_pass               $api_upstream;
        proxy_set_header         Host $host;
        proxy_set_header         X-Real-IP $remote_addr;
        proxy_set_header         X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_http_version       1.1;
        proxy_set_header         Connection "";
        client_max_body_size     2g;
        proxy_request_buffering  off;
        proxy_read_timeout       1800s;
        proxy_send_timeout       1800s;
    }

    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass         $api_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
    }

    location ~ ^/(health|metrics) {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
