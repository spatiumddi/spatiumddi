#!/usr/sbin/nft -f
#
# SpatiumDDI appliance default firewall.
#
# Policy: drop inbound by default; allow the appliance's known
# ports (SSH, web UI, DNS, DHCP) and any return traffic for
# connections the appliance initiated.
#
# Issue #183 Phase 7 — the appliance is k3s-only; no docker
# iptables-nft glue. k3s manages its own iptables rules (kube-proxy
# +  flannel) inside its own chains; our FORWARD policy stays
# accept so kube-proxy's chains don't fight ours. Kea DHCP runs as
# a hostNetwork pod (it needs raw broadcasts), so 67/udp is in the
# INPUT allow list.
#
# Custom additions: drop a *.nft file in /etc/nftables.d/ —
# `nft -f /etc/nftables.conf` loads the main config first, then
# appends from /etc/nftables.d/.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # loopback
        iif lo accept

        # return traffic for connections we initiated
        ct state established,related accept
        ct state invalid drop

        # ICMP (ping, MTU discovery, neighbour advertisement)
        meta l4proto icmp   accept
        meta l4proto icmpv6 accept

        # SSH — the un-removable management escape hatch. Stays here in the
        # base floor (never scoped) so a bad Web-UI source restriction below
        # is always recoverable over SSH / the console, never a brick.
        tcp dport 22 accept

        # Web UI (HTTP + HTTPS) — #285 Phase 6. Intentionally NOT opened here
        # any more. The supervisor's spatium-role.nft drop-in (pulled in by the
        # include glob below, which sits AFTER these accepts) is now the SOLE
        # source of the 80/443 accept, so operators can source-scope the Web UI
        # from the Fleet → Firewall tab (web_ui_allowed_cidrs). Default render
        # is an un-scoped `tcp dport { 80, 443 } accept`, so out of the box the
        # Web UI is open exactly as before — only an explicit scope tightens it.
        # The supervisor renders the drop-in on EVERY appliance heartbeat (even
        # idle / non-CP nodes) precisely so this rule is always present.

        # DNS — accept both transport in case anything host-side
        # ever listens directly (currently dns-bind9 is in a
        # container with port publishing, so this is belt-and-braces)
        tcp dport 53 accept
        udp dport 53 accept

        # DHCP server (Kea uses host networking — broadcast needs
        # raw socket access on the host's interface)
        udp dport 67 accept

        # DHCP client return — if the appliance itself is a DHCP
        # client (likely on the wildcard 20-dhcp-all.network),
        # accept replies from servers on UDP 67 -> 68
        udp sport 67 udp dport 68 accept

        # k3s control-plane server ports (#272 multi-node HA / #285 Phase 1b).
        #
        #   2379  etcd client  — server-to-server etcd, mTLS client-cert.
        #   2380  etcd peer    — etcd quorum between server nodes, mTLS.
        #   10250 kubelet      — metrics / logs / exec from peers.
        #   6443  kube-apiserver — join handshake + /cacerts fetch from
        #                          other server nodes; ALSO in-cluster pod
        #                          access via the service-IP DNAT.
        #
        # #285 Phase 1b — the previous LAN-wide
        #     tcp dport { 6443, 2379, 2380, 10250 } accept comment "k3s-ha"
        # exposed etcd + the kubelet to the whole LAN. It is REMOVED here.
        # The sensitive ports (2379 / 2380 / 10250) are now opened ONLY to
        # the control-plane peer node IPs by the supervisor's rendered
        # drop-in (spatium-role.nft, pulled in by the include glob below) —
        # which, with the LAN-wide accept gone, is finally AUTHORITATIVE
        # (nftables is first-match-wins; the scoped rule was previously dead
        # code behind this accept). On a single-node install etcd is
        # loopback-only, so nothing is opened — correct.
        #
        # 6443 (apiserver) stays LAN-reachable via the baked bootstrap
        # sentinel /etc/nftables.d/00-spatium-k3s-bootstrap.nft (picked up by
        # the include glob): a fresh joiner must reach the seed's :6443 to
        # fetch /cacerts + join BEFORE it exists as a peer, and in-cluster
        # pods reach the apiserver through the service-IP DNAT on :6443.
        # apiserver is token + mTLS protected, so LAN exposure is the
        # documented-acceptable posture (issue #285). Tightening 6443 to
        # peers ∪ pod ∪ service (and auto-retiring the sentinel once the
        # cluster is multi-node) is a later #285 phase — it needs the
        # in-cluster pod→apiserver source-address behaviour validated on a
        # live multi-node appliance first.

        # Pull in operator-supplied rules + the supervisor's authoritative
        # spatium-role.nft + the k3s bootstrap sentinel (drop-in directory
        # created by nftables.service).
        include "/etc/nftables.d/*.nft"

        # Counter on drops — visible via `nft list ruleset`
        counter
    }

    chain forward {
        # Left wide open so k3s's kube-proxy + flannel iptables
        # rules can manage pod-to-pod / pod-to-svc traffic without
        # fighting our policy.
        type filter hook forward priority filter; policy accept;
    }

    chain output {
        # Outbound is unrestricted — the appliance pulls images,
        # checks for updates, etc. Operators wanting outbound
        # filtering can drop their own .nft file in /etc/nftables.d/.
        type filter hook output priority filter; policy accept;
    }
}
