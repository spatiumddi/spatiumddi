#!/usr/sbin/nft -f
#
# SpatiumDDI appliance default firewall.
#
# Policy: drop inbound by default; allow the appliance's known
# ports (SSH, web UI, DNS, DHCP) and any return traffic for
# connections the appliance initiated.
#
# Issue #183 Phase 7 — the appliance is k3s-only; no docker
# iptables-nft glue. k3s manages its own iptables rules (kube-proxy
# +  flannel) inside its own chains; our FORWARD policy stays
# accept so kube-proxy's chains don't fight ours. Kea DHCP runs as
# a hostNetwork pod (it needs raw broadcasts), so 67/udp is in the
# INPUT allow list.
#
# Custom additions: drop a *.nft file in /etc/nftables.d/ —
# `nft -f /etc/nftables.conf` loads the main config first, then
# appends from /etc/nftables.d/.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # loopback
        iif lo accept

        # return traffic for connections we initiated
        ct state established,related accept
        ct state invalid drop

        # ICMP (ping, MTU discovery, neighbour advertisement)
        meta l4proto icmp   accept
        meta l4proto icmpv6 accept

        # SSH
        tcp dport 22 accept

        # Web UI (HTTP + HTTPS)
        tcp dport { 80, 443 } accept

        # DNS — accept both transport in case anything host-side
        # ever listens directly (currently dns-bind9 is in a
        # container with port publishing, so this is belt-and-braces)
        tcp dport 53 accept
        udp dport 53 accept

        # DHCP server (Kea uses host networking — broadcast needs
        # raw socket access on the host's interface)
        udp dport 67 accept

        # DHCP client return — if the appliance itself is a DHCP
        # client (likely on the wildcard 20-dhcp-all.network),
        # accept replies from servers on UDP 67 -> 68
        udp sport 67 udp dport 68 accept

        # Pull in any operator-supplied rules without editing this
        # file (drop-in directory created by nftables.service).
        include "/etc/nftables.d/*.nft"

        # Counter on drops — visible via `nft list ruleset`
        counter
    }

    chain forward {
        # Left wide open so k3s's kube-proxy + flannel iptables
        # rules can manage pod-to-pod / pod-to-svc traffic without
        # fighting our policy.
        type filter hook forward priority filter; policy accept;
    }

    chain output {
        # Outbound is unrestricted — the appliance pulls images,
        # checks for updates, etc. Operators wanting outbound
        # filtering can drop their own .nft file in /etc/nftables.d/.
        type filter hook output priority filter; policy accept;
    }
}
