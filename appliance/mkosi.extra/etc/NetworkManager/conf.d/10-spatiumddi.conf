# SpatiumDDI appliance NetworkManager defaults.
#
# `dns=systemd-resolved` keeps systemd-resolved as the authoritative
# manager of /etc/resolv.conf — NM hands per-interface DNS info to
# resolved over D-Bus rather than touching the file directly. Same
# end-state as the previous systemd-networkd stack: applications
# resolve through 127.0.0.53 (when DNSStubListener=yes) or via the
# /run/systemd/resolve/resolv.conf symlink (we use the latter, set
# in mkosi.postinst, because the appliance's BIND9 container needs
# the host's :53 free).
#
# `plugins=keyfile` is the modern default — keyfile-formatted
# connections live under /etc/NetworkManager/system-connections/.
# The installer (spatium-install) writes a static-IP override into
# that directory when the operator picks "static" in the wizard.
[main]
dns=systemd-resolved
plugins=keyfile
