# Disable systemd-resolved's stub listener on 127.0.0.53:53.
# The appliance runs BIND9 in a container with port mapping 53:53,
# which binds 0.0.0.0:53 on the host — that overlaps with 127.0.0.53
# and would conflict if the stub listener were active.
#
# resolved still manages /etc/resolv.conf using DNS servers picked
# up by systemd-networkd via DHCP. /etc/resolv.conf is symlinked to
# /run/systemd/resolve/resolv.conf (the "real DNS servers" file, not
# the stub-pointer one) so resolver lookups hit the upstream servers
# directly without going through the stub.
[Resolve]
DNSStubListener=no
