# SpatiumDDI OS Appliance — Phase 1 MVP build config.
#
# Produces a bootable Debian 13 (trixie) amd64 disk image that boots
# into a SpatiumDDI all-in-one stack (control plane + DNS + DHCP) on
# first power-on. The image is shipped as raw + converted to qcow2 by
# the `make appliance` Makefile target.
#
# Why Debian (not Alpine, despite the rest of the project being
# Alpine-everywhere): mkosi >= 23 dropped Alpine as a supported
# Distribution. Phase 1's goal is the proving ground for cloud-init
# wiring, boot-time orchestration, and the build pipeline — keeping
# the appliance on a mkosi-native distro removes a build-tool
# dependency (alpine-make-vm-image is the alternative) and lets us
# focus on appliance-shape questions. The bundled ghcr.io container
# images stay Alpine-based regardless.
#
# Reproducing locally (requires mkosi >= 22 + qemu-img + root or a
# user namespace):
#   make appliance
#
# Spec context: docs/deployment/APPLIANCE.md (Debian track, Option B).

[Distribution]
Distribution=debian
Release=trixie
Architecture=x86-64

[Output]
Format=disk
ImageId=spatiumddi-appliance
ImageVersion=0.1.0

[Content]
# Hybrid BIOS + UEFI boot. The same qcow2 boots on:
#   - QEMU/KVM with default seabios:  qemu-system-x86_64 -drive file=...
#   - Proxmox / libvirt / VMware with default BIOS firmware
#   - UEFI hosts (Hyper-V, modern QEMU with OVMF, AWS/Azure cloud)
#
# Two grub variants required: grub-pc-bin (BIOS boot record) and
# grub-efi-amd64-bin (UEFI ESP files). Both are bin-only so they
# don't conflict like the full grub-pc / grub-efi-amd64 packages do.
Bootable=yes
Bootloader=grub
BiosBootloader=grub
# Strip /usr/share/doc + /usr/share/man + locale archives at build
# time. Saves ~100 MiB on the raw image; immaterial for appliance
# operation since the web UI is the operator interface.
WithDocs=no
Packages=
        systemd
        systemd-sysv
        udev
        # /bin/login is shipped by the `login` package (Priority:
        # required in Debian, but mkosi doesn't auto-include
        # required-but-not-essential packages). Without it, agetty
        # reads the operator's username and immediately fails with
        # "tty1: can't exec /bin/login: No such file or directory"
        # before any password prompt. That's the real root cause
        # behind issue #136 (was previously misattributed to plymouth).
        login
        # Full kernel (not linux-image-cloud-amd64). The cloud variant
        # strips out DRM/KMS drivers (bochs-drm, virtio-gpu, qxl), so
        # the console runs in legacy 80x25 VGA text mode and there's
        # no framebuffer console. With the full kernel, KMS gives us a
        # real framebuffer console driven by the hypervisor's
        # advertised resolution — the dashboard then gets ~128x60
        # character cells (Talos-density) instead of 80x25. Cost:
        # ~20 MiB on disk vs cloud-amd64.
        linux-image-amd64
        # `kbd` provides setfont + the consolefonts/ directory.
        # Belt-and-braces: even on systems where KMS picks up
        # automatically, an explicit setfont call early in
        # spatium-console.service guarantees a small font.
        kbd
        console-setup
        grub-pc-bin
        grub-efi-amd64-bin
        grub-common
        # grub2-common ships the actual /usr/sbin/grub-install
        # binary — grub-{pc,efi}-bin only carry the per-arch modules.
        # grub-common Recommends grub2-common but mkosi installs with
        # --no-install-recommends, so grub-install ends up missing
        # from the rootfs unless we name grub2-common explicitly.
        # Without this, spatium-install fails at the "Installing
        # bootloader" step with `chroot: failed to run command
        # 'grub-install': No such file or directory`.
        grub2-common
        # live-boot installs initramfs-tools hooks so the SAME initrd
        # boots two ways: regular disk-mode (qcow2 path) when no
        # `boot=live` cmdline is set, and live-mode (Phase 2 ISO
        # path) when the kernel cmdline has `boot=live components`.
        # Adds ~5 MiB to the initrd; harmless for disk boot.
        live-boot
        live-config
        live-tools
        chrony
        cloud-init
        cloud-guest-utils
        cloud-initramfs-growroot
        # NetworkManager replaces the bare systemd-networkd stack
        # from earlier appliance cuts. The motivation: F4 on the
        # console dashboard launches nmtui, which only speaks to
        # NetworkManager — so we either need NM as the actual
        # network manager or a hand-rolled TUI for our own config.
        # NM is the standard-issue answer and gives operators every
        # feature they'd expect (DHCP / static / VLAN / bonds /
        # bridges, all editable via nmtui) for free.
        #
        # systemd-networkd stays installed (it ships with systemd-sysv
        # in the base) but the daemon is masked at install time so
        # the two stacks don't both try to manage the same interfaces.
        network-manager
        # systemd-resolved still manages /etc/resolv.conf — NM is
        # configured (via /etc/NetworkManager/conf.d/) to push DNS
        # info into resolved rather than overwrite /etc/resolv.conf
        # directly. Without resolved running, the installed system
        # has no resolver — /etc/resolv.conf is whatever the live
        # system's was (often a stub pointing at ::1 set by
        # live-config), which dangles after install.
        #
        # DNSStubListener=no is set via /etc/systemd/resolved.conf.d/
        # so resolved doesn't bind 127.0.0.53:53 — important because
        # k3s's CoreDNS pod needs the host's :53 free for the
        # in-cluster DNS service.
        systemd-resolved
        # Issue #183 Phase 7 — docker is gone. The appliance is
        # k3s-only; the k3s static binary (fetched at build time by
        # appliance/scripts/fetch-k3s.sh) ships its own embedded
        # containerd runtime + every CLI we need (kubectl / ctr /
        # crictl, all symlinks to /usr/local/bin/k3s). No docker.io,
        # no docker-compose, no docker-cli, no fuse-overlayfs.
        openssh-server
        ca-certificates
        curl
        jq
        bash
        iproute2
        parted
        e2fsprogs
        tzdata
        # Operator essentials. `sudo` is required because the
        # installer adds the admin user to the `sudo` group — the
        # group membership is useless without the binary. iputils-ping
        # + dnsutils are common diagnostics for a DDI appliance
        # operator (ping the gateway, dig a record on the local
        # BIND9). less is the operator's pager for log files.
        sudo
        iputils-ping
        dnsutils
        less
        # Phase 3 — disk installer wizard. whiptail draws the
        # dialogs; gdisk's sgdisk does GPT partitioning;
        # dosfstools provides mkfs.fat for the ESP; rsync mirrors
        # the live rootfs to the target disk.
        whiptail
        gdisk
        dosfstools
        rsync
        # Guest-tools for VM hypervisors. qemu-guest-agent lets
        # Proxmox / QEMU / libvirt do graceful shutdown, freeze-thaw
        # for backups, IP reporting in the host UI, and time sync.
        # open-vm-tools does the same on VMware ESXi/Workstation.
        # Both daemons no-op on non-matching hypervisors (no virtio
        # serial / no VMware backdoor), so shipping both has no
        # cost on bare metal or other hypervisors.
        qemu-guest-agent
        open-vm-tools
        # Default-deny inbound firewall. See /etc/nftables.conf.
        nftables
        # apt itself — mkosi only ships the dependency chain
        # ``unattended-upgrades`` pulls in (python3-apt etc.), not the
        # ``apt`` / ``apt-get`` front-end binaries. Without this an
        # operator has no in-field escape hatch for installing a
        # missing tool over SSH and is forced to cut + reinstall a
        # whole new slot image for trivial debugging. Cost: ~30 MiB.
        # The appliance is still slot-swap-managed for upgrades — apt
        # is just the lockpick when something has to be diagnosed live.
        apt
        # Unattended security patches — runs apt-get upgrade on the
        # security pocket daily. No kernel upgrades (those need
        # reboot, handled separately via Phase 6 fleet management).
        unattended-upgrades
        # apt-listchanges is a Recommends of unattended-upgrades
        # that pulls in heavy mail/locale deps. We don't want it
        # (no MTA, no operator email config). Pinning unattended
        # without it via no-Recommends mkosi default is enough.
        # logrotate handles /var/log/spatiumddi/firstboot.log so
        # it doesn't grow unbounded across appliance reboots.
        logrotate
        # zstd — required by k3s's air-gap image loader for the
        # ``*.tar.zst`` tarballs that ship under
        # ``/var/lib/rancher/k3s/agent/images/`` (the k3s upstream
        # airgap tarball + our baked SpatiumDDI service images).
        # k3s imports anything in that dir on startup natively, so
        # no firstboot shell-out is needed; we just need zstd
        # available in the rootfs for the embedded importer.
        zstd
        # Phase 4h console dashboard (issue #134). The spatium-console
        # script replaces getty@tty1 on the installed appliance with a
        # Talos-style refresh-on-tick view. python3 ships in the base
        # via cloud-init's dependency; rich + psutil are the two extras
        # we need for the renderer. ~5 MiB combined.
        python3-rich
        python3-psutil
        # F2 Monitor on the console dashboard launches htop (under
        # `runuser -u admin` so the operator can't kill system
        # processes from the physical console). ~250 KiB.
        htop
        # tcpdump — operator-issued packet capture for DNS / DHCP
        # / kubeapi traffic triage. ~2 MB. Operators reach for it
        # often enough that pre-installing it (vs `apt install`
        # post-deploy on an air-gapped appliance) is worth the
        # rootfs budget.
        tcpdump
        # bash-completion — backs the kubectl autocomplete drop-in
        # (mkosi.postinst writes /etc/bash_completion.d/kubectl
        # + /etc/profile.d/kubectl-alias.sh). Tab-complete on
        # `kubectl get po<TAB>` etc. for the admin shell.
        bash-completion
        # Issue #153 — SNMP support for network-admin monitoring.
        # snmpd is installed but the service is masked / disabled
        # by default; operators opt in via Settings → Appliance →
        # SNMP in the UI, which writes a config trigger that the
        # spatiumddi-snmp-reload.path unit picks up. snmp-mibs-
        # downloader is intentionally NOT included — it's
        # contrib-only and the MIB names operators actually walk
        # (SNMPv2-MIB / IF-MIB / HOST-RESOURCES-MIB) ship with
        # snmpd itself in /usr/share/snmp/mibs-downloaded.
        snmpd

# Disable root password — cloud-init seeds the operator account.
RootPassword=hashed:!

# Headless / serial-console boot. `console=tty0` keeps VGA output for
# operators with a monitor attached; `console=ttyS0,115200n8` mirrors
# everything to the first serial port so a headless install (Proxmox
# `serial0`, IPMI SoL, RPi UART, embedded board) still gets boot
# messages + getty. The last `console=` wins for /dev/console — we
# put ttyS0 last so kernel oopses route to serial. systemd's
# systemd-getty-generator auto-spawns serial-getty@ttyS0 from this.
KernelCommandLine=console=tty0 console=ttyS0,115200n8

[Validation]
SecureBoot=no

# mkosi runs postinst in a network-sandboxed chroot by default;
# we need outbound access for apt-get + any future build-time
# fetches. Phase 7's k3s fetch happens at the host bake step
# (appliance/scripts/fetch-k3s.sh), not in postinst, but
# WithNetwork=yes keeps the option open.
[Build]
WithNetwork=yes
