# SpatiumDDI OS Appliance — Phase 1 MVP build config.
#
# Produces a bootable Debian 13 (trixie) amd64 disk image that boots
# into a SpatiumDDI all-in-one stack (control plane + DNS + DHCP) on
# first power-on. The image is shipped as raw + converted to qcow2 by
# the `make appliance` Makefile target.
#
# Why Debian (not Alpine, despite the rest of the project being
# Alpine-everywhere): mkosi >= 23 dropped Alpine as a supported
# Distribution. Phase 1's goal is the proving ground for cloud-init
# wiring, boot-time orchestration, and the build pipeline — keeping
# the appliance on a mkosi-native distro removes a build-tool
# dependency (alpine-make-vm-image is the alternative) and lets us
# focus on appliance-shape questions. The bundled ghcr.io container
# images stay Alpine-based regardless.
#
# Reproducing locally (requires mkosi >= 22 + qemu-img + root or a
# user namespace):
#   make appliance
#
# Spec context: docs/deployment/APPLIANCE.md (Debian track, Option B).

[Distribution]
Distribution=debian
Release=trixie
Architecture=x86-64

[Output]
Format=disk
ImageId=spatiumddi-appliance
ImageVersion=0.1.0

[Content]
# Hybrid BIOS + UEFI boot. The same qcow2 boots on:
#   - QEMU/KVM with default seabios:  qemu-system-x86_64 -drive file=...
#   - Proxmox / libvirt / VMware with default BIOS firmware
#   - UEFI hosts (Hyper-V, modern QEMU with OVMF, AWS/Azure cloud)
#
# Two grub variants required: grub-pc-bin (BIOS boot record) and
# grub-efi-amd64-bin (UEFI ESP files). Both are bin-only so they
# don't conflict like the full grub-pc / grub-efi-amd64 packages do.
Bootable=yes
Bootloader=grub
BiosBootloader=grub
# Strip /usr/share/doc + /usr/share/man + locale archives at build
# time. Saves ~100 MiB on the raw image; immaterial for appliance
# operation since the web UI is the operator interface.
WithDocs=no
Packages=
        systemd
        systemd-sysv
        udev
        linux-image-cloud-amd64
        grub-pc-bin
        grub-efi-amd64-bin
        grub-common
        # grub2-common ships the actual /usr/sbin/grub-install
        # binary — grub-{pc,efi}-bin only carry the per-arch modules.
        # grub-common Recommends grub2-common but mkosi installs with
        # --no-install-recommends, so grub-install ends up missing
        # from the rootfs unless we name grub2-common explicitly.
        # Without this, spatium-install fails at the "Installing
        # bootloader" step with `chroot: failed to run command
        # 'grub-install': No such file or directory`.
        grub2-common
        # live-boot installs initramfs-tools hooks so the SAME initrd
        # boots two ways: regular disk-mode (qcow2 path) when no
        # `boot=live` cmdline is set, and live-mode (Phase 2 ISO
        # path) when the kernel cmdline has `boot=live components`.
        # Adds ~5 MiB to the initrd; harmless for disk boot.
        live-boot
        live-config
        live-tools
        chrony
        cloud-init
        cloud-guest-utils
        cloud-initramfs-growroot
        # systemd-resolved manages /etc/resolv.conf using DNS info
        # systemd-networkd picks up via DHCP. Without it, the
        # installed system has no resolver — /etc/resolv.conf is
        # whatever the live system's was (often a stub pointing at
        # ::1 set by live-config), which dangles after install and
        # docker-compose pull fails with "lookup registry-1.docker.io
        # on [::1]:53: connection refused".
        #
        # DNSStubListener=no is set via /etc/systemd/resolved.conf.d/
        # so resolved doesn't bind 127.0.0.53:53 — important because
        # the appliance's BIND9 container needs the host's :53 free.
        systemd-resolved
        docker.io
        docker-compose
        openssh-server
        ca-certificates
        curl
        jq
        bash
        iproute2
        parted
        e2fsprogs
        tzdata
        # Operator essentials. `sudo` is required because the
        # installer adds the admin user to the `sudo` group — the
        # group membership is useless without the binary. iputils-ping
        # + dnsutils are common diagnostics for a DDI appliance
        # operator (ping the gateway, dig a record on the local
        # BIND9). less is the operator's pager for log files.
        sudo
        iputils-ping
        dnsutils
        less
        # Phase 3 — disk installer wizard. whiptail draws the
        # dialogs; gdisk's sgdisk does GPT partitioning;
        # dosfstools provides mkfs.fat for the ESP; rsync mirrors
        # the live rootfs to the target disk.
        whiptail
        gdisk
        dosfstools
        rsync
        # Guest-tools for VM hypervisors. qemu-guest-agent lets
        # Proxmox / QEMU / libvirt do graceful shutdown, freeze-thaw
        # for backups, IP reporting in the host UI, and time sync.
        # open-vm-tools does the same on VMware ESXi/Workstation.
        # Both daemons no-op on non-matching hypervisors (no virtio
        # serial / no VMware backdoor), so shipping both has no
        # cost on bare metal or other hypervisors.
        qemu-guest-agent
        open-vm-tools
        # Default-deny inbound firewall. See /etc/nftables.conf.
        nftables
        # Unattended security patches — runs apt-get upgrade on the
        # security pocket daily. No kernel upgrades (those need
        # reboot, handled separately via Phase 6 fleet management).
        unattended-upgrades
        # apt-listchanges is a Recommends of unattended-upgrades
        # that pulls in heavy mail/locale deps. We don't want it
        # (no MTA, no operator email config). Pinning unattended
        # without it via no-Recommends mkosi default is enough.
        # logrotate handles /var/log/spatiumddi/firstboot.log so
        # it doesn't grow unbounded across appliance reboots.
        logrotate
        # zstd decompresses the Phase 4 dev-iteration image tarballs
        # baked into /usr/local/share/spatiumddi/images/ by
        # appliance/scripts/bake-images.sh — so the ISO can ship WIP
        # api/frontend images without depending on a ghcr.io push.
        # No-op when an ISO is built without baked images.
        zstd

# Disable root password — cloud-init seeds the operator account.
RootPassword=hashed:!

# Headless / serial-console boot. `console=tty0` keeps VGA output for
# operators with a monitor attached; `console=ttyS0,115200n8` mirrors
# everything to the first serial port so a headless install (Proxmox
# `serial0`, IPMI SoL, RPi UART, embedded board) still gets boot
# messages + getty. The last `console=` wins for /dev/console — we
# put ttyS0 last so kernel oopses route to serial. systemd's
# systemd-getty-generator auto-spawns serial-getty@ttyS0 from this.
KernelCommandLine=console=tty0 console=ttyS0,115200n8

[Validation]
SecureBoot=no

# Postinst downloads the docker CLI static binary from docker.com —
# Debian trixie's docker.io package only ships the daemon
# (dockerd / docker-proxy / docker-init), not the `docker` client.
# Without `WithNetwork=yes` mkosi runs postinst in a
# network-sandboxed chroot and the curl fails.
[Build]
WithNetwork=yes
