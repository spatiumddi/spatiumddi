# SpatiumDDI OS Appliance — Phase 1 MVP build config.
#
# Produces a bootable Debian 13 (trixie) amd64 disk image that boots
# into a SpatiumDDI all-in-one stack (control plane + DNS + DHCP) on
# first power-on. The image is shipped as raw + converted to qcow2 by
# the `make appliance` Makefile target.
#
# Why Debian (not Alpine, despite the rest of the project being
# Alpine-everywhere): mkosi >= 23 dropped Alpine as a supported
# Distribution. Phase 1's goal is the proving ground for cloud-init
# wiring, boot-time orchestration, and the build pipeline — keeping
# the appliance on a mkosi-native distro removes a build-tool
# dependency (alpine-make-vm-image is the alternative) and lets us
# focus on appliance-shape questions. The bundled ghcr.io container
# images stay Alpine-based regardless.
#
# Reproducing locally (requires mkosi >= 22 + qemu-img + root or a
# user namespace):
#   make appliance
#
# Spec context: docs/deployment/APPLIANCE.md (Debian track, Option B).

[Distribution]
Distribution=debian
Release=trixie
Architecture=x86-64

[Output]
Format=disk
ImageId=spatiumddi-appliance
ImageVersion=0.1.0

[Content]
# Hybrid BIOS + UEFI boot. The same qcow2 boots on:
#   - QEMU/KVM with default seabios:  qemu-system-x86_64 -drive file=...
#   - Proxmox / libvirt / VMware with default BIOS firmware
#   - UEFI hosts (Hyper-V, modern QEMU with OVMF, AWS/Azure cloud)
#
# Two grub variants required: grub-pc-bin (BIOS boot record) and
# grub-efi-amd64-bin (UEFI ESP files). Both are bin-only so they
# don't conflict like the full grub-pc / grub-efi-amd64 packages do.
Bootable=yes
Bootloader=grub
BiosBootloader=grub
Packages=
        systemd
        systemd-sysv
        udev
        linux-image-cloud-amd64
        grub-pc-bin
        grub-efi-amd64-bin
        grub-common
        chrony
        cloud-init
        cloud-guest-utils
        cloud-initramfs-growroot
        docker.io
        docker-compose
        openssh-server
        ca-certificates
        curl
        jq
        bash
        sudo
        nano
        iproute2
        iputils-ping
        dnsutils
        parted
        e2fsprogs
        tzdata
        less
        ifupdown

# Disable root password — cloud-init seeds the operator account.
RootPassword=hashed:!

[Validation]
SecureBoot=no
