# ─────────────────────────────────────────────────────────────────────────────
# SpatiumDDI Helm values
#
# Layout:
#   image                 Shared image defaults (repository prefix, tag, policy)
#   auth                  SECRET_KEY for app; generated on first install if empty
#   api / frontend /      Control-plane workloads
#     worker / beat
#   migrate               One-shot Alembic Job (regular, gated on Postgres)
#   ingress               Frontend ingress
#   postgresql            In-chart Postgres StatefulSet using postgres:16-alpine
#                         (matches docker-compose.yml). BYO via externalDatabase.
#   redis                 In-chart Redis StatefulSet using redis:8.6-alpine.
#                         BYO via externalRedis.
#   dnsAgents             Optional BIND9 agent StatefulSets (one per DNSServer row)
#   dhcpAgents            Optional Kea agent StatefulSets (one per DHCPServer row)
# ─────────────────────────────────────────────────────────────────────────────

image:
  registry: ghcr.io
  repository: spatiumddi         # images are ghcr.io/spatiumddi/<name>
  # Image tag applied to every control-plane workload. Empty → use Chart.appVersion.
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# Chart-wide settings the appliance + multi-node HA work consume.
# Plain K8s / docker-compose installs leave these at defaults.
global:
  # #272 Phase 1 — every control-plane workload (api / frontend /
  # worker / beat / postgres / redis) merges this map into its
  # nodeSelector block on top of any per-component override. The
  # appliance chart's firstboot flips it to
  # ``{spatium.io/role-control-plane: "true"}`` so control-plane
  # pods only schedule on nodes carrying the per-role label.
  # Leaving it empty (the default) lets plain K8s clusters schedule
  # control-plane workloads anywhere; multi-node HA (#272 later
  # phases) configures the gate from the umbrella valuesContent.
  controlPlaneNodeSelector: {}

# Cluster-wide app name override. Leave empty to use `.Release.Name`.
fullnameOverride: ""
nameOverride: ""

# Application secret — Fernet key for at-rest encryption of auth provider
# secrets, session tokens, etc. If empty, a 32-byte hex string is generated
# the first time the chart is installed and persisted via `lookup` across
# upgrades. Override only if you're consolidating secret management.
auth:
  secretKey: ""
  existingSecret: ""             # must carry key `secret-key`

# ── API ──────────────────────────────────────────────────────────────────────
api:
  replicas: 2
  service:
    type: ClusterIP
    port: 8000
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 512Mi }
  env: []                        # extra env entries appended to container
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  # Phase 11 wave 4 (#183) — api ServiceAccount + Role for kubeapi
  # access. Needed for:
  #   * /appliance/containers (post-rename: pods) — list + tail
  #     logs from in-cluster pods instead of docker.
  #   * Operator cert upload — PATCH the spatium-appliance-tls
  #     Secret in-place instead of writing to a docker volume +
  #     SIGHUP via the docker socket.
  # Off-appliance docker-compose installs leave this off; the
  # /appliance/* endpoints no-op there anyway via the
  # ``settings.appliance_mode`` gate.
  serviceAccount:
    enabled: false
  # Appliance host bind mounts. The api writes the setup-complete
  # flag, slot-upgrade trigger files, rollback triggers, and the
  # maintenance flag into ``/var/lib/spatiumddi-host/release-state/``
  # — host-side ``spatiumddi-*.path`` systemd units watch that
  # directory + dispatch the matching ``.service``. Also reads the
  # host's slot-upgrade log + host env from
  # ``/var/log/spatiumddi-host`` + ``/etc/spatiumddi-host`` for the
  # ``/appliance`` UI surfaces. Leave off for non-appliance K8s
  # installs; the host paths don't exist there and the ``/appliance``
  # endpoints already 404 via the ``settings.appliance_mode`` gate.
  applianceHostMounts:
    enabled: false
    # Host paths (created by spatiumddi-firstboot). The ``-host`` suffix
    # appears only inside the container as the bind-mount target —
    # backend code reads ``/var/lib/spatiumddi-host/release-state/...``
    # which actually lives at ``/var/lib/spatiumddi/release-state/...``
    # on the appliance's filesystem.
    releaseStateDir: /var/lib/spatiumddi/release-state
    hostLogDir: /var/log/spatiumddi
    hostEtcDir: /etc/spatiumddi

# ── Frontend (nginx + Vite build) ────────────────────────────────────────────
frontend:
  replicas: 2
  service:
    type: ClusterIP
    port: 80
  # Appliance use (#183 Phase 11) — flip to true to make the frontend
  # pod bind on the node's :80 directly via hostNetwork + hostPort.
  # Pair with ``replicas: 1`` (the single :80 host port is exclusive).
  # ``dnsPolicy: ClusterFirstWithHostNet`` gets added automatically so
  # cluster DNS still resolves; the pod talks to api via the existing
  # in-cluster ClusterIP Service through kube-proxy iptables.
  # Off-appliance K8s deployments leave this false + run an Ingress
  # in front instead.
  hostNetwork: false
  # Phase 11 wave 3 (#183) — TLS termination at the frontend nginx.
  # When enabled, the frontend pod mounts a ConfigMap with a
  # TLS-aware nginx template (templates/frontend-tls-config.yaml)
  # at /etc/nginx/templates/default.conf.template + a Secret with
  # the cert/key at /etc/nginx/tls/. Port 80 → 443 redirect; 443
  # serves the SpatiumDDI UI. ``secretName`` is the
  # kubernetes.io/tls Secret firstboot creates with the self-
  # signed cert (operator-uploaded cert later replaces the Secret
  # contents via the Cert Manager UI).
  tls:
    enabled: false
    secretName: spatium-appliance-tls
  # Issue #176: the frontend nginx proxies ``/api/`` to the api Service
  # using a runtime-substituted upstream. The Docker image defaults to
  # ``api:8000`` (the Compose service name) which doesn't resolve on
  # Kubernetes. By default we point at this release's api Service —
  # ``{{ fullname }}-api`` — and inherit the api port from
  # ``api.service.port``. Override if the api lives in a different
  # Service / namespace (``my-api.shared-ns.svc.cluster.local``) or on
  # a non-standard port.
  apiUpstream:
    host: ""    # default: "{{ fullname }}-api"
    port: 0     # default: .Values.api.service.port (8000)
  # Optional explicit DNS resolver(s) for the frontend nginx. Leave
  # empty to auto-detect from /etc/resolv.conf at container start
  # (``NGINX_ENTRYPOINT_LOCAL_RESOLVERS=1`` is set in the image), which
  # works on every standard Kubernetes cluster — Pods get cluster DNS
  # injected automatically. Set explicitly only if your cluster has a
  # custom DNS topology (e.g. ``10.96.0.10`` for a pinned CoreDNS IP,
  # or ``"1.1.1.1 8.8.8.8"`` for upstream-only resolution).
  nginxLocalResolvers: ""
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── Worker (Celery queues: ipam, dns, dhcp, default) ─────────────────────────
worker:
  replicas: 2
  concurrency: 4
  queues: "ipam,dns,dhcp,default"
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 2000m, memory: 1Gi }
  # Add CAP_NET_RAW to the worker pod so nmap can do SYN scans + ``-O``
  # OS detection from the device-profiling auto-nmap path. NET_RAW is
  # in containerd's default cap set so this is a no-op on permissive
  # clusters; on restricted PSA / OpenShift-SCC it's required.
  # Set to false if you've turned off device profiling cluster-wide
  # and want a tighter security posture.
  netRawCapability: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── Beat (singleton scheduler — always 1 replica) ────────────────────────────
beat:
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 200m, memory: 256Mi }
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── Migrate (Alembic upgrade head) ───────────────────────────────────────────
# Regular Job (named per Helm revision so each install/upgrade creates
# a fresh one). The Job's pod has a wait-for-postgres init container; the
# api / worker / beat pods carry a matching wait-for-migrate init that
# blocks rollout until the schema is in place. Disable if you're driving
# migrations from CI/CD instead of Helm.
migrate:
  enabled: true
  backoffLimit: 3
  # Garbage-collect each migrate Job this many seconds after completion.
  # Without a TTL the cluster would slowly accumulate one completed Job
  # per Helm revision.
  ttlSecondsAfterFinished: 600
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 200m, memory: 256Mi }

# ── Ingress (for the frontend; API is routed through the frontend nginx) ─────
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: spatiumddi.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: spatiumddi-tls
    #   hosts:
    #     - spatiumddi.example.com

# ── Postgres ─────────────────────────────────────────────────────────────────
# Two in-chart shapes, picked via ``postgresql.kind``:
#
# * ``standalone`` (default) — single-node StatefulSet using the
#   official ``postgres:16-alpine`` image (matches docker-compose.yml).
#   Sized for small lab / single-VM deployments. No HA, no failover.
# * ``cnpg`` (#272 Phase 2) — CloudNativePG ``Cluster`` CR.
#   Operator-managed primary + sync replicas + async replicas, with
#   automatic failover. Requires the CloudNativePG operator already
#   installed in the cluster (bundled in
#   ``charts/spatiumddi-appliance/`` for appliance installs; for
#   plain k8s installs apply the operator separately via:
#   ``kubectl apply --server-side -f
#    https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.29/releases/cnpg-1.29.1.yaml``
#   ).
#
# For an externally-managed database, set ``postgresql.enabled=false``
# and fill in the ``externalDatabase`` block below.
postgresql:
  enabled: true
  kind: standalone
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: spatiumddi
    database: spatiumddi
    # Password for the chart-managed user. If empty we generate a
    # random password on first install (persisted on the chart-owned
    # secret via lookup() across upgrades). Set ``existingSecret`` to
    # BYO.
    password: ""
    existingSecret: ""           # external secret with key `password`
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""             # empty → cluster default StorageClass
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # CNPG-specific topology (only used when ``kind: cnpg``).
  cnpg:
    # Replica count. 3 is the smallest etcd-quorum-friendly default
    # (primary + sync replica + async replica). 5 / 7 for larger
    # clusters. CNPG enforces odd counts implicitly via its leader-
    # election layer.
    instances: 3
    # Postgres image used by CNPG-managed pods. Must be a CNPG-built
    # image (regular ``postgres:16`` images are missing the WAL-G /
    # barman wrappers CNPG relies on for backups + failover).
    imageName: "ghcr.io/cloudnative-pg/postgresql:16"
    # Server-side parameters. Tune for your workload; defaults match
    # the prototype at ``k8s/ha/postgres-cluster.yaml``.
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      work_mem: "16MB"
    # PodMonitor for Prometheus Operator. Default false because most
    # installs don't have Prometheus Operator + ServiceMonitor CRDs.
    monitoring:
      enablePodMonitor: false
    # Continuous WAL archiving to an object store. Defer beyond #272
    # Phase 2 — the existing pg_dump-based backup workflow already
    # covers the disaster-recovery story for v1. See CNPG docs for
    # ``barmanObjectStore`` shape.
    backup:
      enabled: false
      retentionPolicy: "30d"

# Used when postgresql.enabled=false.
externalDatabase:
  host: ""
  port: 5432
  username: spatiumddi
  database: spatiumddi
  password: ""
  existingSecret: ""             # external secret; key defaults to `password`
  existingSecretPasswordKey: "password"

# ── Redis ────────────────────────────────────────────────────────────────────
# In-chart single-node Redis StatefulSet using the official
# ``redis:8.6-alpine`` image (matches docker-compose.yml). For HA
# production set ``redis.enabled=false`` and point ``externalRedis`` at
# a Redis Sentinel cluster (see k8s/ha/redis-sentinel.yaml).
redis:
  enabled: true
  image:
    repository: redis
    tag: "8.6-alpine"
    pullPolicy: IfNotPresent
  # Cap and eviction policy match docker-compose.yml's redis-server
  # CLI flags. Bump if your install needs a larger cache.
  maxmemory: "256mb"
  auth:
    enabled: false               # internal cluster traffic; flip to true if shared
    password: ""                 # empty → generated on first install when auth.enabled=true
    existingSecret: ""           # external secret with key `redis-password`
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Used when redis.enabled=false.
externalRedis:
  # Full URL form, e.g. redis://:password@host:6379. If empty, composed from
  # host/port/password fields below.
  url: ""
  host: ""
  port: 6379
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: "password"

# ── DNS agents (optional — managed BIND9 / PowerDNS StatefulSets) ────────────
# One StatefulSet + Services pair per entry. `enabled: false` skips the
# whole block; typical deployments run DNS agents in a separate cluster
# closer to the network edge.
dnsAgents:
  enabled: false
  # Default image — used when a server entry doesn't override.
  # Configures the BIND9 driver (the historical default flavor).
  image:
    repository: ghcr.io/spatiumddi/dns-bind9
    tag: ""                      # empty → use Chart.appVersion
    pullPolicy: IfNotPresent
  # Per-driver image overrides (issue #127). Each key matches a
  # ``servers[].flavor`` value; missing keys fall back to
  # ``dnsAgents.image``. Add a ``powerdns`` server entry to enable
  # PowerDNS-driver groups alongside BIND9.
  flavors:
    powerdns:
      repository: ghcr.io/spatiumddi/dns-powerdns
      tag: ""                    # empty → use Chart.appVersion
  # PSK carrying DNS_AGENT_KEY. Prefer `existingSecret`; `value` lives here
  # only to make lab walk-throughs runnable in one command.
  agentKey:
    existingSecret: ""           # external secret with key DNS_AGENT_KEY
    value: ""
  servers: []
    # - name: ns1
    #   flavor: bind9            # bind9 (default) | powerdns
    #   role: primary            # primary | secondary
    #   group: internal-resolvers
    #   storage: { agentState: 1Gi, dnsState: 2Gi }
    #   service: { type: LoadBalancer }
    #   resources:
    #     requests: { cpu: 100m, memory: 128Mi }
    #     limits:   { cpu: 500m, memory: 512Mi }
    # - name: ns1-pdns
    #   flavor: powerdns         # PowerDNS group; LMDB-backed zone storage
    #   role: primary
    #   group: powerdns-internal
    #   storage: { agentState: 1Gi, dnsState: 2Gi }   # dnsState → /var/lib/powerdns

# ── DHCP agents (optional — managed Kea StatefulSets) ────────────────────────
dhcpAgents:
  enabled: false
  image:
    repository: ghcr.io/spatiumddi/dhcp-kea
    tag: ""
    pullPolicy: IfNotPresent
  agentKey:
    existingSecret: ""           # external secret with key SPATIUM_AGENT_KEY
    value: ""
  servers: []
    # - name: dhcp1
    #   role: primary
    #   group: default
    #   storage: { agentState: 1Gi, keaState: 2Gi }
    #   service: { type: NodePort }
    #   hostNetwork: false       # true required for L2 DHCP broadcast (no relay)
    #   resources:
    #     requests: { cpu: 100m, memory: 128Mi }
    #     limits:   { cpu: 500m, memory: 512Mi }
