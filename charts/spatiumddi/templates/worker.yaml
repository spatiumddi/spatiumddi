{{- $cmp := "worker" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spatiumddi.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 8 }}
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: 60
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "spatiumddi.waitForMigrateInit" . | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "spatiumddi.image" (merge (dict "imageName" "spatiumddi-api") .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.worker.netRawCapability }}
          # NET_RAW unlocks nmap raw-socket scans (SYN, ``-O`` OS
          # detection) for the device-profiling auto-nmap path. The
          # image already grants the cap to the nmap binary via setcap;
          # this line keeps it in the pod bounding set so restricted
          # PSA / OpenShift-SCC clusters don't drop it.
          securityContext:
            capabilities:
              add: ["NET_RAW"]
          {{- end }}
          command:
            - celery
            - -A
            - app.celery_app
            - worker
            - --loglevel=info
            - --concurrency={{ .Values.worker.concurrency }}
            - -Q
            - {{ .Values.worker.queues | quote }}
          env:
            {{- include "spatiumddi.commonEnv" . | nindent 12 }}
          # Worker has no HTTP listener — Celery-native ping over the
          # broker confirms this specific worker is alive. Using
          # ``$HOSTNAME`` scopes the ping to this pod, not any random
          # worker on the broker.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A app.celery_app inspect ping -d "celery@${HOSTNAME}" --timeout 5 >/dev/null 2>&1
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.api.applianceHostMounts.enabled }}
          volumeMounts:
            # #59 — packet-capture .pcap store. The worker WRITES captures
            # here; the api reads them back on download. Same single-node
            # shared hostPath (firstboot chowns it 1000:1000).
            - name: pcaps
              mountPath: /var/lib/spatiumddi/pcaps
          {{- end }}
      {{- if .Values.api.applianceHostMounts.enabled }}
      volumes:
        - name: pcaps
          hostPath:
            path: {{ .Values.api.applianceHostMounts.pcapsDir }}
            type: DirectoryOrCreate
      {{- end }}
      {{- include "spatiumddi.controlPlaneNodeSelector" (merge (dict "componentNodeSelector" .Values.worker.nodeSelector) .) | nindent 6 }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "spatiumddi.podAntiAffinity" (merge (dict "component" $cmp "mode" .Values.worker.podAntiAffinity "replicas" .Values.worker.replicas "override" .Values.worker.affinity) .) | nindent 6 }}
