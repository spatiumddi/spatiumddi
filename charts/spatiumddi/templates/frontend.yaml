{{- $cmp := "frontend" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spatiumddi.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  {{- if .Values.frontend.hostNetwork }}
  # hostPort:80 is exclusive on a single node — a RollingUpdate
  # would create the new pod before terminating the old, and it
  # would sit Pending forever ("didn't have free ports for the
  # requested pod ports"). Recreate ensures the old pod
  # terminates first, freeing :80 for the new one. ~5 s of
  # downtime on a chart upgrade is acceptable for an
  # appliance-scale single-instance frontend.
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 8 }}
      {{- with .Values.frontend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.frontend.hostNetwork }}
      # Appliance use (#183 Phase 11): expose :80 on the node IP
      # directly. The umbrella chart is otherwise pure ClusterIP,
      # but the appliance disables klipper-lb + the default
      # NodePort range excludes :80. hostNetwork is the simplest
      # way to land on http://<appliance>/ for the operator. Pair
      # with replicas=1 so the single host port doesn't conflict.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "spatiumddi.image" (merge (dict "imageName" "spatiumddi-frontend") .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              {{- if .Values.frontend.hostNetwork }}
              hostPort: 80
              {{- end }}
            {{- if .Values.frontend.tls.enabled }}
            - name: https
              containerPort: 443
              {{- if .Values.frontend.hostNetwork }}
              hostPort: 443
              {{- end }}
            {{- end }}
          {{- if .Values.frontend.tls.enabled }}
          volumeMounts:
            # Replace the image's default 80-only template with the
            # appliance TLS template (Phase 11 wave 3 — issue #183).
            # subPath ensures only ``default.conf.template`` gets
            # swapped, not the whole /etc/nginx/templates dir.
            - name: tls-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
              readOnly: true
            - name: tls-cert
              mountPath: /etc/nginx/tls
              readOnly: true
          {{- end }}
          env:
            # Issue #176: tell the frontend nginx where the api Service
            # is. The image defaults to ``api:8000`` (Docker Compose's
            # service-discovery name), which doesn't resolve on K8s.
            # nginx's ``resolver`` directive resolves names against the
            # configured nameservers but does NOT apply the search list
            # from /etc/resolv.conf. A bare ``<release>-api`` works in
            # cluster-network pods (kubelet's own resolv.conf handling
            # picks up the search domain at process start) but FAILS in
            # hostNetwork pods (the appliance frontend toggle) — nginx
            # logs ``Host not found`` on every /api/ request. Use the
            # FQDN so resolution works in both cases.
            - name: API_UPSTREAM_HOST
              value: {{ .Values.frontend.apiUpstream.host | default (printf "%s-api.%s.svc.cluster.local" (include "spatiumddi.fullname" .) .Release.Namespace) | quote }}
            - name: API_UPSTREAM_PORT
              value: {{ .Values.frontend.apiUpstream.port | default .Values.api.service.port | quote }}
            {{- with .Values.frontend.nginxLocalResolvers }}
            # Explicit DNS resolver override. Leave unset to let the
            # image's 15-local-resolvers.envsh auto-detect from
            # /etc/resolv.conf — which already points at cluster DNS
            # (kube-dns / CoreDNS) inside a Pod.
            - name: NGINX_LOCAL_RESOLVERS
              value: {{ . | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- if .Values.frontend.tls.enabled }}
      volumes:
        - name: tls-config
          configMap:
            name: {{ include "spatiumddi.fullname" . }}-frontend-tls-conf
        - name: tls-cert
          secret:
            secretName: {{ .Values.frontend.tls.secretName }}
            # ``optional: true`` so a missing Secret doesn't block
            # pod startup — firstboot creates it just before the
            # chart's first reconcile, but a chart upgrade that
            # races could otherwise wedge.
            optional: true
      {{- end }}
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spatiumddi.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
