{{- /*
  Shared Postgres credentials Secret. Rendered whenever the chart owns
  the database (``postgresql.enabled=true``), regardless of kind
  (standalone or cnpg). Skipped when the operator supplies their own
  existing secret or an inline password (we still render the inline
  one as a separate basic-auth secret for kind=cnpg parity).

  Type ``kubernetes.io/basic-auth`` with ``username`` + ``password``
  keys — the shape CNPG ``bootstrap.initdb.secret`` requires.
  Standalone Postgres reads only the ``password`` key via env, so
  either kind can consume the same secret unchanged.

  ``helm.sh/resource-policy: keep`` preserves the secret across a
  ``helm uninstall`` so a re-install reuses the same password
  (matches the previous standalone-template behaviour).
*/}}
{{- if .Values.postgresql.enabled }}
{{- $cmp := "postgresql" -}}
{{- $secretName := printf "%s-postgresql" (include "spatiumddi.fullname" .) -}}
{{- $username := .Values.postgresql.auth.username -}}
{{- if and (not .Values.postgresql.auth.existingSecret) (not .Values.postgresql.auth.password) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- $password := "" }}
{{- if $existing }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: kubernetes.io/basic-auth
stringData:
  username: {{ $username | quote }}
data:
  password: {{ $password | b64enc | quote }}
{{- end }}
{{- if .Values.postgresql.auth.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $username | quote }}
data:
  password: {{ .Values.postgresql.auth.password | b64enc | quote }}
{{- end }}
{{- end }}
