{{- $cmp := "beat" -}}
# Beat runs as a singleton — only 1 replica ever, Recreate strategy so
# the old pod terminates before the new one starts (prevents two beat
# schedulers racing to enqueue the same tasks).
#
# ── #272 Phase 4 DECISION: leader election ──────────────────────────
# Three options were on the table for the multi-node control plane:
#   (a) celery-redbeat — Redis-backed lock, lets N beat replicas run
#       with only the lock-holder scheduling.
#   (b) a k8s Lease object held by a sidecar.
#   (c) keep beat as a 1-replica Deployment (this).
# We picked (c). Rationale: beat only *enqueues* tasks; every task is
# idempotent (CLAUDE.md non-negotiable #9), so a brief scheduling gap
# during a failover is harmless (tasks catch up on the next tick). The
# Recreate strategy already guarantees no two beats run at once across
# a rollout. (a) adds a dependency + moves the schedule into Redis —
# and our Redis is itself Sentinel-HA (#272 Phase 3), so redbeat would
# need sentinel-aware config too; not worth it for a sub-30s gap. (b)
# is more moving parts than (c) buys back. We deliberately do NOT add a
# PodDisruptionBudget: a PDB with minAvailable:1 on a single-replica
# workload would *block* node drains entirely (the singleton can never
# be evicted), which is the opposite of what HA wants — beat must be
# free to reschedule onto a surviving control-plane node.
#
# Hard node loss is the one weak spot of (c): the default ~5min
# unreachable/not-ready eviction timeout leaves beat down that whole
# window. We shorten it via tolerationSeconds below so beat reschedules
# in ~30s after a node dies. If sub-30s beat failover ever becomes a
# real requirement, revisit (a) celery-redbeat.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spatiumddi.fullname" . }}-beat
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 8 }}
      {{- with .Values.beat.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "spatiumddi.waitForMigrateInit" . | nindent 8 }}
      containers:
        - name: beat
          image: {{ include "spatiumddi.image" (merge (dict "imageName" "spatiumddi-api") .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.celery_app
            - beat
            - --loglevel=info
          env:
            {{- include "spatiumddi.commonEnv" . | nindent 12 }}
          # Beat has no broker-reachable identity (it only enqueues, it
          # doesn't accept ``inspect ping``). Cheapest accurate signal:
          # check the celery process is still pid 1 of the container.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - grep -q celery /proc/1/cmdline
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.beat.resources | nindent 12 }}
      {{- include "spatiumddi.controlPlaneNodeSelector" (merge (dict "componentNodeSelector" .Values.beat.nodeSelector) .) | nindent 6 }}
      tolerations:
        # Reschedule the singleton fast on hard node loss (#272 Phase 4):
        # default eviction is ~300s; we cut it to fastRescheduleSeconds so
        # the beat scheduler is back ~30s after a control-plane node dies.
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ .Values.beat.fastRescheduleSeconds | default 30 }}
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: {{ .Values.beat.fastRescheduleSeconds | default 30 }}
        {{- with .Values.beat.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.beat.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
