{{- if and .Values.postgresql.enabled (eq (.Values.postgresql.kind | default "standalone") "standalone") }}
{{- $cmp := "postgresql" -}}
{{- $secretName := printf "%s-postgresql" (include "spatiumddi.fullname" .) -}}
# ─────────────────────────────────────────────────────────────────────────────
# In-chart Postgres — single-node StatefulSet using the official
# ``postgres:16-alpine`` image. Sized for a small lab / single-VM
# deployment. Real production HA installs should flip
# ``postgresql.kind=cnpg`` (#272 Phase 2 — CloudNativePG ``Cluster``
# CR at templates/cnpg-cluster.yaml) or set
# ``postgresql.enabled=false`` and point ``externalDatabase`` at a
# self-managed Postgres / Patroni cluster.
#
# The credentials Secret (``<fullname>-postgresql``,
# ``kubernetes.io/basic-auth`` shape with ``username`` + ``password``
# keys) is rendered by templates/postgres-secret.yaml — shared with
# the cnpg kind so a kind switch reuses the same credentials.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "spatiumddi.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  serviceName: {{ include "spatiumddi.fullname" . }}-postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        # Match the postgres image's UID — the Alpine ``postgres`` user
        # runs as 70:70. fsGroup makes the mounted PVC writable.
        fsGroup: 70
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "spatiumddi.postgresSecretName" . }}
                  key: {{ include "spatiumddi.postgresSecretPasswordKey" . }}
            # Alpine postgres mounts ``/var/lib/postgresql/data`` as the
            # data dir but Kubernetes mounts can't be the data dir
            # directly (``initdb`` refuses if the dir contains a
            # ``lost+found`` from ext4 / a leading dot file). Point at
            # a sub-path so initdb sees a clean tree.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgresql.auth.username }}", "-d", "{{ .Values.postgresql.auth.database }}"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgresql.auth.username }}", "-d", "{{ .Values.postgresql.auth.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
      {{- include "spatiumddi.controlPlaneNodeSelector" (merge (dict "componentNodeSelector" .Values.postgresql.nodeSelector) .) | nindent 6 }}
      {{- with .Values.postgresql.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.postgresql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size | quote }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spatiumddi.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spatiumddi.fullname" . }}-postgresql-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
{{- end }}
