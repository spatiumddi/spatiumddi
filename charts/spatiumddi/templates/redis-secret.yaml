{{- /*
  Shared Redis credentials Secret. Rendered whenever the chart owns
  Redis (``redis.enabled=true``) AND auth is on, regardless of kind
  (standalone or sentinel). Skipped when the operator supplies their
  own existing secret.

  ``helm.sh/resource-policy: keep`` preserves the password across a
  ``helm uninstall`` so a re-install reuses it (matches the previous
  standalone-template behaviour). Key is ``redis-password``.
*/}}
{{- if and .Values.redis.enabled .Values.redis.auth.enabled (not .Values.redis.auth.existingSecret) }}
{{- $cmp := "redis" -}}
{{- $secretName := printf "%s-redis" (include "spatiumddi.fullname" .) -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- $password := "" }}
{{- if .Values.redis.auth.password }}
{{- $password = .Values.redis.auth.password }}
{{- else if $existing }}
{{- $password = index $existing.data "redis-password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  redis-password: {{ $password | b64enc | quote }}
{{- end }}
