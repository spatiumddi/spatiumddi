{{- $cmp := "api" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spatiumddi.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 6 }}
  {{- include "spatiumddi.deploymentStrategy" (dict "mode" .Values.api.podAntiAffinity "replicas" .Values.api.replicas) | nindent 2 }}
  template:
    metadata:
      labels:
        {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.api.serviceAccount.enabled }}
      # Phase 11 wave 4 (#183) — the api uses kubeapi for two things
      # on the appliance: (1) Updating the spatium-appliance-tls
      # Secret when an operator uploads a cert through the Cert
      # Manager UI; (2) Listing pods + tailing pod logs for the
      # /appliance/containers (now /pods) management surface.
      # Auto-mount the ServiceAccount token at
      # /var/run/secrets/kubernetes.io/serviceaccount/.
      serviceAccountName: {{ include "spatiumddi.fullname" . }}-api
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "spatiumddi.waitForMigrateInit" . | nindent 8 }}
      containers:
        - name: api
          image: {{ include "spatiumddi.image" (merge (dict "imageName" "spatiumddi-api") .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Pin the runtime uid/gid to the image's ``app`` user (1000) so the
          # slot-images hostPath — chowned 1000:1000 by spatiumddi-firstboot
          # (#415) — is writable regardless of any cluster-level PodSecurity
          # default. Matches the image USER directive: a no-op on a normal
          # deploy, deterministic belt-and-braces on the appliance.
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - name: http
              containerPort: 8000
          env:
            {{- include "spatiumddi.commonEnv" . | nindent 12 }}
            {{- if .Values.frontend.controlPlaneVIP }}
            # #272 Phase 6 — the self-signed cert bootstrap adds the
            # control-plane VIP to the cert SANs (and regenerates an
            # existing self-signed cert that doesn't cover it), so a cert
            # served on the VIP validates. Threaded from the same value
            # the frontend Service uses for the LoadBalancer VIP.
            - name: APPLIANCE_EXTRA_CERT_SANS
              value: {{ .Values.frontend.controlPlaneVIP | quote }}
            {{- end }}
            {{- if .Values.slotImageMirror.enabled }}
            # #296 Phase B — when the mirror Deployment is on, the api's
            # slot-image upload + download + delete handlers proxy byte
            # ops to the mirror Service instead of touching local FS.
            # See backend/app/api/v1/appliance/slot_images.py for the
            # branching logic. The URL is the mirror's ClusterIP Service,
            # in-cluster reachable from every api replica; the X-Mirror-
            # Auth shared secret defends against in-cluster cross-pod
            # forgery on top of the network isolation.
            - name: SLOT_IMAGE_MIRROR_URL
              value: "http://{{ include "spatiumddi.fullname" . }}-slot-image-mirror.{{ .Release.Namespace }}.svc:8000"
            - name: SLOT_IMAGE_MIRROR_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "spatiumddi.fullname" . }}-slot-image-mirror-auth
                  key: secret
            {{- end }}
            {{- with .Values.api.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Liveness — "process responds to HTTP". Deliberately shallow:
          # a transient Postgres blip should not trigger a pod restart.
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          # Readiness — "can actually serve traffic". /health/ready
          # checks DB + Redis connectivity, so an api pod that can't
          # reach its dependencies is taken out of the LB rotation
          # instead of returning 5xx to clients.
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          {{- if .Values.api.applianceHostMounts.enabled }}
          volumeMounts:
            # Setup-complete flag, slot-upgrade triggers,
            # maintenance flag — api WRITES here.
            - name: spatiumddi-host-release-state
              mountPath: /var/lib/spatiumddi-host/release-state
            # Slot-upgrade log — api READS for the live tail in the
            # OS Versions card.
            - name: spatiumddi-host-log
              mountPath: /var/log/spatiumddi-host
              readOnly: true
            # Host env (deployment_kind, role-config) — api READS for
            # the Fleet UI's slot/version detection.
            - name: spatiumddi-host-etc
              mountPath: /etc/spatiumddi-host
              readOnly: true
            {{- if not .Values.slotImageMirror.enabled }}
            # #386 — uploaded / GitHub-imported upgrade-image bytes. Without
            # a persistent mount these live in the api's ephemeral container
            # layer and vanish on every api restart: the DB row survives but
            # the bytes 404 ("Upgrade image bytes missing on disk — re-upload
            # required"), so a scheduled upgrade fails on download. The
            # multi-node slot-image mirror (#296) holds these on its own PVC
            # and the api proxies byte ops there, so this single-node hostPath
            # only applies when the mirror is off. api WRITES here.
            - name: slot-images
              mountPath: /var/lib/spatiumddi/slot-images
            {{- end }}
            # #59 — packet-capture .pcap store. api READS here on download;
            # the worker writes. Single-node shared hostPath (firstboot
            # chowns it 1000:1000). Always mounted (not mirror-gated).
            - name: pcaps
              mountPath: /var/lib/spatiumddi/pcaps
          {{- end }}
      {{- if .Values.api.applianceHostMounts.enabled }}
      volumes:
        - name: spatiumddi-host-release-state
          hostPath:
            path: {{ .Values.api.applianceHostMounts.releaseStateDir }}
            type: DirectoryOrCreate
        - name: spatiumddi-host-log
          hostPath:
            path: {{ .Values.api.applianceHostMounts.hostLogDir }}
            type: DirectoryOrCreate
        - name: spatiumddi-host-etc
          hostPath:
            path: {{ .Values.api.applianceHostMounts.hostEtcDir }}
            type: DirectoryOrCreate
        {{- if not .Values.slotImageMirror.enabled }}
        # #386 — persist upgrade-image bytes across api restarts (single
        # node; the mirror's PVC handles the multi-node case).
        - name: slot-images
          hostPath:
            path: {{ .Values.api.applianceHostMounts.slotImagesDir }}
            type: DirectoryOrCreate
        {{- end }}
        # #59 — packet-capture .pcap store (shared with the worker).
        - name: pcaps
          hostPath:
            path: {{ .Values.api.applianceHostMounts.pcapsDir }}
            type: DirectoryOrCreate
      {{- end }}
      {{- include "spatiumddi.controlPlaneNodeSelector" (merge (dict "componentNodeSelector" .Values.api.nodeSelector) .) | nindent 6 }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "spatiumddi.podAntiAffinity" (merge (dict "component" $cmp "mode" .Values.api.podAntiAffinity "replicas" .Values.api.replicas "override" .Values.api.affinity) .) | nindent 6 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spatiumddi.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "spatiumddi.componentSelectorLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
{{- if .Values.api.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "spatiumddi.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spatiumddi.componentLabels" (merge (dict "component" $cmp) .) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "spatiumddi.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
