{{- /* Issue #183 Phase 2 scaffold — spatium-supervisor.
       Deferred: Phase 3 ports the supervisor onto k3s + wires the
       CRD reconciler. This template ships the eventual pod spec
       (privileged DaemonSet, hostPath mounts identical to today's
       docker-compose volume mounts) so the chart structure is
       stable + Phase 3 only flips supervisor.enabled to true.
       Phase 2 keeps it ``enabled: false`` by default. */}}
{{- if .Values.supervisor.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spatium-supervisor
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
    app.kubernetes.io/component: supervisor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spatium-supervisor
  template:
    metadata:
      labels:
        {{- include "spatiumddi-appliance.labels" . | nindent 8 }}
        app.kubernetes.io/name: spatium-supervisor
        app.kubernetes.io/component: supervisor
    spec:
      nodeSelector:
        {{- toYaml .Values.global.nodeSelector | nindent 8 }}
      # Issue #183 Phase 3 — in-cluster auth via the SA the matching
      # supervisor-rbac template provisions. The auto-mounted SA
      # token + ca.crt give the supervisor's k8s_api module enough
      # to PATCH HelmChart CRs in kube-system + read pods in the
      # spatium namespace, no external kubeconfig needed.
      serviceAccountName: spatium-supervisor
      hostPID: true
      containers:
        - name: spatium-supervisor
          image: {{ include "spatiumddi-appliance.imageRef" (dict "global" .Values.global "repository" .Values.supervisor.image.repository) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # Privileged because the supervisor writes host-side
          # trigger files + reads /run/udev. Phase 3 narrows this
          # down once the controller pattern lands.
          securityContext:
            privileged: true
          env:
            # Phase 10 (#183) — k8s_api.patch_node_labels needs the
            # node name. Downward API surfaces the kubelet-known
            # node name without having to guess from hostname (which
            # may not match the registered node identity, especially
            # on multi-NIC setups).
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # #272 — skip TLS verification on the supervisor → control
            # plane connection (register / poll / heartbeat). A fresh
            # control plane serves a SELF-SIGNED cert; #234 hardened the
            # supervisor's httpx client to verify by default, which
            # broke appliance pairing (CERTIFICATE_VERIFY_FAILED on
            # every register). The pairing code + the post-approval mTLS
            # client cert are the real auth here; TLS is just transport
            # over a LAN to an operator-typed IP. Trust-on-first-use is
            # the right model for appliance bootstrap, so we opt this
            # connection out of verification. (The kubeapi paths #234
            # hardened are unaffected — this flag only gates the
            # control-plane HTTP client.)
            - name: SPATIUM_INSECURE_SKIP_TLS_VERIFY
              value: "1"
          volumeMounts:
            - name: etc-spatiumddi-host
              mountPath: /etc/spatiumddi-host
              readOnly: true
            - name: release-state
              mountPath: /var/lib/spatiumddi-host/release-state
            - name: boot-efi
              mountPath: /boot/efi-host
              readOnly: true
            - name: run-udev
              mountPath: /run/udev
              readOnly: true
            - name: state-dir
              mountPath: /var/lib/spatium-supervisor
            - name: chart-dir
              mountPath: /usr/lib/spatiumddi/charts
              readOnly: true
            # Phase 3 will mount /etc/rancher/k3s/k3s.yaml here so the
            # supervisor can talk to its local kubeapi.
            - name: kubeconfig
              mountPath: /etc/rancher/k3s
              readOnly: true
            # Issue #285 Phase 1 — the live base nftables.conf, read-only,
            # so the supervisor can report the base-conf marker (sha256 +
            # legacy-LAN-wide-k3s flag) on the heartbeat. Purely a read;
            # the supervisor never writes it (the host-side firewall
            # runner does, via the release-state trigger plane).
            - name: nftables-conf
              mountPath: /etc/nftables-host.conf
              readOnly: true
            # Issue #386 Part C — host slot-upgrade.log, read-only, so the
            # heartbeat can ship a tail to the Fleet drilldown for full
            # upgrade status (download → verify → write → bootloader).
            # The structured progress sidecar lives in release-state
            # (already mounted); this adds the raw log for detail.
            - name: slot-upgrade-log
              mountPath: /var/log/spatiumddi-host
              readOnly: true
      volumes:
        - name: etc-spatiumddi-host
          hostPath:
            path: {{ .Values.supervisor.hostMounts.etcSpatiumddiHost }}
            type: Directory
        - name: release-state
          hostPath:
            path: {{ .Values.supervisor.hostMounts.releaseState }}
            type: DirectoryOrCreate
        - name: boot-efi
          hostPath:
            path: {{ .Values.supervisor.hostMounts.bootEfi }}
            type: Directory
        - name: run-udev
          hostPath:
            path: {{ .Values.supervisor.hostMounts.runUdev }}
            type: Directory
        - name: state-dir
          hostPath:
            path: {{ .Values.supervisor.hostMounts.stateDir }}
            type: DirectoryOrCreate
        - name: chart-dir
          hostPath:
            path: {{ .Values.supervisor.hostMounts.chartDir }}
            type: Directory
        - name: kubeconfig
          hostPath:
            path: /etc/rancher/k3s
            type: Directory
        - name: slot-upgrade-log
          hostPath:
            path: /var/log/spatiumddi
            # DirectoryOrCreate so a node that hasn't run an upgrade yet
            # (no log dir) can never block the supervisor from scheduling.
            type: DirectoryOrCreate
        - name: nftables-conf
          hostPath:
            path: {{ .Values.supervisor.hostMounts.nftablesConf }}
            # FileOrCreate (not File) so a node missing the file can
            # never block the supervisor from scheduling — every
            # appliance bakes /etc/nftables.conf, so it's never actually
            # created there; the marker reader tolerates an empty/absent
            # file by reporting None.
            type: FileOrCreate
{{- end }}
