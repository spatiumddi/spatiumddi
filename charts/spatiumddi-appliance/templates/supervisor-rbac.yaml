{{- /* Issue #183 Phase 3 — ServiceAccount + RBAC for the supervisor.

       The supervisor pod uses in-cluster service-account auth (token
       + ca.crt auto-mounted at /var/run/secrets/kubernetes.io/
       serviceaccount/) so it doesn't need a kubeconfig. The chart
       grants exactly the permissions the supervisor's lifecycle
       module needs:

       * Read/write HelmChart CRs in kube-system (k3s helm-controller
         picks them up and runs the actual ``helm upgrade``).
       * Read pods + services in the ``spatium`` target namespace for
         the watchdog's health probe.
       * Read/list nodes for cluster-level introspection (capabilities
         reporting).

       Phase 3 default: enabled when ``supervisor.enabled`` is true.
       Phase 1+2 left supervisor.enabled=false, so this whole block
       is dormant until the operator opts in. */}}
{{- /* The spatium namespace is intentionally NOT a chart resource —
       pre-created by the bootstrap manifest spatiumddi-firstboot
       writes into k3s's auto-deploy dir. If helm owns the namespace,
       a partial install that fails (and gets retried) ends up trying
       to "import" an existing-but-unowned namespace and hits "invalid
       ownership metadata" because the bootstrap-pre-created namespace
       doesn't carry helm's `meta.helm.sh/release-*` annotations. */}}
{{- if .Values.supervisor.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spatium-supervisor
  namespace: spatium
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
---
{{- /* HelmChart CRs live in kube-system (k3s convention). The
       supervisor needs full CRUD on the single chart object the
       lifecycle module manages. Scope to kube-system via Role so the
       supervisor can't accidentally edit OTHER charts the operator
       might have dropped into kube-system out-of-band. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spatium-supervisor-helm
  namespace: kube-system
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
rules:
    # #272 — the supervisor scales the control plane + applies the
    # MetalLB VIP by upserting HelmChartConfig CRs (overrides that
    # helm-controller merges on top of the same-named HelmChart and
    # that survive a k3s restart, unlike the auto-deploy manifest).
    # helmchartconfigs MUST be here alongside helmcharts — without it
    # ``apply_control_plane_overrides`` / ``apply_bootstrap_overrides``
    # 403 on the GET, so a promote never scales workloads and the VIP
    # never applies (regression caught on the #272 fresh-install test).
  - apiGroups: ["helm.cattle.io"]
    resources: ["helmcharts", "helmchartconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spatium-supervisor-helm
  namespace: kube-system
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spatium-supervisor-helm
subjects:
  - kind: ServiceAccount
    name: spatium-supervisor
    namespace: spatium
---
{{- /* Watchdog reads pods + services in the spatium namespace to
       derive role_health. Read-only — the lifecycle module mutates
       through HelmChart CRs, not direct pod patches. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spatium-supervisor-namespace
  namespace: spatium
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
    # #590/#272 Phase 9 — the dead-node evict reclaims Redis PVCs the
    # deleted node stranded (node-affine local-path PVs), then deletes
    # the Pending consumer pod so the StatefulSet recreates both on a
    # live node (k8s_api.reclaim_stranded_redis_storage, run from the
    # seed's heartbeat right after delete_node). Without the reclaim the
    # missing replica's sentinel silently halves the failover quorum and
    # the next node loss strands the Redis master for good. delete on
    # pods+PVCs only — everything else in this Role stays read-only.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spatium-supervisor-namespace
  namespace: spatium
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spatium-supervisor-namespace
subjects:
  - kind: ServiceAccount
    name: spatium-supervisor
    namespace: spatium
---
{{- /* #272 — the supervisor scales the CNPG Postgres Cluster directly
       (``k8s_api.patch_cnpg_instances`` from the heartbeat). It can't go
       through the HelmChartConfig like the other workloads because the
       Cluster carries ``helm.sh/resource-policy: keep`` (data-safety) and
       the helm-controller won't patch a kept resource's spec — so a
       promote left Postgres single-node while api/worker/redis scaled.
       The direct merge-patch needs get + patch on the Cluster CR; without
       it the GET 403s every heartbeat and CNPG never scales (caught on the
       #272 fresh-install test). Namespaced to spatium — narrowest grant. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spatium-supervisor-cnpg
  namespace: spatium
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
rules:
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spatium-supervisor-cnpg
  namespace: spatium
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spatium-supervisor-cnpg
subjects:
  - kind: ServiceAccount
    name: spatium-supervisor
    namespace: spatium
---
{{- /* ClusterRole for node-level introspection (capabilities
       reporting). Single verb, single resource — narrowest grant
       that gets ``kubectl get nodes`` to work. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spatium-supervisor-nodes
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    # Phase 10 (#183) — supervisor PATCHes node labels for per-role
    # scheduling (``spatium.io/role-dns-bind9=true`` etc.). ``patch``
    # + ``update`` cover both the merge-patch form used by
    # k8s_api.patch_node_labels and a fallback strategic-merge if we
    # ever switch.
    #
    # #590/#272 Phase 9 — ``delete``: the dead-node replacement evict is
    # the SEED SUPERVISOR calling ``k8s_api.delete_node()`` from its
    # heartbeat (deleting the k8s Node makes k3s drop the etcd member).
    # Without this verb every evict 403s
    # (``supervisor.heartbeat.node_evict_failed`` each heartbeat), the
    # row stays pinned in ``evicting``, and — because the product
    # serializes the replacement member's join behind the evict — the
    # replacement never joins: observed live 2026-07-12 as the ha
    # suite's dead_node_replace stuck at nodes_ready=2 for 30 min with
    # the dead Node still listed NotReady (and 2026-07-08 as a member
    # sitting ``evicting`` 20+ min). The feature shipped without the
    # RBAC verb it depends on.
    verbs: ["get", "list", "watch", "patch", "update", "delete"]
    # #389 — read-only on the k3s ETCDSnapshotFile CRs so the
    # heartbeat's ``list_etcd_snapshots()`` can populate the Fleet →
    # etcd snapshots inventory. Without this grant the
    # ``GET /apis/k3s.cattle.io/v1/etcdsnapshotfiles`` 403s and the
    # list reports empty every heartbeat even though k3s is taking
    # snapshots on schedule. Cluster-scoped because the CRs are;
    # read-only because snapshot create / delete / restore go through
    # the host ``k3s`` binary + the cluster-restore trigger plane, not
    # the kubeapi.
  - apiGroups: ["k3s.cattle.io"]
    resources: ["etcdsnapshotfiles"]
    verbs: ["get", "list", "watch"]
    # #590 — ensure_coredns_ha: the seed's heartbeat keeps the k3s-bundled
    # CoreDNS at >=2 replicas with fast-evict tolerations (k3s resets it to
    # a single 300s-toleration replica on every restart; a single replica
    # deterministically sits on the seed, so a hard seed kill silences all
    # Service/pod-FQDN resolution — api readiness's Postgres + Redis
    # lookups included — for 5 minutes). resourceNames-pinned to coredns.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["coredns"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spatium-supervisor-nodes
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spatium-supervisor-nodes
subjects:
  - kind: ServiceAccount
    name: spatium-supervisor
    namespace: spatium
{{- end }}
