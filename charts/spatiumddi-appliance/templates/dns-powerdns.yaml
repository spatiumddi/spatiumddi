{{- /* Issue #183 Phase 2 — PowerDNS DNS agent (alternative to BIND9).
       Phase 10 wave 2 — ``.enabled`` is now release-ownership scope
       (bootstrap=false, appliance=true), NOT role-scope. Scheduling
       is gated by the ``spatium.io/role-dns-powerdns=true`` node
       label. BIND9 vs PowerDNS mutual exclusion is enforced
       supervisor-side: it sets at most one of ``role-dns-bind9`` /
       ``role-dns-powerdns`` labels on any heartbeat. */}}
{{- if .Values.dnsPowerdns.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dns-powerdns
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
    app.kubernetes.io/component: dns-powerdns
spec:
  # DaemonSet for symmetry with dns-bind9 + dhcp-kea — DESIRED=0
  # when the node lacks ``spatium.io/role-dns-powerdns=true``, so
  # ``kubectl get pods`` stays silent on unscheduled roles.
  # #292 — RollingUpdate (not OnDelete): OnDelete strands a pod on its
  # creation-time spec when CONTROL_PLANE_URL is populated after first
  # render. See dns-bind9.yaml for the full rationale.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-powerdns
  template:
    metadata:
      labels:
        {{- include "spatiumddi-appliance.labels" . | nindent 8 }}
        app.kubernetes.io/name: dns-powerdns
        app.kubernetes.io/component: dns-powerdns
    spec:
      {{- if not .Values.dns.useMetalLBVIP }}
      # #272 Phase 5 — default path: bind :53 on the node IP. A DNS VIP
      # drops hostNetwork in favour of the LoadBalancer Service below.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      nodeSelector:
        {{- toYaml .Values.global.nodeSelector | nindent 8 }}
        # Phase 10 (#183) — per-role scheduling label.
        spatium.io/role-dns-powerdns: "true"
      containers:
        - name: dns-powerdns
          image: {{ include "spatiumddi-appliance.imageRef" (dict "global" .Values.global "repository" .Values.dnsPowerdns.image.repository) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            # #292 — in-cluster API Service over HTTP; see dns-bind9.yaml
            # (the external URL's self-signed cert fails agent registration).
            - name: CONTROL_PLANE_URL
              value: {{ .Values.dnsPowerdns.inClusterApiUrl | default (printf "http://spatium-control-spatiumddi-api.%s.svc:8000" .Release.Namespace) | quote }}
            - name: DNS_AGENT_KEY
              value: {{ .Values.dnsPowerdns.agentKey | quote }}
            - name: AGENT_GROUP
              value: {{ .Values.dnsPowerdns.serverGroupName | quote }}
            {{- with .Values.global.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            # #292 — persistent agent config-bundle cache (#5); see
            # dns-bind9.yaml.
            - name: agent-state
              mountPath: /var/lib/spatium-dns-agent
            - name: data
              mountPath: /var/lib/powerdns
      # #292 — per-node hostPath (not shared PVC, not emptyDir); see
      # dns-bind9.yaml for the rationale.
      volumes:
        - name: agent-state
          hostPath:
            path: /var/lib/spatiumddi/agents/dns-powerdns/state
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /var/lib/spatiumddi/agents/dns-powerdns/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: dns-powerdns
  labels:
    {{- include "spatiumddi-appliance.labels" . | nindent 4 }}
    app.kubernetes.io/component: dns-powerdns
  {{- if .Values.dns.useMetalLBVIP }}
  annotations:
    # #272 Phase 5 — pin the DNS resolver VIP from the MetalLB pool.
    metallb.universe.tf/address-pool: {{ .Values.dns.vipPool | quote }}
    metallb.universe.tf/loadBalancerIPs: {{ .Values.dns.vip | quote }}
  {{- end }}
spec:
  {{- if .Values.dns.useMetalLBVIP }}
  type: LoadBalancer
  {{- else }}
  type: ClusterIP
  {{- end }}
  selector:
    app.kubernetes.io/name: dns-powerdns
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      protocol: TCP
{{- end }}
