apiVersion: v2
name: spatiumddi-appliance
description: |
  SpatiumDDI appliance — per-role service workloads deployed onto the
  appliance's local k3s cluster. Issued and reconciled by the
  spatium-supervisor based on the operator's role-assignment on the
  control plane (issue #183 Phase 2).
type: application
version: 0.1.0
appVersion: "0.0.0-dev"
kubeVersion: ">=1.27.0-0"
home: https://spatiumddi.github.io/spatiumddi/
sources:
  - https://github.com/spatiumddi/spatiumddi
icon: https://spatiumddi.github.io/spatiumddi/assets/logo-icon.svg
keywords:
  - ipam
  - dns
  - dhcp
  - ddi
  - networking
  - appliance
  - k3s
maintainers:
  - name: SpatiumDDI Contributors
# Subchart dependencies — populated in #272 Phase 2 (CloudNativePG)
# and Phase 5 (MetalLB). Phase 1 lands the values-level scaffolding
# only (see ``metallb`` and ``cnpg`` blocks in values.yaml,
# ``enabled: false`` defaults) so single-node installs aren't
# affected. The chart-level ``dependencies:`` block stays empty
# until those phases vendor the upstream tarballs + values
# overrides into ``charts/spatiumddi-appliance/charts/``.
#
# Upstream sources tracked for the eventual vendor commits:
#   * MetalLB (Apache 2.0) v0.15.3 —
#     https://github.com/metallb/metallb/tree/main/charts/metallb
#   * CloudNativePG (Apache 2.0) latest stable —
#     https://github.com/cloudnative-pg/charts
