# Issue #183 Phase 2 — appliance role values.
#
# Each top-level ``<role>.enabled: false`` is the operator-assigned
# default. The supervisor's CRD reconciler (Phase 3) flips the right
# subset to ``true`` based on the SpatiumApplianceRole spec.
#
# All container images come from the slot's containerd content store
# (preloaded at firstboot from /usr/lib/spatiumddi/images/*.tar.zst).
# imagePullPolicy is ``Never`` everywhere — air-gap means no registry
# lookup at runtime, ever.

# Global settings shared by every role.
global:
  # Image tags follow the slot's SPATIUMDDI_VERSION stamp. The
  # supervisor rewrites this value when applying the chart so the
  # tags line up with whatever's preloaded in containerd.
  imageTag: dev
  # ImagePullPolicy. Always ``Never`` on the appliance — bytes are
  # baked, the kubelet must NOT phone home to ghcr.io.
  imagePullPolicy: Never
  # Node selector — every role pins to the appliance-labelled node
  # so a future ops engineer who joins external workers to the
  # cluster can't accidentally schedule our service pods there.
  nodeSelector:
    spatium.io/role: appliance
  # Operator-pasted env applied to every service container. Lives on
  # the appliance row's ``firewall_extra`` analogue (free-form
  # operator override).
  extraEnv: []

# DNS — bind9 backend. Exactly one of dnsBind9 / dnsPowerdns runs
# per appliance; the supervisor enforces mutual-exclusion at the
# CRD reconciler level so flipping both ``enabled: true`` is a
# server-side validation error.
dnsBind9:
  enabled: false
  image:
    repository: ghcr.io/spatiumddi/dns-bind9
  # Pass-through to the agent via env. The supervisor fills these in
  # when assigning the DNS role.
  # controlPlaneUrl is the EXTERNAL operator-facing URL (self-signed
  # cert). #409 — the co-located DaemonSet agent now PREFERS this when
  # the supervisor sets it (an Application appliance is its own single-
  # node k3s with no in-cluster control Service, so the in-cluster name
  # does not resolve), skipping TLS verify on that self-signed path.
  # Empty on a control-plane/full-stack appliance → falls through to
  # inClusterApiUrl (the #292 in-cluster verified-HTTP path).
  # KNOWN LIMITATION: a promoted Application member keeps its baked
  # external URL here (service_lifecycle._build_values is not yet member-
  # aware), so its role pods stay on the external + TLS-skip path rather
  # than the in-cluster path the heartbeat switches to — uncommon
  # topology, tracked as a #409 follow-up.
  controlPlaneUrl: ""
  # #292 — in-cluster API Service URL the co-located DaemonSet agent
  # registers against (plain HTTP — no TLS to verify intra-cluster, so
  # the appliance's self-signed cert is a non-issue). Empty → defaults
  # to http://spatium-control-spatiumddi-api.<release-namespace>.svc:8000
  # (the appliance's fixed spatium-control release). Override only for a
  # non-standard control-release name/namespace.
  inClusterApiUrl: ""
  agentKey: ""
  serverGroupName: ""
  # #292 — per-node state lives on a hostPath dir at
  # /var/lib/spatiumddi/agents/dns-bind9/state, mounted at the agent's
  # /var/lib/spatium-dns-agent. That dir holds the cached ConfigBundle +
  # the rendered named.conf/zones + tsig/rndc keys — everything named
  # serves from — so the node keeps serving from last-known-good config
  # when the control plane is unreachable (#5). NOT a shared RWO PVC (it
  # pins to one node → other DaemonSet pods Pending) and NOT emptyDir
  # (wiped on restart → loses the cache). The old /var/named/{data,keys}
  # mounts were dropped — bind9 never wrote to them. No size knob —
  # hostPath grows with /var.

# DNS — PowerDNS backend. Same shape as dnsBind9.
dnsPowerdns:
  enabled: false
  image:
    repository: ghcr.io/spatiumddi/dns-powerdns
  controlPlaneUrl: ""
  inClusterApiUrl: ""  # #292 — see dnsBind9.inClusterApiUrl
  agentKey: ""
  serverGroupName: ""
  # The dnsdist front (#146 Phase 2) is docker-compose-only for now — see the
  # note in templates/dns-powerdns.yaml. k8s/appliance support (a dnsdist
  # Deployment fronting the hostNetwork pdns DaemonSet) is a follow-up.

# DHCP — Kea backend. DaemonSet (single node) with ``hostNetwork:
# true`` + ``CAP_NET_BIND_SERVICE`` so Kea sees DHCP-discover
# broadcasts on the appliance's host NIC. Same shape as today's
# ``network_mode: host`` docker-compose entry.
dhcpKea:
  enabled: false
  image:
    repository: ghcr.io/spatiumddi/dhcp-kea
  controlPlaneUrl: ""
  inClusterApiUrl: ""  # #292 — see dnsBind9.inClusterApiUrl
  agentKey: ""
  serverGroupName: ""
  # ``host`` = listen on the host's NIC (the default + only mode
  # that lets DHCP broadcasts reach Kea). ``bridged`` would require
  # a relay-agent on every subnet — defer to Phase 5.
  networkMode: host
  # #292 — per-node hostPath state under /var/lib/spatiumddi/agents/
  # dhcp-kea/ (agent cache + Kea leases), NOT a PVC. See dnsBind9.
  # #272 Phase 5 — DHCP relay-VIP (default off). When set, an ADDITIONAL
  # LoadBalancer Service (``dhcp-kea-relay``) requests this IP from the
  # MetalLB pool so a DHCP relay's ``forward-to`` target can outlive a
  # single Kea node. Kea KEEPS hostNetwork:67 — this VIP does NOT replace
  # client-facing broadcast reach (operators still run a relay per VLAN);
  # it only stabilises the relay→server unicast forward. Must fall inside
  # the MetalLB pool. Requires ``metallb.enabled: true``.
  relayVIP: ""
  # MetalLB pool the relay VIP draws from. Empty → falls back to the
  # shared control-plane pool (``dns.vipPool``) so a single-pool install
  # needs no extra config; set this only when DHCP must draw from a
  # different pool than DNS.
  relayVIPPool: ""

# Looking Glass — receive-only BGP collector (GoBGP). Issue #566. Peers
# passively with the operator's edge/core routers over the node's real
# routable IP (hostNetwork, like DNS/DHCP) and never advertises a route
# back — see agent/looking-glass/ + docs/features/LOOKING_GLASS.md for
# the collector daemon + the hard receive-only invariant.
lookingGlass:
  enabled: false
  image:
    repository: ghcr.io/spatiumddi/looking-glass
  # Same precedence + rationale as dnsBind9.controlPlaneUrl /
  # inClusterApiUrl above: external operator-facing URL (Application
  # appliance, self-signed) takes priority over the in-cluster Service
  # default.
  controlPlaneUrl: ""
  inClusterApiUrl: ""  # #292 — see dnsBind9.inClusterApiUrl
  agentKey: ""
  # #566 — per-node hostPath state under /var/lib/spatiumddi/agents/
  # looking-glass/ (agent cache — cached ConfigBundle + peer config the
  # collector re-applies from if the control plane is unreachable, non-
  # negotiable #5), NOT a PVC. See dnsBind9 for the full rationale.

# #272 Phase 5 — DNS resolver VIP (default off, full wiring is Phase 10).
# When ``useMetalLBVIP: true`` the bind9 + powerdns Pods DROP
# hostNetwork:53 and sit behind a single L2 LoadBalancer Service at
# ``vip``, so clients use one resolver IP that follows whichever node is
# up. Net-loss on single-node (an extra hop for no gain) — single-node
# installs leave this false and keep hostNetwork. ``vip`` must fall
# inside the MetalLB pool and differ from ``metallb.controlPlaneVIP``
# (the pool needs ≥2 free addresses). Requires ``metallb.enabled: true``.
# An appliance runs one DNS driver at a time, so the single ``vip`` is
# requested by whichever of bind9 / powerdns is enabled.
dns:
  useMetalLBVIP: false
  vip: ""
  vipPool: spatium-control-plane

# Observer — placeholder for future metrics / log shipper role. No
# service container in Phase 2; this just lets the supervisor pre-
# populate the values.yaml shape without leaving a TBD section.
observer:
  enabled: false

# Issue #183 Phase 8 — cluster observability add-ons. Both default
# OFF (operator opt-in via the Fleet UI's "Observability" toggle
# once Phase 8 wires it). When enabled they expose Prometheus-shape
# metrics at the standard endpoints; future Phase 8 work adds a
# control-plane Prometheus scraper that federates across appliances.
observability:
  # kube-state-metrics exposes cluster-state metrics (pod count,
  # deployment status, restart counts, …) at /metrics. ~30 MB RSS.
  # Standard k8s observability primitive.
  kubeStateMetrics:
    enabled: false
    image:
      repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
      tag: v2.18.0
    # Resource cap — appliance VMs are typically 2-4 GB; KSM has a
    # bounded memory profile but a runaway pod shouldn't dent the
    # service pods' headroom.
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

  # node-exporter exposes host-level metrics (CPU, memory, disk,
  # network) at /metrics. DaemonSet with hostNetwork so the metrics
  # reflect the host (not the pod's network namespace). ~10 MB RSS.
  nodeExporter:
    enabled: false
    image:
      repository: quay.io/prometheus/node-exporter
      tag: v1.11.1
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        memory: 64Mi

# Supervisor — privileged DaemonSet that reconciles the operator's
# CRD assignment + ships heartbeats to the control plane.
#
# Phase 1: the supervisor still runs via docker-compose on the host
# (legacy compose path). Phase 3 ports it onto k3s; this block
# scaffolds the eventual values shape so the chart structure is
# stable from the start.
supervisor:
  enabled: false
  image:
    repository: ghcr.io/spatiumddi/spatium-supervisor
  # Host mounts the supervisor needs — same set as today's compose
  # entry (release-state writes the trigger files, etc).
  hostMounts:
    etcSpatiumddiHost: /etc/spatiumddi
    releaseState: /var/lib/spatiumddi/release-state
    bootEfi: /boot/efi
    runUdev: /run/udev
    # Supervisor's persistent state — Ed25519 identity, signed cert,
    # approval state, cached pairing data. MUST persist across pod
    # restarts or every restart re-pairs as a fresh appliance and the
    # control plane's Fleet view fills with phantom rows.
    #
    # Path stays /var/persist/spatium-supervisor for compatibility with
    # the host-side consumers (spatium-console, spatium-pair, the
    # external watchdog). Issue #276 makes this a symlink INTO the
    # STATE partition (spatium-etc-render points it at
    # /var/lib/spatium-state/spatium-supervisor), so the supervisor's
    # identity + signed cert survive a /var factory reset, not just
    # slot swaps — the symlink target lives on STATE which /var-reset
    # doesn't touch.
    stateDir: /var/persist/spatium-supervisor
    # Slot-baked chart tarball — the supervisor re-PATCHes the
    # HelmChart CR on role-assignment changes and needs the chart
    # bytes to base64-encode into spec.chartContent. The path
    # matches service_lifecycle._BAKED_CHART_TARBALL.
    chartDir: /usr/lib/spatiumddi/charts
    # Issue #285 Phase 1 — the live base nftables.conf, mounted read-only
    # so the supervisor reports the base-conf marker (sha256 + whether the
    # legacy LAN-wide k3s-ha accept is still present) on the heartbeat.
    nftablesConf: /etc/nftables.conf

# Always-on landing page served on :80 — "this is a SpatiumDDI
# appliance" + hostname / control-plane URL / version. firstboot
# renders the HTML from the template at
# /usr/local/share/spatiumddi/agent-landing/index.html.in into
# /var/lib/spatiumddi/agent-landing/ on the host; nginx hostPath-
# mounts that dir read-only.
agentLanding:
  enabled: true
  image:
    repository: nginx
    tag: 1.30.1-alpine
  hostMounts:
    htmlDir: /var/lib/spatiumddi/agent-landing

# ─────────────────────────────────────────────────────────────────────
# Multi-node HA scaffolding — #272 Phase 1 lands the value stubs;
# the actual subchart vendoring + activation work lands in Phase 2
# (CNPG) and Phase 5 (MetalLB). Single-node appliance installs leave
# both ``enabled: false`` and behave identically to pre-#272.
# ─────────────────────────────────────────────────────────────────────

# CloudNativePG operator — declarative postgres HA. Apache 2.0.
# Phase 2 vendors the upstream chart + adds a ``Cluster`` CR for
# the SpatiumDDI schema, then renders a one-shot migration job
# that pg_dumps the existing single-node ``postgres`` StatefulSet
# and pg_restores into the CNPG cluster.
cnpg:
  enabled: false
  # #277 — the cloudnative-pg subchart is aliased to ``cnpg`` (so its
  # values + the enable gate live under a short key). But Helm sets the
  # subchart's ``.Chart.Name`` to the ALIAS, so its ``app.kubernetes.io
  # /name`` label renders ``cnpg`` — and the operator self-discovers its
  # own Deployment with a HARDCODED filter ``app.kubernetes.io/name=
  # cloudnative-pg`` (to own the CA cert it generates). Mismatch →
  # "no operator deployment found" → "unable to setup PKI infrastructure"
  # → CrashLoopBackOff. ``nameOverride`` forces the label (and the
  # chart's fullname-derived service / configmap / RBAC names, all
  # rendered consistently) back to ``cloudnative-pg`` so self-discovery
  # works. Do NOT remove without also de-aliasing the dependency.
  nameOverride: cloudnative-pg
  # #315 — pin the operator pod's resources + loosen its startup probe.
  #
  # The upstream chart ships ``resources: {}``, which makes the operator
  # pod **BestEffort** QoS — the first thing kubelet evicts / OOM-kills
  # under node memory pressure. On the all-in-one control node (api + db
  # + frontend + observability on one box) that bites: when the node
  # gets tight the operator dies, then its restart re-attaches every
  # watched volume at once → a reconciliation storm + log flood (the
  # operator restart was observed alongside an ``api`` pod restart,
  # i.e. node-level pressure, while the Postgres ``Cluster`` itself
  # stayed healthy). Setting requests moves it to **Burstable** so it is
  # no longer first in the eviction line; the (generous) memory limit is
  # a backstop against a genuine runaway — well above the operator's
  # real footprint (~30-150 MiB) so it never cgroup-OOMKills normal
  # reconciliation.
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Loosen the default 3s-delay / 30s-window (6 × 5s) startup gate — on
  # constrained appliance VMs the operator + its webhook TLS bootstrap
  # can take longer than 30s to answer ``/readyz``, and a startup-probe
  # miss is itself a restart cause. 60s window + later liveness/readiness
  # start give honest headroom without masking a truly wedged operator.
  # These keys merge into the chart's webhook defaults (port / mutating /
  # validating stay intact).
  webhook:
    livenessProbe:
      initialDelaySeconds: 15
    readinessProbe:
      initialDelaySeconds: 10
    startupProbe:
      failureThreshold: 12
      periodSeconds: 5
  # Replica topology for the SpatiumDDI ``Cluster`` CR. 3 replicas
  # (primary + sync + async) is the etcd-quorum-friendly default;
  # 5 / 7 work for larger clusters. Even counts refused at the
  # promote endpoint (Phase 7).
  cluster:
    instances: 3
    # Per-replica storage class. Single-node + small dev clusters
    # default to local-path; multi-node needs longhorn / rook /
    # external NFS — operator picks at install time. Empty here
    # forces the operator to make an explicit choice in Phase 2.
    storage:
      storageClass: ""
      size: 20Gi
