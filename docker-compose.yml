name: spatiumddi

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      POSTGRES_USER: spatiumddi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: spatiumddi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatiumddi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - spatiumddi
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API Backend ─────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      VERSION: ${SPATIUMDDI_VERSION:-dev}
    # Docker integration — uncomment both entries below to poll the
    # host's Docker daemon over its local Unix socket. Required when
    # adding a Docker host with connection_type=unix. Read-only
    # mount; SpatiumDDI only reads. Unnecessary for TCP+TLS remote
    # daemons.
    #
    # ``DOCKER_GID`` must match the gid of ``/var/run/docker.sock``
    # on the host — find it with:
    #   stat -c '%g' /var/run/docker.sock
    # then set ``DOCKER_GID=<that number>`` in your .env. Common
    # values: 999 (Debian/Ubuntu), 998 or 989 (RHEL/Fedora), varies.
    # Without this the api user (uid 1000) gets EACCES on the socket.
    #
    # Backup local-volume target (issue #117) — uncomment the
    # ``spatium_backups`` line below AND its entry under the
    # top-level ``volumes:`` block AND the matching line on the
    # worker service if you create a Backup Target with kind
    # ``local_volume`` at the default path
    # ``/var/lib/spatiumddi/backups``. Without this mount, archives
    # land inside the container's writable layer and disappear on
    # container recycle. Operators using only remote destinations
    # (S3 / SCP / Azure / SMB / FTP / GCS) can leave it commented.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    #   - spatium_backups:/var/lib/spatiumddi/backups
    # group_add:
    #   - "${DOCKER_GID:-999}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q ipam,dns,dhcp,default
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      VERSION: ${SPATIUMDDI_VERSION:-dev}
    # Docker integration — the worker runs the reconcile tasks, so it
    # also needs the host socket when polling a local daemon.
    # Uncomment alongside the matching entries on the api service
    # above — same ``DOCKER_GID`` comment applies.
    #
    # Backup local-volume target (issue #117) — the worker runs the
    # scheduled backup sweep, so it must mount the same volume the
    # api lists archives from. Uncomment alongside the api service.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    #   - spatium_backups:/var/lib/spatiumddi/backups
    # group_add:
    #   - "${DOCKER_GID:-999}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # The backend Dockerfile's HEALTHCHECK probes the api's
    # ``/health/live`` endpoint — correct for the api service but wrong
    # for worker/beat (they don't expose HTTP). Override with a Celery-
    # native ping so ``inspect ping`` round-trips to this worker via
    # the broker.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  beat:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      VERSION: ${SPATIUMDDI_VERSION:-dev}
    depends_on:
      - redis
    # Beat has no network listener and no broker-reachable identity, so
    # the cheapest liveness signal is "the beat process is running".
    # Checks pid 1 via ``/proc`` — matches the Celery process the
    # container was started with.
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'celery' /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend (nginx + Vite build) ───────────────────────────────────────────
  frontend:
    image: ghcr.io/spatiumddi/spatiumddi-frontend:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api

  # ── Migrations (runs once at startup) ──────────────────────────────────────
  migrate:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    networks:
      - spatiumddi
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── DNS agent ─────────────────────────────────────────────────────────
  # Enable with: docker compose --profile dns up -d
  dns-bind9:
    profiles: ["dns"]
    image: ghcr.io/spatiumddi/dns-bind9:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      CONTROL_PLANE_URL: http://api:8000
      DNS_AGENT_KEY: ${DNS_AGENT_KEY:-changeme-dns-agent-key}
      SERVER_NAME: dns-bind9
      AGENT_GROUP: default
      AGENT_ROLES: authoritative
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
    volumes:
      - dns_bind9_state:/var/lib/spatium-dns-agent
      - dns_bind9_cache:/var/cache/bind
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
    depends_on:
      api:
        condition: service_started

  # ── DHCP agent (primary) ──────────────────────────────────────────────
  # Enable with:
  #   docker compose --profile dhcp up -d                         # single node
  #   docker compose --profile dhcp --profile dhcp-ha up -d       # HA pair
  dhcp-kea:
    profiles: ["dhcp"]
    image: ghcr.io/spatiumddi/dhcp-kea:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      # ── Required ──────────────────────────────────────────────────
      # Control-plane URL the agent bootstraps + long-polls against.
      SPATIUM_API_URL: http://api:8000
      # Pre-shared key exchanged for a rotating JWT on first join.
      SPATIUM_AGENT_KEY: ${DHCP_AGENT_KEY:-changeme-dhcp-agent-key}

      # ── Registration ──────────────────────────────────────────────
      # Server name used for auto-registration + Kea HA this-server-name.
      # Must be unique across the deployment; defaults to the hostname.
      SPATIUM_SERVER_NAME: dhcp-kea
      # Server group the agent joins on first bootstrap.
      AGENT_GROUP: default
      # Comma-separated role hints (primary, secondary, ...). Informational
      # only — actual HA role is driven by failover-channel membership.
      AGENT_ROLES: primary

      # ── TLS ───────────────────────────────────────────────────────
      # Skip TLS verify for self-signed control planes. Lab-only.
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
      # Path to a CA bundle (in-container) for private CA verification.
      # TLS_CA_PATH: /etc/ssl/spatium-ca.crt

      # ── Tuning (optional, defaults shown) ─────────────────────────
      # LOG_LEVEL: INFO             # DEBUG | INFO | WARNING | ERROR
      # HEARTBEAT_INTERVAL: "30"    # seconds between agent heartbeats
      # LONGPOLL_TIMEOUT: "30"      # seconds the /config long-poll blocks
      # CACHE_DIR: /var/lib/spatium-dhcp-agent   # bundle + JWT cache
      # KEA_CONFIG_PATH: /etc/kea/kea-dhcp4.conf
      # KEA_CONTROL_SOCKET: /run/kea/kea4-ctrl-socket
      # KEA_LEASE_FILE: /var/lib/kea/kea-leases4.csv
    volumes:
      - dhcp_kea_state:/var/lib/spatium-dhcp-agent
      - dhcp_kea_leases:/var/lib/kea
    ports:
      # Host 6767/udp → container 67/udp. DHCPv4 is awkward to expose
      # without host networking — use `network_mode: host` for real lab use.
      - "6767:67/udp"
      # HA hook peer-to-peer HTTP. Other Kea peers speak to this port
      # directly for heartbeats + lease updates. Must stay 8000 (the peer
      # URL advertised to the partner). Host-side mapped off 8000 so the
      # control plane API keeps :8000.
      - "8001:8000/tcp"
      # Operator-facing kea-ctrl-agent REST. Optional — uncomment if you
      # want to poke the Kea DHCP server directly from the host.
      # - "8544:8544/tcp"
    depends_on:
      api:
        condition: service_started
    # Kea runs as non-root and needs to bind UDP/67. No NET_RAW/NET_ADMIN —
    # this server accepts relayed DHCP (unicast from relay agents), it does
    # NOT need to listen for L2 broadcasts on the host LAN.
    cap_add:
      - NET_BIND_SERVICE

  # ── DHCP agent (secondary, HA peer) ───────────────────────────────────
  # Only starts with `--profile dhcp-ha`. Pair it with dhcp-kea in a
  # failover channel (Admin → Failover Channels) using the on-network
  # peer URLs:
  #   primary_peer_url:   http://dhcp-kea:8000/
  #   secondary_peer_url: http://dhcp-kea-2:8000/
  dhcp-kea-2:
    profiles: ["dhcp-ha"]
    image: ghcr.io/spatiumddi/dhcp-kea:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      SPATIUM_API_URL: http://api:8000
      SPATIUM_AGENT_KEY: ${DHCP_AGENT_KEY:-changeme-dhcp-agent-key}

      # Unique — drives a distinct DHCPServer row + Kea HA this-server-name.
      SPATIUM_SERVER_NAME: dhcp-kea-2
      AGENT_GROUP: default
      AGENT_ROLES: secondary

      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
      # TLS_CA_PATH: /etc/ssl/spatium-ca.crt

      # Tuning (see dhcp-kea above for the full list).
      # LOG_LEVEL: INFO
      # HEARTBEAT_INTERVAL: "30"
      # LONGPOLL_TIMEOUT: "30"
    volumes:
      - dhcp_kea_state_2:/var/lib/spatium-dhcp-agent
      - dhcp_kea_leases_2:/var/lib/kea
    ports:
      # Distinct host ports so both peers can listen without colliding.
      - "6768:67/udp"
      - "8002:8000/tcp"
      # - "8545:8544/tcp"   # optional kea-ctrl-agent REST
    depends_on:
      api:
        condition: service_started
    cap_add:
      - NET_BIND_SERVICE

networks:
  spatiumddi:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  dns_bind9_state:
  dns_bind9_cache:
  dhcp_kea_state:
  dhcp_kea_leases:
  dhcp_kea_state_2:
  dhcp_kea_leases_2:
  # Backup local-volume target (issue #117). Uncomment when using
  # a Backup Target with kind ``local_volume``; see the comments
  # on the api + worker services. Safe to leave commented for
  # installs using only remote destinations.
  # spatium_backups:
