name: spatiumddi

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      POSTGRES_USER: spatiumddi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: spatiumddi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatiumddi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - spatiumddi
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API Backend ─────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -Q ipam,dns,dhcp,default
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # The backend Dockerfile's HEALTHCHECK probes the api's
    # ``/health/live`` endpoint — correct for the api service but wrong
    # for worker/beat (they don't expose HTTP). Override with a Celery-
    # native ping so ``inspect ping`` round-trips to this worker via
    # the broker.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  beat:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    # Beat has no network listener and no broker-reachable identity, so
    # the cheapest liveness signal is "the beat process is running".
    # Checks pid 1 via ``/proc`` — matches the Celery process the
    # container was started with.
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'celery' /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Frontend (nginx + Vite build) ───────────────────────────────────────────
  frontend:
    image: ghcr.io/spatiumddi/spatiumddi-frontend:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api

  # ── Migrations (runs once at startup) ──────────────────────────────────────
  migrate:
    image: ghcr.io/spatiumddi/spatiumddi-api:${SPATIUMDDI_VERSION:-latest}
    networks:
      - spatiumddi
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://spatiumddi:${POSTGRES_PASSWORD:-changeme}@postgres:5432/spatiumddi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── DNS agent ─────────────────────────────────────────────────────────
  # Enable with: docker compose --profile dns up -d
  dns-bind9:
    profiles: ["dns"]
    image: ghcr.io/spatiumddi/dns-bind9:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      CONTROL_PLANE_URL: http://api:8000
      DNS_AGENT_KEY: ${DNS_AGENT_KEY:-changeme-dns-agent-key}
      SERVER_NAME: dns-bind9
      AGENT_GROUP: default
      AGENT_ROLES: authoritative
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
    volumes:
      - dns_bind9_state:/var/lib/spatium-dns-agent
      - dns_bind9_cache:/var/cache/bind
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"
    depends_on:
      api:
        condition: service_started

  # ── DHCP agent ────────────────────────────────────────────────────────
  # Enable with: docker compose --profile dhcp up -d
  dhcp-kea:
    profiles: ["dhcp"]
    image: ghcr.io/spatiumddi/dhcp-kea:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    networks:
      - spatiumddi
    environment:
      SPATIUM_API_URL: http://api:8000
      SPATIUM_AGENT_KEY: ${DHCP_AGENT_KEY:-changeme-dhcp-agent-key}
      SPATIUM_SERVER_NAME: dhcp-kea
      AGENT_GROUP: default
      AGENT_ROLES: primary
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "1"
    volumes:
      - dhcp_kea_state:/var/lib/spatium-dhcp-agent
      - dhcp_kea_leases:/var/lib/kea
    ports:
      # Host 6767/udp → container 67/udp (DHCPv4 is hard to expose without host
      # networking; use `network_mode: host` for real lab use). :8000 is the
      # Kea control agent REST port — remapped to avoid clashing with the API.
      - "6767:67/udp"
      - "8001:8000/tcp"
    depends_on:
      api:
        condition: service_started
    # Kea runs as non-root and needs to bind UDP/67. No NET_RAW/NET_ADMIN —
    # this server accepts relayed DHCP (unicast from relay agents), it does
    # NOT need to listen for L2 broadcasts on the host LAN.
    cap_add:
      - NET_BIND_SERVICE

networks:
  spatiumddi:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  dns_bind9_state:
  dns_bind9_cache:
  dhcp_kea_state:
  dhcp_kea_leases:
