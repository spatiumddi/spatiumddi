// kea-ctrl-agent MUST NOT sit on the same port as the HA hook's peer URL.
// Kea 2.6's HA hook starts its own CmdHttpListener bound to that URL to
// receive peer-to-peer commands, and will fail with `Address in use`
// if kea-ctrl-agent already owns the port. Standard SpatiumDDI layout:
//   8000 → HA hook listener (peer-to-peer HTTP, this-server URL)
//   8544 → kea-ctrl-agent    (operator-facing REST / debugging)
{
  "Control-agent": {
    "http-host": "0.0.0.0",
    "http-port": 8544,
    "control-sockets": {
      "dhcp4": {
        "socket-type": "unix",
        "socket-name": "/run/kea/kea4-ctrl-socket"
      }
    },
    "loggers": [
      { "name": "kea-ctrl-agent",
        "output_options": [{ "output": "stdout" }],
        "severity": "INFO" }
    ]
  }
}
