{
  "Dhcp4": {
    "interfaces-config": { "interfaces": ["*"] },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea4-ctrl-socket"
    },
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv",
      "lfc-interval": 3600
    },
    "valid-lifetime": 3600,
    "renew-timer": 900,
    "rebind-timer": 1800,
    "subnet4": [],
    "hooks-libraries": [
      { "library": "/usr/lib/kea/hooks/libdhcp_lease_cmds.so" }
    ],
    "loggers": [
      { "name": "kea-dhcp4",
        "output_options": [{ "output": "stdout" }],
        "severity": "INFO" }
    ]
  }
}
