{
  "Dhcp6": {
    "interfaces-config": {
      "interfaces": []
    },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea6-ctrl-socket"
    },
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases6.csv",
      "lfc-interval": 3600
    },
    "valid-lifetime": 3600,
    "renew-timer": 900,
    "rebind-timer": 1800,
    "subnet6": [],
    "loggers": [
      { "name": "kea-dhcp6",
        "output_options": [{ "output": "stdout" }],
        "severity": "INFO" }
    ]
  }
}
