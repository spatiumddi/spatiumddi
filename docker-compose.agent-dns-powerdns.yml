name: spatiumddi-agent-dns-powerdns

# ── Standalone PowerDNS DNS agent compose file (issue #127) ───────────
#
# For running a PowerDNS-Authoritative DNS agent on a machine
# *without* the SpatiumDDI control plane. Mirror of
# ``docker-compose.agent-dns-bind9.yml`` for the second authoritative
# driver — pick whichever image matches the server group's driver in
# the control plane.
#
# Phase 1 of #127 ships PowerDNS with the embedded LMDB backend, so
# this compose file does NOT pull in an external Postgres / MySQL.
# Zone state lives in ``/var/lib/powerdns/pdns.lmdb`` inside the
# container's bound volume.
#
# Quickstart:
#
#   export CONTROL_PLANE_URL=https://spatium.example.com
#   export DNS_AGENT_KEY=$(openssl rand -hex 32)
#   # Register the key on the control plane first (Settings → Agent
#   # Keys) so the agent can bootstrap. Create the matching
#   # DNSServerGroup with driver="powerdns" via the UI or REST API.
#
#   docker compose -f docker-compose.agent-dns-powerdns.yml up -d
#
# For multi-server PowerDNS groups, run this compose file on each
# additional VM with DNS_HOSTNAME set to a unique server name and
# the same AGENT_GROUP — the control plane wires them into the same
# PowerDNS-driver group automatically.
#
# Mixing drivers in one group is rejected by the control plane —
# DNSSEC sign / unsign, ALIAS, LUA, and catalog records all gate on
# every server in the group running the powerdns driver. To run BIND9
# + PowerDNS side-by-side, create two separate groups.
#
# ──────────────────────────────────────────────────────────────────────

services:
  dns-powerdns:
    image: ghcr.io/spatiumddi/dns-powerdns:${SPATIUMDDI_VERSION:-latest}
    restart: unless-stopped
    hostname: ${DNS_HOSTNAME:-dns-powerdns}
    networks:
      - spatiumddi-agent
    environment:
      # ── Required ──────────────────────────────────────────────────
      # URL of the SpatiumDDI control plane API (remote).
      CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:?CONTROL_PLANE_URL required}
      # Pre-shared key registered on the control plane first.
      DNS_AGENT_KEY: ${DNS_AGENT_KEY:?DNS_AGENT_KEY required}

      # ── Registration ──────────────────────────────────────────────
      # Server name used for auto-registration. MUST be unique across
      # the deployment.
      SERVER_NAME: ${DNS_HOSTNAME:-dns-powerdns}
      AGENT_GROUP: ${DNS_AGENT_GROUP:-default}
      AGENT_ROLES: ${DNS_AGENT_ROLES:-authoritative}
      # AGENT_DRIVER is baked into the image (powerdns); no override.

      # ── TLS ───────────────────────────────────────────────────────
      SPATIUM_INSECURE_SKIP_TLS_VERIFY: "${SPATIUM_INSECURE_SKIP_TLS_VERIFY:-1}"
      # TLS_CA_PATH: /etc/ssl/spatium-ca.crt
    volumes:
      - dns_powerdns_state:/var/lib/spatium-dns-agent
      # LMDB-backed zone storage. Keep this volume — losing it means
      # losing every zone the agent has applied. Backups should
      # snapshot this volume; the LMDB file is consistent on disk.
      - dns_powerdns_lmdb:/var/lib/powerdns
      # Optional: mount a CA bundle to verify the control plane.
      # - /etc/ssl/certs:/etc/ssl/certs:ro
    ports:
      # DNS — UDP and TCP. The host-port defaults (5353) are lab-friendly
      # to avoid colliding with systemd-resolved on 53. For a real DNS
      # server use port 53 directly, typically with ``network_mode:
      # host`` so clients can reach it without DNAT.
      - "${DNS_HOST_PORT:-5353}:53/udp"
      - "${DNS_HOST_PORT:-5353}:53/tcp"

networks:
  spatiumddi-agent:
    driver: bridge

volumes:
  dns_powerdns_state:
  dns_powerdns_lmdb:
