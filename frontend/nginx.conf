server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream re-resolves when the api
    # container is recreated. Without this, nginx caches the api IP
    # at startup and starts returning 502s the moment `docker compose
    # up -d --force-recreate api` hands out a new one.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Nginx-local healthcheck — answers without hitting any upstream,
    # so the frontend container's health reflects just nginx itself.
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Operator Copilot streaming endpoint (issue #90). SSE responses
    # need three things nginx defaults get wrong:
    #   1. ``proxy_buffering off`` — otherwise nginx holds the entire
    #      response until upstream closes, defeating the point of SSE.
    #   2. ``proxy_http_version 1.1`` + cleared ``Connection`` header
    #      — nginx defaults to HTTP/1.0 to upstream, which doesn't
    #      support chunked transfer-encoding well and forces buffering.
    #   3. A long ``proxy_read_timeout`` — slow local LLMs (Ollama on a
    #      cold start, llama.cpp with a big model) easily take >60 s
    #      to first token. 10 minutes is plenty without being silly.
    # Must come before the broader /api/ location since nginx picks
    # the most specific prefix match.
    location /api/v1/ai/chat {
        set $api_upstream http://api:8000;
        proxy_pass            $api_upstream;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        # Tell the X-Accel-Buffering: no header from upstream to win
        # in case it sneaks back on through a different path.
        proxy_set_header      X-Accel-Buffering no;
    }

    # Backup endpoints (issue #117). Three things nginx defaults
    # get wrong for these:
    #   1. ``client_max_body_size`` — backup archives can be
    #      hundreds of MB on real installs. 2 GB matches the
    #      backend's ``_MAX_UPLOAD_BYTES`` cap; anything past
    #      that is rejected at the FastAPI layer with a clean
    #      message instead of nginx's bare 413.
    #   2. ``proxy_request_buffering off`` — without this nginx
    #      buffers the entire upload to disk before forwarding,
    #      doubling the I/O. Streaming straight through is fine
    #      because FastAPI reads the body progressively.
    #   3. ``proxy_read_timeout`` — pg_dump + pg_restore on a
    #      hefty install can take several minutes. 30 minutes
    #      matches the backend's ``_PG_DUMP_TIMEOUT_SECONDS``.
    # Must come before the broader /api/ location since nginx
    # picks the most specific prefix match.
    location /api/v1/backup/ {
        set $api_upstream http://api:8000;
        proxy_pass               $api_upstream;
        proxy_set_header         Host $host;
        proxy_set_header         X-Real-IP $remote_addr;
        proxy_set_header         X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header         X-Forwarded-Proto $scheme;
        proxy_http_version       1.1;
        proxy_set_header         Connection "";
        client_max_body_size     2g;
        proxy_request_buffering  off;
        proxy_read_timeout       1800s;
        proxy_send_timeout       1800s;
    }

    # Proxy API calls to the backend. Using a variable for proxy_pass
    # forces nginx to re-resolve ``api`` on each request via the
    # resolver above (instead of binding at config-load time).
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass         $api_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
    }

    # Proxy health and metrics endpoints to api for admin probes.
    location ~ ^/(health|metrics) {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; let Vite's content hash bust them
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
